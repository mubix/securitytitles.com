# OT Security Professional Titles
# Data file for Jekyll-based security titles standardization

otsec_engineer:
  name: "OT Security Engineer"
  description: "Technical professionals who secure industrial control systems (ICS), SCADA systems, PLCs, DCS, HMIs, and operational technology environments. Focus on OT network segmentation, asset discovery, vulnerability management in environments where patching is constrained, safety system integrity, and bridging the IT/OT security gap. Distinct from IT security engineers — OT environments have unique constraints around availability, safety, and legacy protocols. Many practitioners come from control systems engineering or industrial automation backgrounds rather than traditional IT security."
  nice_mapping:
    work_roles:
      - id: "PR-INF-001"
        name: "Cyber Defense Infrastructure Support Specialist"
    strength: "partial"
    notes: "NICE's infrastructure support role is IT-focused. OT security engineering involves unique constraints around safety systems, legacy protocols, and availability requirements that NICE does not address."
  levels:
    - id: "eng1"
      title: "Eng 1 / Entry"
      general_description: "Entry-level OT security engineer learning the fundamentals of industrial control system security and operational technology environments. Assists with OT asset inventories, network monitoring, and basic vulnerability assessments. Develops foundational understanding of ICS architectures, industrial protocols, and the critical differences between IT and OT security — including why availability and safety always take priority over confidentiality."
      primary_responsibilities:
        - "Assist with OT asset inventory and documentation"
        - "Monitor OT network traffic using passive monitoring tools"
        - "Learn industrial protocols (Modbus, DNP3, EtherNet/IP, OPC UA)"
        - "Support OT vulnerability scanning under supervision"
        - "Document OT network topologies and data flows"
        - "Assist with OT security policy compliance checks"
        - "Shadow senior engineers during ICS security assessments"
        - "Maintain documentation of PLCs, HMIs, and SCADA systems"
      required_skills:
        - "Basic understanding of ICS/SCADA architectures"
        - "Familiarity with industrial protocols (Modbus, DNP3, EtherNet/IP)"
        - "Understanding of the Purdue Model for ICS network segmentation"
        - "Basic networking fundamentals (TCP/IP, VLANs, firewalls)"
        - "Awareness of IT vs. OT security differences"
        - "Documentation and communication skills"
        - "Willingness to learn industrial processes and safety concepts"
      preferred_skills:
        - "Exposure to PLCs or HMI programming (Siemens, Allen-Bradley, etc.)"
        - "Basic familiarity with OT monitoring tools (Claroty, Nozomi Networks, Dragos)"
        - "Understanding of safety instrumented systems (SIS) concepts"
        - "Background in electrical engineering or control systems"
        - "Familiarity with IEC 62443 standard framework"
      mentorship_requirements: "Receives direct mentorship from Senior OT security engineers. Shadows on ICS security assessments and OT network reviews. Expected to develop understanding of industrial processes and safety implications within first 6 months. Must learn why traditional IT security approaches often fail in OT environments."
      impact_scope: "Individual contributor on assigned asset inventory and documentation tasks. Impact limited to supporting OT security assessment activities. Work is reviewed before implementation in production OT environments due to safety criticality."
      autonomy_decision_authority: "Works under close supervision. Follows established OT security procedures strictly — OT environments have zero tolerance for unplanned disruptions. No authority to make changes to production OT networks or systems. Escalates all findings to senior engineers."
      communication_stakeholder: "Primarily internal communication with OT security team. Limited interaction with plant operators and control system engineers initially. Documents findings for team review."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Control Systems Engineering, Industrial Engineering, Computer Science, Cybersecurity, or related field, OR 1-2 years of OT/ICS experience or IT security experience with demonstrated interest in OT."
      certifications:
        - "CompTIA Security+"
        - "GIAC Global Industrial Cyber Security Professional (GICSP) - in progress"
        - "ISA/IEC 62443 Cybersecurity Certificate Program - Fundamentals"
        - "Certified SCADA Security Architect (CSSA) - in progress"
      salary:
        us_government: "$60,000 - $85,000 (GS-9 to GS-11)"
        us_startup: "$75,000 - $100,000"
        us_corporate: "$70,000 - $95,000"
        us_bigtech: "$130,000 - $200,000"

    - id: "eng2"
      title: "Eng 2 / Junior"
      general_description: "Junior OT security engineer capable of performing basic OT security tasks independently. Can operate passive monitoring tools, conduct guided vulnerability assessments in OT environments, and assist with network segmentation projects. Understands why OT patching requires careful coordination with operations and maintenance windows, and can communicate effectively with both IT security and plant operations teams."
      primary_responsibilities:
        - "Operate OT network monitoring and asset discovery tools"
        - "Conduct OT vulnerability assessments with guidance"
        - "Assist with OT network segmentation planning and implementation"
        - "Analyze OT network traffic for anomalies and unauthorized communications"
        - "Support OT patch management coordination with operations teams"
        - "Maintain OT asset inventory databases with current firmware versions"
        - "Assist with OT firewall rule reviews and DMZ configurations"
        - "Document OT security incidents and support response activities"
        - "Help enforce USB and removable media policies in OT environments"
      required_skills:
        - "Proficiency with OT monitoring platforms (Claroty, Nozomi Networks, or Dragos)"
        - "Understanding of industrial protocols and their security implications"
        - "OT network segmentation concepts and firewall configuration"
        - "Basic vulnerability assessment in ICS environments"
        - "Understanding of OT patch management constraints and compensating controls"
        - "Knowledge of common ICS attack vectors and TTPs"
        - "Ability to read and interpret network diagrams and PLC logic"
        - "Communication skills for bridging IT security and operations teams"
      preferred_skills:
        - "Experience with Tenable.ot or similar OT vulnerability management"
        - "Familiarity with ICS-CERT advisories and vulnerability tracking"
        - "Basic understanding of PLC programming (ladder logic, function blocks)"
        - "Wireshark protocol analysis with OT protocol dissectors"
        - "Exposure to safety instrumented systems and SIL ratings"
      mentorship_requirements: "Receives guidance from Senior OT security engineers on complex assessments and incident response. Expected to begin understanding plant operations workflows and maintenance windows. Should be developing relationships with control system engineers and operators. Begins informal mentoring of Entry-level engineers."
      impact_scope: "Directly contributes to OT security monitoring and vulnerability management. Responsible for accurate asset inventory and monitoring coverage. Work impacts security posture of specific facilities or production lines. Beginning to influence OT security practices within assigned scope."
      autonomy_decision_authority: "Works with moderate supervision. Can make routine monitoring and triage decisions. Authority to escalate OT security alerts based on established criteria. Must coordinate with operations before any active assessment activities. Escalates complex vulnerabilities and potential safety impacts."
      communication_stakeholder: "Regular interaction with plant operations and control system engineering teams. Presents monitoring findings and vulnerability status. Participates in change management meetings. Communicates with IT security teams on IT/OT boundary issues."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Control Systems Engineering, Computer Science, or related field, OR 2-4 years of OT/ICS experience or IT security experience with OT exposure. Demonstrated understanding of industrial processes."
      certifications:
        - "GICSP (GIAC Global Industrial Cyber Security Professional)"
        - "ISA/IEC 62443 Cybersecurity Certificate Program"
        - "Certified SCADA Security Architect (CSSA)"
        - "CompTIA Security+ (if not already held)"
      salary:
        us_government: "$75,000 - $100,000 (GS-11 to GS-12)"
        us_startup: "$90,000 - $120,000"
        us_corporate: "$85,000 - $115,000"
        us_bigtech: "$170,000 - $270,000"

    - id: "eng3"
      title: "Eng 3 / Mid"
      general_description: "Experienced OT security engineer who independently conducts comprehensive ICS security assessments, leads network segmentation projects, and manages OT vulnerability programs. Expert in balancing security controls with operational availability and safety requirements. Understands the operational impact of security decisions on production processes and can design compensating controls when patching is not feasible. Leads coordination between IT security, OT engineering, and plant operations."
      primary_responsibilities:
        - "Lead OT security assessments and gap analyses for facilities"
        - "Design and implement OT network segmentation aligned to the Purdue Model"
        - "Manage OT vulnerability management programs including compensating controls"
        - "Conduct deep packet inspection and protocol analysis of ICS traffic"
        - "Develop OT-specific incident response procedures and playbooks"
        - "Implement and tune OT network monitoring and anomaly detection"
        - "Lead OT security aspects of change management processes"
        - "Mentor junior OT security engineers"
        - "Evaluate and deploy OT security tools and technologies"
        - "Conduct risk assessments considering both cyber and safety impacts"
      required_skills:
        - "Expert-level OT network monitoring and anomaly detection"
        - "Advanced knowledge of industrial protocols and their vulnerabilities"
        - "OT network architecture and segmentation design (Purdue Model levels 0-5)"
        - "ICS vulnerability management with compensating controls strategies"
        - "OT incident response procedures and forensics basics"
        - "IEC 62443 and NIST SP 800-82 compliance requirements"
        - "Understanding of safety instrumented systems (SIS) and their protection"
        - "Proficiency with multiple OT security platforms (Claroty, Nozomi, Dragos)"
        - "Risk assessment methodologies adapted for OT environments"
      preferred_skills:
        - "PLC/DCS programming and configuration experience"
        - "Industrial networking protocols (PROFINET, HART, Foundation Fieldbus)"
        - "NERC CIP compliance experience (for energy sector)"
        - "OT forensics and evidence preservation in industrial environments"
        - "Secure remote access design for OT environments"
      mentorship_requirements: "Mentors Junior and Entry-level OT security engineers. Expected to guide others on OT-specific constraints and risk management. Develops training materials on OT security concepts. Serves as a bridge between traditional IT security thinking and OT operational realities."
      impact_scope: "Responsible for OT security posture across assigned facilities or regions. Assessment findings directly influence capital investment and remediation priorities. Network segmentation designs protect critical infrastructure processes. Decisions impact production availability and safety."
      autonomy_decision_authority: "Works independently on most OT security tasks. Authority to lead assessments, design segmentation architectures, and recommend compensating controls. Makes risk-based decisions on vulnerability prioritization. Escalates decisions that could impact production availability or safety systems."
      communication_stakeholder: "Regular engagement with facility managers, control system engineers, and IT security leadership. Presents risk assessments and remediation plans to plant management. Coordinates with vendors on ICS patches and updates. Communicates with regulatory bodies on compliance matters."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Control Systems Engineering, Computer Science, or related field with 4-6 years of OT security or related experience, OR equivalent combination of industrial engineering and security experience."
      certifications:
        - "GICSP (GIAC Global Industrial Cyber Security Professional)"
        - "GRID (GIAC Response and Industrial Defense)"
        - "ISA/IEC 62443 Cybersecurity Certificate Program"
        - "Certified SCADA Security Architect (CSSA)"
      salary:
        us_government: "$95,000 - $125,000 (GS-12 to GS-13)"
        us_startup: "$115,000 - $155,000"
        us_corporate: "$110,000 - $150,000"
        us_bigtech: "$250,000 - $400,000"

    - id: "eng4"
      title: "Eng 4 / Senior"
      general_description: "Senior OT security engineer and subject matter expert who leads complex, multi-facility OT security programs. Drives IEC 62443 compliance programs, develops OT security standards, and leads incident response in critical infrastructure environments. Deep expertise in industrial control systems enables them to understand the full attack chain from IT network intrusion through to safety system compromise. Trusted advisor to plant operations leadership on cyber-physical risk."
      primary_responsibilities:
        - "Lead enterprise-wide OT vulnerability management and risk reduction programs"
        - "Drive IEC 62443 compliance and zone/conduit modeling across facilities"
        - "Lead OT incident response and coordinate with ICS-CERT and sector ISACs"
        - "Design secure architectures for new industrial systems and facility expansions"
        - "Develop OT security standards, policies, and technical guidelines"
        - "Conduct advanced threat hunting in OT environments"
        - "Evaluate safety system (SIS) cyber protections and air-gap integrity"
        - "Lead vendor security assessments for ICS/SCADA product acquisitions"
        - "Develop and deliver OT security training for operations staff"
        - "Advise leadership on OT security investment priorities and risk posture"
      required_skills:
        - "Deep expertise in ICS/SCADA security across multiple vendor platforms"
        - "IEC 62443 compliance implementation and zone/conduit modeling"
        - "Advanced OT threat hunting and incident response"
        - "Safety instrumented system (SIS) security and SIL assessment"
        - "OT security program development and maturity assessment"
        - "Multi-facility OT security architecture and standards"
        - "Advanced industrial protocol analysis and vulnerability research"
        - "MITRE ATT&CK for ICS framework application"
        - "Executive-level risk communication for cyber-physical threats"
        - "Vendor management and ICS product security assessment"
      preferred_skills:
        - "Experience with TRITON/TRISIS-style safety system attacks"
        - "Red team assessment experience targeting ICS environments"
        - "NERC CIP, TSA Pipeline Security, or sector-specific regulation expertise"
        - "Industrial process knowledge (power generation, manufacturing, water treatment)"
        - "Testbed and simulation environment design for OT security validation"
      mentorship_requirements: "Mentors Mid and Junior engineers. Develops OT security career paths and training programs. Provides technical leadership across the OT security team. Expected to contribute to industry knowledge sharing through conference presentations or working groups."
      impact_scope: "Impacts OT security strategy and risk posture across multiple facilities or business units. Standards and architectures protect critical infrastructure operations. Incident response actions have direct implications for public safety and operational continuity. Influences capital expenditure decisions for security improvements."
      autonomy_decision_authority: "High autonomy in technical OT security decisions. Authority to define OT security standards and approve compensating controls. Makes risk acceptance recommendations to leadership. Can authorize emergency security measures during OT incidents. Decisions are reviewed for strategic alignment, not technical correctness."
      communication_stakeholder: "Regular engagement with facility directors, VP of Operations, and CISO. Presents OT risk posture to executive leadership and board committees. Coordinates with government agencies (CISA, ICS-CERT) and sector ISACs. Represents the organization at industry conferences and working groups."
      degree_equivalent: "Bachelor's or Master's degree in Electrical Engineering, Control Systems Engineering, Computer Science, or related field with 7-10 years of OT security experience, OR extensive industrial control systems experience combined with security expertise."
      certifications:
        - "GICSP (GIAC Global Industrial Cyber Security Professional)"
        - "GRID (GIAC Response and Industrial Defense)"
        - "ISA/IEC 62443 Cybersecurity Expert"
        - "CISSP with ICS domain knowledge"
        - "CSSA (Certified SCADA Security Architect)"
      salary:
        us_government: "$120,000 - $160,000 (GS-14 to GS-15)"
        us_startup: "$150,000 - $200,000"
        us_corporate: "$150,000 - $200,000"
        us_bigtech: "$350,000 - $530,000"

    - id: "eng5"
      title: "Eng 5 / Staff"
      general_description: "Staff-level OT security engineer with cross-team influence who builds OT security frameworks and methodologies used across the entire organization. Drives convergence of IT and OT security operations while respecting the unique requirements of operational technology. Develops reference architectures, assessment frameworks, and maturity models that standardize OT security practices across diverse facilities, industries, and control system vendors."
      primary_responsibilities:
        - "Build enterprise OT security frameworks and maturity models"
        - "Drive IT/OT security operations center (SOC) convergence strategy"
        - "Develop OT security reference architectures for new facility designs"
        - "Lead cross-functional OT security initiatives spanning multiple business units"
        - "Create OT-specific threat intelligence programs and sharing mechanisms"
        - "Define OT security metrics, KPIs, and reporting for executive dashboards"
        - "Architect secure remote access solutions for multi-site OT environments"
        - "Lead OT security aspects of M&A due diligence and integration"
        - "Develop and maintain OT security testbed and simulation environments"
        - "Drive OT security automation and orchestration initiatives"
      required_skills:
        - "Enterprise-scale OT security program design and implementation"
        - "IT/OT SOC convergence strategy and implementation"
        - "OT security maturity assessment and roadmap development"
        - "Multi-vendor ICS platform expertise (Siemens, Rockwell, Honeywell, Schneider Electric, ABB)"
        - "OT threat intelligence analysis and operationalization"
        - "Cross-industry OT security knowledge (energy, manufacturing, water, transportation)"
        - "OT security automation and orchestration (SOAR adaptation for OT)"
        - "Advanced OT network architecture across complex multi-site environments"
        - "Strategic risk communication for boards and C-suite"
        - "M&A OT security due diligence methodology"
      preferred_skills:
        - "OT security product evaluation and vendor strategy"
        - "Digital twin and simulation technology for security testing"
        - "OT cloud connectivity security (IIoT, edge computing)"
        - "Machine learning applications for OT anomaly detection"
        - "International OT security standards beyond IEC 62443"
      mentorship_requirements: "Mentors Senior and Mid-level OT security engineers across the organization. Develops organization-wide OT security training curricula. Guides career development for OT security professionals. Expected to contribute to industry through SANS, ISA, or similar organizations."
      impact_scope: "Influences OT security practices across the entire organization. Frameworks and reference architectures adopted across all facilities. IT/OT convergence decisions affect enterprise security operations. Work impacts organizational risk posture for critical infrastructure."
      autonomy_decision_authority: "Operates with high autonomy across organizational boundaries. Authority to define enterprise OT security standards and reference architectures. Influences capital budget allocation for OT security programs. Makes strategic technology decisions for OT security tooling. Reports to senior security or operations leadership."
      communication_stakeholder: "Regular engagement with CISO, CTO, VP Operations, and business unit leaders. Presents OT security strategy to board risk committees. Represents the organization in industry working groups and government advisory bodies. Coordinates across business units and regional operations."
      degree_equivalent: "Bachelor's or Master's degree in Electrical Engineering, Control Systems Engineering, Computer Science, or related field with 10-14 years of OT security and industrial systems experience, OR equivalent depth from combined engineering and security career."
      certifications:
        - "GICSP and GRID"
        - "ISA/IEC 62443 Cybersecurity Expert"
        - "CISSP"
        - "CSSA (Certified SCADA Security Architect)"
        - "Relevant sector certifications (NERC CIP, etc.)"
      salary:
        us_government: "$140,000 - $175,000 (GS-14 to GS-15)"
        us_startup: "$175,000 - $230,000"
        us_corporate: "$180,000 - $240,000"
        us_bigtech: "$400,000 - $600,000"

    - id: "eng6"
      title: "Eng 6 / Senior Staff"
      general_description: "Organization-wide OT security authority who defines the strategic direction for operational technology security across the enterprise. Drives enterprise IT/OT convergence strategy while ensuring OT-specific safety and availability requirements are preserved. Recognized internally and externally as a leading authority on ICS/OT security. Shapes the organization's approach to securing critical infrastructure against nation-state and sophisticated threats."
      primary_responsibilities:
        - "Define enterprise-wide OT security strategy and multi-year roadmap"
        - "Lead IT/OT convergence strategy ensuring safety and availability preservation"
        - "Establish OT security governance frameworks across all business units"
        - "Drive organizational response to nation-state OT threats (PIPEDREAM, TRITON, Industroyer)"
        - "Define OT security requirements for enterprise digital transformation initiatives"
        - "Lead OT security aspects of enterprise risk management and insurance"
        - "Establish OT security vendor strategy and technology partnerships"
        - "Represent the organization to government agencies on critical infrastructure protection"
        - "Drive OT security innovation and emerging technology adoption"
        - "Advise C-suite on OT cyber-physical risk and business continuity"
      required_skills:
        - "Enterprise OT security strategy development and execution"
        - "IT/OT convergence leadership with deep understanding of both domains"
        - "Nation-state OT threat landscape and advanced persistent threat defense"
        - "Critical infrastructure regulatory landscape across sectors"
        - "OT security governance and organizational design"
        - "Enterprise risk management for cyber-physical systems"
        - "Executive and board communication on OT risk"
        - "OT security innovation and emerging technology evaluation (IIoT, 5G, edge)"
        - "Multi-sector OT security expertise"
        - "Vendor and technology partnership strategy"
      preferred_skills:
        - "Published research or thought leadership in OT security"
        - "Government advisory board participation (CISA, sector coordinating councils)"
        - "OT security program design for global organizations"
        - "Operational technology insurance and risk transfer strategy"
        - "Digital transformation security architecture for industrial organizations"
      mentorship_requirements: "Mentors Staff and Senior engineers on strategic thinking and leadership. Develops the next generation of OT security leaders within the organization. Expected to actively contribute to the broader OT security community through publications, conference keynotes, and standards development."
      impact_scope: "Shapes the entire organization's OT security posture and strategy. Decisions affect critical infrastructure protection at an enterprise scale. IT/OT convergence strategy impacts every business unit. External engagement influences sector-wide security practices."
      autonomy_decision_authority: "Operates as the organization's highest OT security technical authority. Authority to set enterprise OT security policy and strategy. Influences board-level risk decisions related to operational technology. Can direct emergency response across all OT environments. Strategic decisions are aligned with CISO and CTO."
      communication_stakeholder: "Direct engagement with CISO, CTO, COO, and board of directors. Represents the organization to CISA, DHS, and sector-specific regulators. Keynotes at industry conferences (S4, SANS ICS Summit). Participates in government advisory councils and standards bodies."
      degree_equivalent: "Master's degree or equivalent in Electrical Engineering, Control Systems, Computer Science, or related field with 14-18 years of OT security and industrial systems experience. Recognized as an authority in OT security."
      certifications:
        - "GICSP, GRID, and advanced SANS ICS certifications"
        - "ISA/IEC 62443 Cybersecurity Expert"
        - "CISSP or CISM"
        - "Relevant sector-specific certifications"
        - "Industry recognition and advisory board memberships"
      salary:
        us_government: "$150,000 - $191,000 (GS-15 to SES)"
        us_startup: "$210,000 - $280,000"
        us_corporate: "$220,000 - $280,000"
        us_bigtech: "$500,000 - $720,000"

    - id: "eng7"
      title: "Eng 7 / Principal"
      general_description: "Industry-defining OT security expert whose work shapes how the entire field approaches industrial control system security. Contributions fundamentally advance the state of OT security through novel research, standards development, or transformative security architectures. Known throughout the ICS security community as a top authority. May hold named positions such as Distinguished Engineer or Fellow. Influence extends across industry, government, and academia."
      primary_responsibilities:
        - "Shape industry direction for OT/ICS security through research and standards"
        - "Define next-generation OT security architectures and methodologies"
        - "Lead industry-wide responses to critical OT threats and vulnerabilities"
        - "Contribute to national and international ICS security standards (IEC 62443, NIST)"
        - "Advise government agencies on critical infrastructure cyber defense"
        - "Drive fundamental innovation in OT security detection and response"
        - "Publish groundbreaking research on ICS vulnerabilities and defenses"
        - "Shape organizational security strategy at the highest level"
        - "Build and lead world-class OT security research and engineering teams"
        - "Define the future of secure industrial automation and Industry 4.0"
      required_skills:
        - "Industry-recognized OT security expertise and thought leadership"
        - "Deep expertise across multiple industrial sectors and control system platforms"
        - "Original research contributions to ICS security"
        - "Standards development experience (IEC 62443, NIST SP 800-82, ISA)"
        - "Government advisory experience on critical infrastructure protection"
        - "Ability to anticipate and address emerging OT threat landscapes"
        - "Vision for secure industrial digital transformation"
        - "Executive influence and strategic communication at the highest levels"
        - "Building and leading elite OT security teams"
        - "Cross-disciplinary expertise spanning cybersecurity, control systems, and safety engineering"
      preferred_skills:
        - "Named researcher with published CVEs or advisories in ICS products"
        - "Author of widely adopted OT security tools, frameworks, or methodologies"
        - "Academic collaboration and research direction"
        - "Patent holder in OT security technology"
        - "International standards committee leadership"
      mentorship_requirements: "Mentors at all levels across the organization and industry. Develops OT security talent pipelines through academic partnerships and training programs. Influences the next generation of OT security professionals through publications, teaching, and community engagement. Expected to give back to the industry at a fundamental level."
      impact_scope: "Industry-wide impact on OT security practices and standards. Research and frameworks adopted across critical infrastructure sectors globally. Influences national and international policy on critical infrastructure protection. Contributions fundamentally advance the field of ICS security."
      autonomy_decision_authority: "Fully autonomous in defining OT security technical direction. Authority to commit organizational resources to strategic security initiatives. Decisions shape industry standards and best practices. Peer to senior executives on matters of critical infrastructure security."
      communication_stakeholder: "Engages with CEOs, boards of directors, government officials, and international standards bodies. Keynotes at premier ICS security conferences (S4, SANS ICS Summit, DEF CON ICS Village). Advises national cybersecurity leadership. Publishes widely cited research and frameworks."
      degree_equivalent: "Master's or Ph.D. in Electrical Engineering, Control Systems, Computer Science, or related field with 18+ years of OT security experience, OR equivalent through exceptional and recognized contributions to ICS security. Industry recognition is paramount."
      certifications:
        - "Certifications are secondary to demonstrated expertise and industry recognition"
        - "GICSP, GRID, and advanced ICS security certifications"
        - "ISA Fellow or equivalent professional recognition"
        - "Standards committee memberships (IEC, ISA, NIST)"
        - "Advisory board positions with government agencies or industry bodies"
      salary:
        us_government: "$170,000 - $191,000+ (GS-15 Step 10 to SES)"
        us_startup: "$250,000 - $350,000+"
        us_corporate: "$260,000 - $350,000+"
        us_bigtech: "$600,000 - $1,000,000+"

otsec_architect:
  name: "OT Security Architect"
  description: "Strategic technical leaders who design security architectures for converged IT/OT environments. Focus on Purdue Model implementation, IEC 62443 compliance, OT network architecture, secure remote access for industrial environments, and aligning OT security with enterprise security strategy. Architects bridge the gap between traditional enterprise security architecture and the unique safety, availability, and protocol requirements of industrial control systems."
  nice_mapping:
    work_roles:
      - id: "SP-ARC-002"
        name: "Security Architect"
    strength: "partial"
    notes: "NICE's architecture role is IT-focused. OT security architecture requires specialized knowledge of Purdue Model, IEC 62443, and industrial protocol security."
  levels:
    - id: "arch1"
      title: "Architect 1 / Entry"
      general_description: "Entry-level OT security architect learning the principles of industrial control system architecture and security design for operational technology environments. Assists with architecture documentation, Purdue Model assessments, and security design reviews. Develops foundational understanding of how industrial systems are architected and why their security requirements differ fundamentally from IT systems."
      primary_responsibilities:
        - "Assist with documenting existing OT network architectures"
        - "Learn Purdue Model concepts and zone/conduit mapping"
        - "Support security design reviews for OT projects"
        - "Document OT security architecture decisions and rationale"
        - "Research IEC 62443 standards and compliance requirements"
        - "Assist with OT asset classification and criticality assessment"
        - "Learn industrial network design principles"
        - "Shadow senior architects on OT security architecture reviews"
      required_skills:
        - "Understanding of network architecture principles"
        - "Familiarity with the Purdue Model for ICS networks"
        - "Basic knowledge of industrial control system components (PLCs, HMIs, SCADA, DCS)"
        - "Understanding of network segmentation concepts"
        - "Knowledge of firewall and DMZ architecture"
        - "Documentation and diagramming skills (Visio, draw.io)"
        - "Basic understanding of industrial protocols"
      preferred_skills:
        - "Background in control systems or industrial engineering"
        - "Familiarity with IEC 62443 standard framework"
        - "Experience with enterprise architecture frameworks (TOGAF, SABSA)"
        - "Basic understanding of safety systems and SIL concepts"
        - "Exposure to OT vendor platforms (Siemens, Rockwell, Honeywell)"
      mentorship_requirements: "Receives direct mentorship from Senior OT security architects. Shadows on architecture reviews and Purdue Model assessments. Expected to develop foundational understanding of industrial processes and safety considerations within first 6 months. Must learn how OT architecture constraints differ from IT."
      impact_scope: "Individual contributor on documentation and research tasks. Impact limited to supporting architecture deliverables. Work is reviewed by senior architects before use in design decisions. Contributes to architecture team effectiveness."
      autonomy_decision_authority: "Works under close supervision. Follows established architecture standards and templates. No authority to make OT architecture decisions independently. Escalates all design questions to senior architects."
      communication_stakeholder: "Primarily internal communication with OT security architecture team. Documents findings and research. Participates in architecture review meetings as observer. Limited stakeholder interaction outside immediate team."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Control Systems Engineering, Computer Science, or related field, OR 3-4 years of OT/ICS experience or IT architecture experience with interest in OT. Understanding of industrial system architecture concepts."
      certifications:
        - "ISA/IEC 62443 Cybersecurity Certificate Program - Fundamentals"
        - "GICSP (in progress)"
        - "Network architecture certifications (CCNA, etc.)"
        - "TOGAF Foundation"
      salary:
        us_government: "$80,000 - $105,000 (GS-11 to GS-12)"
        us_startup: "$95,000 - $125,000"
        us_corporate: "$90,000 - $120,000"
        us_bigtech: "$140,000 - $220,000"

    - id: "arch2"
      title: "Architect 2 / Junior"
      general_description: "Junior OT security architect capable of contributing to OT security design work and conducting Purdue Model assessments with guidance. Demonstrates proficiency in OT network architecture patterns and can participate in design reviews for industrial environments. Understands the critical importance of maintaining safety and availability in all architectural decisions."
      primary_responsibilities:
        - "Conduct Purdue Model assessments for existing OT environments"
        - "Contribute to OT network segmentation architecture designs"
        - "Perform security design reviews for OT projects and upgrades"
        - "Develop zone and conduit diagrams per IEC 62443"
        - "Create OT security architecture documentation and standards"
