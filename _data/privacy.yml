# Privacy Professional Titles
# Data file for Jekyll-based security titles standardization

privacy_analyst:
  name: "Privacy Analyst"
  description: "Professionals who manage data privacy compliance, conduct privacy impact assessments, handle data subject requests, develop privacy policies, and ensure organizational adherence to privacy regulations (GDPR, CCPA/CPRA, HIPAA, state privacy laws). Focus on regulatory compliance, privacy program operations, and bridging legal requirements with technical implementation. Distinct from GRC compliance analysts who focus broadly on security frameworks — privacy analysts specialize in data protection law and individual rights."
  nice_mapping:
    work_roles:
      - id: "OV-LGA-002"
        name: "Privacy Officer/Privacy Compliance Manager"
    strength: "strong"
    notes: "Good overlap with NICE's privacy compliance role, though NICE frames it at the officer/manager level rather than as a full career ladder."
  levels:
    - id: "analyst1"
      title: "Analyst 1 / Entry"
      general_description: "Entry-level privacy analyst learning the fundamentals of data protection law and privacy program operations. Assists with data subject access requests (DSARs), supports privacy impact assessments (PIAs), and helps maintain records of processing activities (RoPAs). Develops foundational understanding of GDPR, CCPA/CPRA, HIPAA, and emerging state privacy laws."
      primary_responsibilities:
        - "Process routine data subject access requests (DSARs) following established procedures"
        - "Assist senior analysts with privacy impact assessments (PIAs)"
        - "Help maintain records of processing activities (RoPAs)"
        - "Track DSAR response deadlines and escalate overdue items"
        - "Document privacy incidents and assist with initial triage"
        - "Maintain privacy policy document repositories"
        - "Support cookie consent and notice management audits"
        - "Assist with data inventory and data mapping exercises"
        - "Shadow senior analysts on regulatory correspondence"
        - "Complete privacy awareness training modules"
      required_skills:
        - "Basic understanding of GDPR, CCPA/CPRA, and HIPAA principles"
        - "Familiarity with data subject rights (access, deletion, portability)"
        - "Documentation and organizational skills"
        - "Attention to detail for handling personal data"
        - "Basic understanding of data classification concepts"
        - "Written communication skills"
        - "Spreadsheet proficiency for tracking DSARs and deadlines"
      preferred_skills:
        - "Exposure to OneTrust, TrustArc, or similar privacy management platforms"
        - "Paralegal or legal research background"
        - "Basic understanding of data flows and system architectures"
        - "Familiarity with NIST Privacy Framework"
        - "Experience with ticketing systems for request tracking"
      mentorship_requirements: "Receives direct mentorship from Senior privacy analysts. Shadows on PIAs, DSAR escalations, and regulatory discussions. Expected to complete IAPP CIPP/US or CIPP/E study within first year. Learns the regulatory landscape and how privacy intersects with security, legal, and product teams."
      impact_scope: "Individual contributor on assigned privacy tasks. Impact limited to supporting DSAR processing and PIA documentation. Work is reviewed before any external communication. Supports overall privacy program coverage."
      autonomy_decision_authority: "Works under close supervision. Follows established DSAR processing procedures. Limited authority to make privacy determinations independently. Escalates all regulatory interpretation questions and complex DSAR responses to senior analysts."
      communication_stakeholder: "Primarily internal communication with privacy and legal teams. Documents findings and tracks DSAR status. Limited direct interaction with data subjects or regulators initially."
      degree_equivalent: "Bachelor's degree in Legal Studies, Information Systems, Cybersecurity, Political Science, or related field, OR 1-2 years of legal, compliance, or IT experience."
      certifications:
        - "IAPP CIPP/US or CIPP/E (in progress)"
        - "CompTIA Security+ (helpful)"
        - "NIST Privacy Framework awareness training"
        - "GDPR Foundation certificate"
      salary:
        us_government: "$55,000 - $75,000 (GS-7 to GS-9)"
        us_startup: "$60,000 - $85,000"
        us_corporate: "$60,000 - $85,000"
        us_bigtech: "$120,000 - $185,000"

    - id: "analyst2"
      title: "Analyst 2 / Junior"
      general_description: "Junior privacy analyst capable of independently processing DSARs, conducting basic PIAs, and maintaining privacy documentation. Demonstrates working knowledge of primary privacy regulations and can identify common privacy risks in business processes. Begins contributing to privacy notices, cookie compliance, and vendor data processing agreements."
      primary_responsibilities:
        - "Independently process standard DSARs end-to-end"
        - "Conduct basic privacy impact assessments for low-risk processing activities"
        - "Maintain and update records of processing activities (RoPAs)"
        - "Review vendor data processing agreements (DPAs) against standard terms"
        - "Draft privacy notice updates for routine changes"
        - "Monitor privacy regulatory developments and summarize for the team"
        - "Support cookie consent audits and remediation"
        - "Assist with privacy incident response documentation"
        - "Coordinate with IT teams on data retention schedule implementation"
        - "Help manage consent management platform configurations"
      required_skills:
        - "Working knowledge of GDPR, CCPA/CPRA, and HIPAA requirements"
        - "DSAR processing and response drafting"
        - "Privacy impact assessment methodology"
        - "Data processing agreement review"
        - "Privacy notice drafting"
        - "Records of processing activities management"
        - "Privacy incident documentation"
        - "Stakeholder communication on privacy matters"
      preferred_skills:
        - "OneTrust or TrustArc platform experience"
        - "Familiarity with multiple state privacy laws (Virginia VCDPA, Colorado CPA, etc.)"
        - "Cross-border data transfer mechanisms (SCCs, BCRs)"
        - "Consent management platform administration"
        - "Data mapping tool experience"
      mentorship_requirements: "Receives guidance from Senior analysts on complex PIAs and regulatory interpretation. Expected to begin informally mentoring Entry-level analysts on DSAR processing. Contributes to procedure documentation. Should be developing expertise in specific regulations or industry verticals."
      impact_scope: "Directly contributes to organizational privacy compliance. Responsible for timely and accurate DSAR responses. Privacy assessments influence product and process decisions. Beginning to influence privacy program practices."
      autonomy_decision_authority: "Works with moderate supervision. Can process routine DSARs and conduct standard PIAs independently. Authority to draft privacy notices for review. Escalates complex regulatory interpretation, cross-border transfer questions, and high-risk processing decisions."
      communication_stakeholder: "Regular interaction with business unit data owners. Coordinates with IT on data discovery for DSARs. Communicates with vendors on DPA terms. Beginning to field internal privacy questions from business teams."
      degree_equivalent: "Bachelor's degree in relevant field, OR 2-4 years of privacy, legal, compliance, or information security experience. Demonstrated ability to process DSARs and conduct PIAs."
      certifications:
        - "IAPP CIPP/US or CIPP/E"
        - "IAPP CIPM (in progress)"
        - "OneTrust or TrustArc certified practitioner"
        - "CDPSE (helpful)"
      salary:
        us_government: "$70,000 - $95,000 (GS-9 to GS-11)"
        us_startup: "$80,000 - $110,000"
        us_corporate: "$80,000 - $110,000"
        us_bigtech: "$160,000 - $260,000"

    - id: "analyst3"
      title: "Analyst 3 / Mid"
      general_description: "Experienced privacy analyst who independently leads privacy impact assessments, manages complex DSARs, and drives privacy compliance projects. Expert at interpreting privacy regulations and applying them to business operations. Leads data mapping initiatives, manages privacy incidents, and mentors junior analysts. Serves as a primary privacy point of contact for business units."
      primary_responsibilities:
        - "Lead privacy impact assessments and data protection impact assessments (DPIAs) for high-risk processing"
        - "Manage complex and escalated DSARs including cross-jurisdictional requests"
        - "Lead enterprise data mapping and data inventory initiatives"
        - "Manage privacy incident response from detection through regulatory notification decisions"
        - "Develop and update privacy policies and procedures"
        - "Review and negotiate data processing agreements with key vendors"
        - "Conduct privacy compliance gap assessments against new regulations"
        - "Advise product teams on privacy-by-design requirements"
        - "Mentor junior privacy analysts"
        - "Lead cross-border data transfer impact assessments"
        - "Build privacy metrics and compliance dashboards"
      required_skills:
        - "Advanced knowledge of GDPR, CCPA/CPRA, HIPAA, and emerging state privacy laws"
        - "DPIA methodology and execution for high-risk processing"
        - "Privacy incident management and breach notification requirements"
        - "Cross-border data transfer mechanisms (SCCs, adequacy decisions, BCRs, Transfer Impact Assessments)"
        - "Data mapping and data flow analysis"
        - "Privacy-by-design advisory"
        - "Vendor privacy risk assessment"
        - "NIST Privacy Framework implementation"
      preferred_skills:
        - "OneTrust, BigID, or Securiti platform administration"
        - "International privacy law expertise (Brazil LGPD, Canada PIPEDA, China PIPL)"
        - "Children's privacy (COPPA, Age Appropriate Design Code)"
        - "Health data privacy beyond HIPAA (state health privacy laws)"
        - "Privacy program metrics and reporting"
      mentorship_requirements: "Primary mentor for Junior and Entry analysts. Leads training on PIA/DPIA methodology and regulatory interpretation. Expected to develop team procedures and assessment templates. Establishes reputation as subject matter expert in specific privacy domains or regulations."
      impact_scope: "Shapes organizational privacy practices. PIAs and DPIAs directly influence product design and data processing decisions. Privacy incident management protects organizational reputation. Data mapping provides foundational visibility into personal data processing across the enterprise."
      autonomy_decision_authority: "Works independently with strategic guidance. Makes significant privacy assessment decisions. Authority over PIA/DPIA methodology and standard DPA terms. Consulted on breach notification decisions and high-risk processing approvals."
      communication_stakeholder: "Regular communication with product, engineering, legal, and business leadership on privacy matters. Presents privacy compliance status to management. Primary privacy contact for business units. Coordinates with regulators on routine inquiries."
      degree_equivalent: "Bachelor's degree in relevant field, OR 4-6 years of privacy, legal, or compliance experience. Demonstrated track record of leading PIAs and managing privacy incidents. JD or Master's degree may substitute for some experience."
      certifications:
        - "IAPP CIPP/US and/or CIPP/E"
        - "IAPP CIPM"
        - "ISACA CDPSE"
        - "CIPT (helpful)"
      salary:
        us_government: "$90,000 - $120,000 (GS-12 to GS-13)"
        us_startup: "$110,000 - $145,000"
        us_corporate: "$100,000 - $140,000"
        us_bigtech: "$240,000 - $380,000"

    - id: "analyst4"
      title: "Analyst 4 / Senior"
      general_description: "Senior privacy analyst and team leader who defines privacy compliance strategy and manages complex regulatory challenges. Expert at navigating multi-jurisdictional privacy requirements and advising executive leadership on regulatory risk. Leads the most sensitive privacy matters including regulatory investigations, large-scale breach responses, and strategic data processing decisions. Builds privacy programs that enable business innovation while protecting individual rights."
      primary_responsibilities:
        - "Define privacy compliance strategy across multiple jurisdictions"
        - "Lead regulatory investigation responses and DPA engagement"
        - "Manage large-scale breach notification processes across jurisdictions"
        - "Advise executive leadership on privacy regulatory risk and strategy"
        - "Lead privacy due diligence for M&A transactions"
        - "Develop and mature the enterprise privacy program"
        - "Mentor and develop privacy analyst team"
        - "Design privacy compliance frameworks for new markets and products"
        - "Evaluate and select privacy management technology platforms"
        - "Lead strategic vendor privacy negotiations"
        - "Drive privacy-by-design integration into product development lifecycle"
      required_skills:
        - "Multi-jurisdictional privacy law expertise"
        - "Regulatory engagement and investigation response"
        - "Breach notification strategy across jurisdictions"
        - "Executive communication on privacy risk"
        - "Privacy program development and maturity assessment"
        - "Team leadership and development"
        - "M&A privacy due diligence"
        - "Privacy technology evaluation and implementation"
      preferred_skills:
        - "Direct regulatory engagement experience (DPA consultations, Article 36 prior consultation)"
        - "Published privacy research or guidance"
        - "Industry working group participation (IAPP, FPF)"
        - "Legislative and rulemaking comment experience"
        - "Privacy certification body involvement"
      mentorship_requirements: "Primary mentor for Mid and Junior analysts. Responsible for team career development. Creates privacy training programs and assessment frameworks. Mentors through industry engagement (IAPP chapters, FPF). Shapes organizational privacy culture and competency."
      impact_scope: "Defines privacy program capabilities and strategic direction. Privacy strategy directly impacts business ability to operate across jurisdictions. Regulatory relationships influence enforcement posture. Team development impacts privacy program maturity."
      autonomy_decision_authority: "High autonomy with strategic alignment. Makes significant privacy program and compliance decisions. Authority over privacy standards, assessment methodology, and vendor DPA terms. Trusted to advise on breach notification decisions and regulatory strategy at the highest levels."
      communication_stakeholder: "Executive and board-level communication on privacy risk and compliance. Represents privacy function to organizational leadership and external regulators. Builds relationships with industry peers and privacy thought leaders. Engages directly with data protection authorities."
      degree_equivalent: "Bachelor's or Master's degree in relevant field, or JD with privacy specialization, OR 6-10 years of privacy or data protection experience. Demonstrated program leadership and regulatory engagement. CIPP Fellow designation or equivalent recognition valued."
      certifications:
        - "IAPP CIPP/US and CIPP/E"
        - "IAPP CIPM"
        - "IAPP Fellow designation (valued)"
        - "ISACA CDPSE"
      salary:
        us_government: "$115,000 - $155,000 (GS-13 to GS-14)"
        us_startup: "$140,000 - $190,000 + equity"
        us_corporate: "$140,000 - $185,000"
        us_bigtech: "$330,000 - $520,000"

    - id: "analyst5"
      title: "Analyst 5 / Staff"
      general_description: "Distinguished privacy professional who shapes organizational and cross-functional privacy practices at scale. Recognized internally as the authoritative voice on privacy compliance strategy. Builds privacy frameworks, assessment methodologies, and compliance programs that are adopted across teams and business units. Drives privacy program innovation and influences how the organization approaches data protection challenges."
      primary_responsibilities:
        - "Define multi-year privacy program vision and roadmap"
        - "Build privacy compliance frameworks adopted across the organization"
        - "Lead privacy strategy for emerging technology (AI/ML, biometrics, IoT)"
        - "Design scalable privacy assessment and DSAR fulfillment processes"
        - "Drive cross-functional privacy governance model"
        - "Lead organizational response to major regulatory changes"
        - "Develop privacy risk quantification methodologies"
        - "Shape data ethics frameworks and responsible data use policies"
        - "Advise on privacy implications of new business models and markets"
        - "Establish metrics framework measuring privacy program effectiveness"
        - "Drive privacy-enhancing technology adoption strategy"
      required_skills:
        - "Privacy program strategy and multi-year planning"
        - "Framework development and organizational adoption"
        - "Emerging technology privacy analysis (AI, biometrics, adtech)"
        - "Cross-functional governance design"
        - "Privacy risk quantification"
        - "Organizational change management for privacy"
        - "Regulatory trend analysis and strategic planning"
        - "Data ethics and responsible data use"
      preferred_skills:
        - "AI governance and algorithmic accountability frameworks"
        - "Privacy-enhancing technology evaluation (PETs)"
        - "Academic or conference publication on privacy topics"
        - "Regulatory advisory panel participation"
        - "International standards body contribution (ISO 27701, etc.)"
      mentorship_requirements: "Mentors Senior analysts toward leadership roles. Develops privacy competency models for the organization. Leads privacy community of practice. Expected to mentor externally through IAPP, FPF, or similar organizations. Drives knowledge sharing across teams."
      impact_scope: "Privacy frameworks and methodologies are adopted organization-wide. Privacy strategy enables market expansion and product innovation. Governance models shape how the entire organization handles personal data. Regulatory preparedness reduces organizational exposure."
      autonomy_decision_authority: "Operates with significant autonomy. Defines privacy compliance approach and methodology. Authority to set privacy standards that other teams follow. Trusted advisor to CISO and CPO on privacy strategy and regulatory positioning."
      communication_stakeholder: "Communicates privacy strategy to executive leadership and board. Engages with regulators on strategic matters. Represents the organization at industry privacy forums. Influences cross-functional leadership on privacy priorities."
      degree_equivalent: "Master's degree or JD with privacy focus, OR 8-12 years of progressive privacy experience. Recognized expertise in privacy program leadership. Publications or speaking engagements valued."
      certifications:
        - "IAPP CIPP/US, CIPP/E, and CIPM"
        - "IAPP Fellow (valued)"
        - "ISACA CDPSE"
        - "Industry recognition often substitutes for additional certifications"
      salary:
        us_government: "$135,000 - $175,000 (GS-14 to GS-15)"
        us_startup: "$160,000 - $220,000 + equity"
        us_corporate: "$170,000 - $230,000"
        us_bigtech: "$400,000 - $600,000"

    - id: "analyst6"
      title: "Analyst 6 / Senior Staff"
      general_description: "Organization-wide privacy authority who defines the strategic direction of the privacy program and serves as the definitive internal expert on privacy regulatory strategy. Shapes how the organization positions itself relative to regulators, industry bodies, and evolving privacy expectations. Bridges privacy compliance, legal strategy, business objectives, and technical capabilities at the highest level. May serve as or directly support the Data Protection Officer (DPO) function."
      primary_responsibilities:
        - "Set organization-wide privacy strategy and regulatory positioning"
        - "Serve as or directly support the DPO function for complex organizations"
        - "Lead privacy strategy through transformative business changes (IPO, international expansion, major acquisitions)"
        - "Develop organizational positions on proposed privacy legislation and rulemaking"
        - "Build and lead cross-functional privacy governance councils"
        - "Drive privacy culture transformation across the enterprise"
        - "Manage strategic regulatory relationships with key data protection authorities"
        - "Define the organization's data ethics principles and responsible AI governance"
        - "Lead privacy strategy for enterprise-wide digital transformation initiatives"
        - "Architect the organizational privacy operating model"
      required_skills:
        - "Enterprise privacy strategy and regulatory positioning"
        - "DPO-level expertise across multiple jurisdictions"
        - "Executive and board-level advisory on privacy matters"
        - "Privacy operating model design"
        - "Strategic regulatory relationship management"
        - "Data ethics and responsible technology governance"
        - "Organizational transformation leadership"
        - "Multi-jurisdictional privacy program management"
      preferred_skills:
        - "Legislative and rulemaking engagement (testimony, comment letters)"
        - "Privacy program design for IPO or public company readiness"
        - "Academic contributions to privacy scholarship"
        - "Standards body leadership (ISO, NIST)"
        - "Privacy technology venture evaluation"
      mentorship_requirements: "Mentors Staff and Senior analysts toward strategic leadership. Sponsors privacy talent development programs. Serves as thought leader through external publications and keynotes. Shapes the next generation of privacy leaders within the organization and industry."
      impact_scope: "Defines the organization's privacy identity and regulatory posture. Privacy strategy directly enables or constrains business operations across markets. Regulatory relationships influence enforcement approach. Sets data ethics standards that shape organizational culture."
      autonomy_decision_authority: "Near-complete autonomy on privacy strategy. Defines organizational privacy posture and regulatory engagement approach. Authority to commit the organization on privacy positions. Trusted to represent the organization to regulators, legislators, and industry bodies."
      communication_stakeholder: "Board-level communication on privacy strategy and regulatory risk. Direct engagement with data protection authorities and legislators. Keynote-level industry presence. Advises CEO and board on privacy-critical business decisions."
      degree_equivalent: "JD or Master's degree with extensive privacy focus, OR 12-16 years of progressive privacy leadership. Nationally or internationally recognized privacy expertise. Academic publications or significant industry contributions expected."
      certifications:
        - "IAPP Fellow designation"
        - "IAPP CIPP/US, CIPP/E, CIPM, CIPT (multiple held)"
        - "Industry recognition and thought leadership substitutes for certifications at this level"
        - "Bar admission with privacy specialty (for JD holders)"
      salary:
        us_government: "$150,000 - $191,000 (GS-15 to SES)"
        us_startup: "$200,000 - $280,000 + significant equity"
        us_corporate: "$210,000 - $280,000"
        us_bigtech: "$520,000 - $720,000"

    - id: "analyst7"
      title: "Analyst 7 / Principal"
      general_description: "Industry-defining privacy expert whose work shapes how the privacy profession, regulators, and organizations approach data protection. Operates at the intersection of privacy law, technology, policy, and ethics. Contributions influence regulatory frameworks, industry standards, and the trajectory of the privacy field. Equivalent to a Chief Privacy Officer at major organizations or a recognized authority whose work is cited by regulators and legislators."
      primary_responsibilities:
        - "Shape industry standards and regulatory frameworks for data protection"
        - "Define privacy strategy for the largest and most complex organizations"
        - "Advise regulators, legislators, and standards bodies on privacy policy"
        - "Pioneer new approaches to privacy challenges (AI governance, cross-border data flows, children's privacy)"
        - "Publish influential research advancing the privacy field"
        - "Lead industry coalitions on privacy standards and best practices"
        - "Serve as expert witness or advisor on landmark privacy matters"
        - "Define organizational privacy architecture for multinational enterprises"
        - "Drive convergence of privacy, security, ethics, and responsible technology"
        - "Shape executive and board understanding of privacy as strategic enabler"
      required_skills:
        - "Industry-defining privacy expertise recognized by peers and regulators"
        - "Privacy regulatory framework development and influence"
        - "Strategic advisory at board and C-suite level"
        - "Cross-disciplinary expertise spanning law, technology, and policy"
        - "Thought leadership through publication and public engagement"
        - "International privacy law mastery across major jurisdictions"
        - "Privacy technology landscape vision"
        - "Coalition building across industry, government, and academia"
      preferred_skills:
        - "Regulatory drafting or advisory experience"
        - "Academic appointment or research affiliation"
        - "Book-length publication on privacy topics"
        - "International recognition (IAPP Vanguard Award, similar honors)"
        - "Standards body leadership roles"
      mentorship_requirements: "Mentors the most senior privacy professionals in the organization and industry. Shapes privacy career frameworks and professional development standards. Advances the profession through teaching, publishing, and advocacy. Creates opportunities for emerging privacy leaders."
      impact_scope: "Industry-wide impact on privacy practices and standards. Work influences regulatory frameworks and enforcement priorities. Organizational privacy strategy sets the standard others follow. Shapes how the profession defines privacy excellence."
      autonomy_decision_authority: "Complete autonomy on privacy strategy and thought leadership. Defines the direction others follow. Authority is based on recognized expertise rather than organizational hierarchy. Trusted by regulators, industry, and academia as a definitive voice."
      communication_stakeholder: "Engages at the highest levels of government, industry, and academia. Board-level advisor to multiple organizations. Keynote speaker at major privacy conferences. Shapes public discourse on data protection and digital rights."
      degree_equivalent: "JD, PhD, or equivalent terminal degree with privacy specialization, OR 15+ years of privacy leadership with nationally or internationally recognized contributions. Academic and practitioner credentials often combined at this level."
      certifications:
        - "IAPP Fellow"
        - "Multiple IAPP certifications held"
        - "Certifications are secondary to demonstrated expertise, publication record, and industry recognition at this level"
        - "Honorary or advisory roles with certification bodies"
      salary:
        us_government: "$170,000 - $210,000+ (SES equivalent, may exceed standard scales for appointed roles)"
        us_startup: "$250,000 - $350,000 + significant equity"
        us_corporate: "$250,000 - $350,000+"
        us_bigtech: "$600,000 - $900,000+ (total compensation including equity; data is thin at this level and highly variable)"

privacy_engineer:
  name: "Privacy Engineer"
  description: "Technical professionals who implement privacy-by-design principles, build consent management and data subject request automation, develop data classification and discovery tools, implement de-identification and anonymization techniques, and integrate privacy controls into the SDLC. Focus on the technical infrastructure that enables privacy compliance at scale. Bridge the gap between privacy legal requirements and software engineering, building the systems that make privacy programs operationally feasible."
  nice_mapping:
    work_roles: []
    strength: "tenuous"
    notes: "No NICE equivalent. Privacy engineering combines software development, data architecture, and privacy law — a discipline NICE does not address."
  levels:
    - id: "eng1"
      title: "Eng 1 / Entry"
      general_description: "Entry-level privacy engineer learning the fundamentals of privacy-preserving system design and privacy technology implementation. Assists with data classification tagging, consent management platform configuration, and DSAR automation workflows. Develops foundational skills in data architecture, privacy-enhancing technologies (PETs), and the technical requirements of privacy regulations."
      primary_responsibilities:
        - "Assist with data classification and tagging implementations"
        - "Configure consent management platform rules and workflows"
        - "Support DSAR automation pipeline development"
        - "Help implement data retention and deletion scripts"
        - "Write unit tests for privacy control components"
        - "Assist with data discovery tool deployment and configuration"
        - "Document technical privacy controls and data flows"
        - "Support data inventory and data mapping tool integrations"
        - "Shadow senior engineers on privacy architecture reviews"
        - "Learn privacy-enhancing technology fundamentals"
      required_skills:
        - "Programming proficiency in Python, Java, or similar language"
        - "Basic understanding of databases and data modeling"
        - "Familiarity with GDPR, CCPA/CPRA technical requirements (deletion, portability, consent)"
        - "Version control (Git) and CI/CD fundamentals"
        - "API development basics (REST, webhooks)"
        - "Basic understanding of data classification concepts"
        - "Documentation skills for technical specifications"
      preferred_skills:
        - "Exposure to OneTrust, BigID, Securiti, or similar privacy platforms"
        - "Basic understanding of data anonymization concepts"
        - "Cloud platform fundamentals (AWS, GCP, Azure)"
        - "SQL and data query skills"
        - "Familiarity with data pipeline tools (Airflow, dbt)"
      mentorship_requirements: "Receives direct mentorship from Senior privacy engineers. Shadows on privacy architecture reviews and data flow assessments. Expected to build foundational understanding of both privacy regulations and software engineering practices. Learns how technical controls map to legal requirements."
      impact_scope: "Individual contributor on assigned privacy engineering tasks. Impact limited to implementing specific components of privacy tooling. Code is reviewed before deployment. Supports overall privacy infrastructure development."
      autonomy_decision_authority: "Works under close supervision. Follows established implementation patterns and coding standards. Limited authority to make privacy architecture decisions. Escalates design questions and regulatory interpretation to senior engineers."
      communication_stakeholder: "Primarily internal communication with privacy engineering team. Documents technical implementations. Limited direct interaction with privacy analysts or legal teams initially."
      degree_equivalent: "Bachelor's degree in Computer Science, Software Engineering, Information Systems, or related technical field, OR 1-2 years of software development experience with privacy exposure."
      certifications:
        - "IAPP CIPT (in progress)"
        - "Cloud platform associate certification (helpful)"
        - "CompTIA Security+ (helpful)"
        - "IAPP CIPP/US (helpful for regulatory context)"
      salary:
        us_government: "$60,000 - $80,000 (GS-7 to GS-9)"
        us_startup: "$70,000 - $100,000"
        us_corporate: "$70,000 - $95,000"
        us_bigtech: "$135,000 - $200,000"

    - id: "eng2"
      title: "Eng 2 / Junior"
      general_description: "Junior privacy engineer capable of independently implementing privacy controls and building components of privacy automation systems. Demonstrates proficiency in data discovery, consent management integration, and DSAR workflow automation. Contributes to privacy-by-design code reviews and builds data lineage tracking features."
      primary_responsibilities:
        - "Build and maintain DSAR automation workflows and data retrieval pipelines"
        - "Implement consent management integrations across services and platforms"
        - "Develop data classification and discovery rules using BigID, Securiti, or similar tools"
        - "Build data deletion and anonymization pipelines for right-to-erasure compliance"
        - "Implement data retention enforcement automation"
        - "Contribute to privacy-by-design code review checklists and tooling"
        - "Build APIs for consent propagation across microservices"
        - "Develop data lineage tracking for personal data flows"
        - "Support privacy-focused logging and audit trail implementation"
        - "Assist with privacy testing automation"
      required_skills:
        - "Solid software engineering skills in Python, Java, Go, or TypeScript"
        - "Database design and query optimization for privacy data operations"
        - "API design and integration (REST, GraphQL)"
        - "Data pipeline development (ETL/ELT)"
        - "Consent management platform integration"
        - "Data discovery and classification tool implementation"
        - "Understanding of data deletion patterns across storage systems"
        - "Cloud platform services (IAM, storage, compute)"
      preferred_skills:
        - "BigID, Securiti, or OneTrust developer APIs"
        - "Basic understanding of k-anonymity and l-diversity"
        - "Message queue and event-driven architecture (Kafka, SQS)"
        - "Container orchestration (Kubernetes, Docker)"
        - "Infrastructure as code (Terraform, CloudFormation)"
      mentorship_requirements: "Receives guidance from Senior engineers on architecture decisions and complex privacy implementations. Expected to begin mentoring Entry-level engineers on privacy tooling patterns. Contributes to privacy engineering documentation and runbooks. Should be developing expertise in specific privacy technology domains."
      impact_scope: "Directly contributes to organizational privacy automation capabilities. Responsible for reliable DSAR fulfillment pipelines and consent management integrations. Privacy tooling reduces manual effort and compliance risk. Beginning to influence privacy engineering practices."
      autonomy_decision_authority: "Works with moderate supervision. Can implement standard privacy controls and automation independently. Authority to make implementation decisions within established architecture. Escalates privacy architecture changes and novel regulatory technical requirements."
      communication_stakeholder: "Regular interaction with privacy analysts on DSAR requirements and consent rules. Coordinates with product engineering teams on privacy integrations. Communicates technical trade-offs to privacy program stakeholders."
      degree_equivalent: "Bachelor's degree in Computer Science or related technical field, OR 2-4 years of software engineering experience with privacy or data infrastructure focus."
      certifications:
        - "IAPP CIPT"
        - "IAPP CIPP/US or CIPP/E (helpful)"
        - "Cloud platform professional certification"
        - "ISACA CDPSE (helpful)"
