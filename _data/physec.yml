# Physical Security Professional Titles
# Data file for Jekyll-based security titles standardization
# Convergence of physical and cyber security disciplines

physical_security_engineer:
  name: "Physical Security Engineer"
  description: "Technical professionals who design, implement, and maintain converged physical-cyber security systems. Focus on access control systems (card readers, biometrics), video surveillance (CCTV/IP cameras, VMS platforms), intrusion detection, visitor management, and the cybersecurity of physical security infrastructure (IoT devices, building automation, security system networks). This is the technical/engineering side where physical security meets cybersecurity — securing the devices, networks, and integrations that protect physical spaces."
  nice_mapping:
    work_roles: []
    strength: "tenuous"
    notes: "NICE does not address physical security or converged physical-cyber security. This discipline sits at the intersection of physical security engineering and cybersecurity."
  levels:
    - id: "eng1"
      title: "Eng 1 / Entry"
      general_description: "Entry-level physical security engineer learning the fundamentals of converged physical-cyber security systems. Assists with installation, configuration, and maintenance of access control, video surveillance, and intrusion detection systems. Develops foundational understanding of how physical security devices operate on IP networks and the cybersecurity implications of connected physical security infrastructure."
      primary_responsibilities:
        - "Assist with installation and cabling of access control panels, card readers, and door hardware"
        - "Support IP camera deployment including network configuration and basic VMS setup"
        - "Perform routine maintenance on physical security systems (firmware checks, battery replacements, sensor testing)"
        - "Document physical security device inventories and network assignments"
        - "Monitor physical security system health dashboards for alerts and failures"
        - "Assist senior engineers with access control database management (adding/removing cardholders)"
        - "Learn to troubleshoot common issues with card readers, cameras, and door controllers"
        - "Maintain cable documentation and as-built drawings for security system installations"
      required_skills:
        - "Basic understanding of IP networking (TCP/IP, VLANs, DHCP, DNS)"
        - "Familiarity with physical access control concepts (card readers, credentials, door controllers)"
        - "Basic knowledge of video surveillance systems (IP cameras, NVRs, VMS)"
        - "Understanding of low-voltage wiring and structured cabling"
        - "Familiarity with Windows and Linux operating systems"
        - "Basic knowledge of cybersecurity principles (CIA triad, least privilege)"
        - "Documentation and organizational skills"
      preferred_skills:
        - "Exposure to access control platforms (Lenel/LenelS2, AMAG, HID Global)"
        - "Familiarity with IP camera manufacturers (Axis Communications, Hanwha, Verkada)"
        - "Basic understanding of PoE (Power over Ethernet) networks"
        - "Knowledge of physical security standards (UL 294, UL 2050)"
        - "Home lab or hands-on experience with IoT devices"
      mentorship_requirements: "Receives direct mentorship from Senior physical security engineers. Shadows on system installations and commissioning projects. Expected to complete vendor training for primary access control and VMS platforms within first 6 months. Learns the convergence philosophy of treating physical security devices as part of the cybersecurity attack surface."
      impact_scope: "Individual contributor on assigned installation and maintenance tasks. Impact limited to supporting system deployments under supervision. Work is reviewed before systems go live. Supports overall physical security infrastructure uptime."
      autonomy_decision_authority: "Works under close supervision. Follows established installation procedures and maintenance checklists. Limited authority to make configuration changes independently. Escalates all system issues and access requests to senior engineers."
      communication_stakeholder: "Primarily internal communication with physical security engineering team. May assist with documenting system configurations. Limited direct interaction with facilities management or security operations initially."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Computer Science, Information Technology, or related field, OR 1-2 years of experience in physical security installation, low-voltage systems, or IT infrastructure, OR completion of vendor-specific training programs (Lenel, Genetec, Milestone)."
      certifications:
        - "CompTIA Security+"
        - "CompTIA Network+"
        - "Lenel/LenelS2 Certified Technician"
        - "Axis Communications Certified Professional"
      salary:
        us_government: "$50,000 - $70,000 (GS-7 to GS-9)"
        us_startup: "$55,000 - $75,000"
        us_corporate: "$55,000 - $80,000"
        us_bigtech: "$110,000 - $175,000"

    - id: "eng2"
      title: "Eng 2 / Junior"
      general_description: "Junior physical security engineer capable of independently performing system installations, basic configurations, and troubleshooting for access control and video surveillance systems. Demonstrates proficiency with at least one major access control platform and understands the network security implications of physical security devices on the corporate network. Beginning to assess the cyber-attack surface of physical security infrastructure."
      primary_responsibilities:
        - "Install and configure access control systems including controllers, readers, and credential enrollment"
        - "Deploy and configure IP cameras with appropriate VMS integration and recording policies"
        - "Troubleshoot physical security system issues (door faults, camera failures, network connectivity)"
        - "Perform firmware updates and patching on physical security devices"
        - "Configure VLANs and network segmentation for physical security device networks"
        - "Manage cardholder databases and access level assignments"
        - "Conduct basic vulnerability assessments on physical security infrastructure"
        - "Support visitor management system operations and integrations"
        - "Maintain system documentation and standard operating procedures"
      required_skills:
        - "Proficiency with at least one access control platform (Lenel/LenelS2, Genetec Security Center, AMAG Symmetry)"
        - "Working knowledge of VMS platforms (Milestone XProtect, Genetec, Exacq)"
        - "IP camera configuration (Axis, Hanwha, Verkada) including stream settings and analytics"
        - "Network fundamentals including VLAN configuration and firewall rules for security devices"
        - "Physical security device troubleshooting (Wiegand, OSDP protocols)"
        - "Understanding of credential technologies (HID iCLASS, SEOS, mobile credentials)"
        - "Basic cybersecurity assessment of IoT and physical security devices"
        - "SQL database basics for access control system management"
      preferred_skills:
        - "Experience with OSDP (Open Supervised Device Protocol) implementation"
        - "Familiarity with building management system (BMS) integration"
        - "Network scanning tools (Nmap, Wireshark) for physical security networks"
        - "Understanding of encryption for physical security communications"
        - "Experience with intercom and mass notification systems"
      mentorship_requirements: "Receives guidance from Senior engineers on complex system integrations and cybersecurity assessments. Expected to begin mentoring Entry-level engineers informally on installations. Contributes to documentation and training materials. Should be developing expertise in specific platforms or convergence areas."
      impact_scope: "Directly contributes to physical security system availability and integrity. Responsible for accurate system configurations and device health. Beginning to identify cybersecurity risks in physical security infrastructure. Supports facility security operations."
      autonomy_decision_authority: "Works with moderate supervision. Can make routine configuration and maintenance decisions. Authority to troubleshoot and resolve standard system issues. Escalates complex integrations, architectural decisions, and cybersecurity findings."
      communication_stakeholder: "Regular interaction with facilities management and security operations teams. Presents system status and maintenance needs. Participates in project planning meetings. Coordinates with IT networking teams on device connectivity."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Computer Science, or related field, OR 2-4 years of physical security system installation and maintenance experience. Demonstrated proficiency with at least one major access control or VMS platform."
      certifications:
        - "ASIS Physical Security Professional (PSP)"
        - "Genetec Security Center Certified Professional"
        - "Milestone XProtect Certified Integration Technician"
        - "CompTIA Security+"
        - "HID Global Certified Installer"
      salary:
        us_government: "$65,000 - $90,000 (GS-9 to GS-11)"
        us_startup: "$70,000 - $95,000"
        us_corporate: "$70,000 - $100,000"
        us_bigtech: "$150,000 - $250,000"

    - id: "eng3"
      title: "Eng 3 / Mid"
      general_description: "Experienced physical security engineer who independently designs and implements converged physical-cyber security systems for facilities. Expert in multiple access control and VMS platforms with a strong understanding of how physical security devices create cybersecurity risk. Leads installation projects, conducts security assessments of physical security infrastructure, and ensures proper network segmentation and hardening of physical security systems. Bridges the gap between physical security operations and IT/cybersecurity teams."
      primary_responsibilities:
        - "Design and implement access control systems for new facilities or major renovations"
        - "Lead video surveillance system deployments including camera placement, analytics configuration, and storage sizing"
        - "Conduct cybersecurity assessments of physical security networks and devices"
        - "Implement network segmentation and hardening for physical security infrastructure"
        - "Integrate physical security systems with IT infrastructure (Active Directory, HR systems, SIEM)"
        - "Design and configure intrusion detection and alarm monitoring systems"
        - "Evaluate and pilot new physical security technologies and vendors"
        - "Mentor junior engineers on system design and cybersecurity best practices"
        - "Develop standard configurations and hardening guides for physical security devices"
        - "Manage physical security system upgrades and migration projects"
      required_skills:
        - "Expert-level proficiency with multiple access control platforms (Lenel/LenelS2, Genetec, AMAG)"
        - "Advanced VMS configuration including video analytics, license plate recognition, and facial detection"
        - "Network security for physical security systems (segmentation, encryption, monitoring)"
        - "Cybersecurity risk assessment of IoT and physical security devices"
        - "OSDP implementation and encrypted reader communication"
        - "Integration design (API, SDK, middleware) between physical security and IT systems"
        - "Project management for physical security system deployments"
        - "Understanding of NIST, ICS-CERT, and IoT security frameworks as applied to physical security"
      preferred_skills:
        - "Penetration testing of physical security systems and devices"
        - "Building automation system (BAS) security and integration"
        - "PSIM platform experience (Genetec Mission Control, CNL PSIM)"
        - "Scripting for physical security automation (Python, PowerShell)"
        - "Experience with converged SOC operations"
        - "Cloud-hosted physical security platforms (Verkada, Brivo, OpenPath)"
      mentorship_requirements: "Mentors junior engineers on system design, installation, and cybersecurity assessment. Expected to develop specialization in either a platform ecosystem or convergence domain. Receives guidance from Staff engineers on enterprise architecture decisions and complex integration challenges."
      impact_scope: "Leads physical security system implementations for individual facilities or campuses. Design decisions directly impact facility security posture and cybersecurity risk. Defines standard configurations used across the organization. Influences convergence practices between physical security and cybersecurity teams."
      autonomy_decision_authority: "Works independently on system design and implementation. Makes technical decisions on platform configuration, network architecture, and device hardening. Authority to approve standard deployments. Escalates enterprise-wide architectural changes and significant budget decisions."
      communication_stakeholder: "Regular interaction with facilities management, security operations, IT networking, and cybersecurity teams. Presents project plans and security assessments to management. Coordinates with vendors and integrators. Communicates convergence risks to both physical security and cyber audiences."
      degree_equivalent: "Bachelor's degree in Electrical Engineering, Computer Science, or related field, OR 4-7 years of physical security engineering experience with demonstrated convergence expertise. Industry certifications in both physical security and cybersecurity."
      certifications:
        - "ASIS Physical Security Professional (PSP)"
        - "ASIS Certified Protection Professional (CPP)"
        - "CISSP or SSCP"
        - "Genetec Security Center Certified Expert"
        - "Certified Information Systems Auditor (CISA)"
      salary:
        us_government: "$80,000 - $115,000 (GS-12 to GS-13)"
        us_startup: "$90,000 - $120,000"
        us_corporate: "$90,000 - $130,000"
        us_bigtech: "$220,000 - $360,000"

    - id: "eng4"
      title: "Eng 4 / Senior"
      general_description: "Senior physical security engineer with deep expertise in converged physical-cyber security systems across enterprise environments. Leads complex multi-facility deployments, architects physical security network infrastructure, and drives the integration of physical security data into the cybersecurity monitoring stack. Serves as the technical authority on physical security system cybersecurity, defining hardening standards and ensuring physical security infrastructure does not become a vector for cyberattack. Recognized subject matter expert bridging physical security operations, facilities engineering, and cybersecurity."
      primary_responsibilities:
        - "Architect converged physical-cyber security systems for enterprise facilities and data centers"
        - "Lead cybersecurity hardening programs for physical security infrastructure across the organization"
        - "Design integration between physical security events and SIEM/SOAR platforms"
        - "Develop enterprise standards for physical security device procurement, deployment, and lifecycle management"
        - "Conduct advanced penetration testing and red team assessments of physical security systems"
        - "Lead incident response for physical security system compromises or breaches"
        - "Design and implement converged SOC workflows incorporating physical security telemetry"
        - "Evaluate emerging physical security technologies for enterprise adoption"
        - "Drive physical security system migrations and platform consolidation projects"
        - "Serve as technical escalation point for complex physical security engineering issues"
      required_skills:
        - "Enterprise-scale physical security system architecture (multi-site, high availability)"
        - "Advanced cybersecurity assessment of physical security systems (penetration testing, firmware analysis)"
        - "SIEM integration with physical security data sources (access events, video analytics, alarms)"
        - "Physical security network architecture (dedicated VLANs, firewalls, monitoring, micro-segmentation)"
        - "Deep knowledge of credential technologies (smart cards, mobile credentials, biometrics) and their vulnerabilities"
        - "API and middleware development for physical security system integration"
        - "Risk assessment frameworks applied to converged physical-cyber threats"
        - "Project leadership for complex multi-stakeholder deployments"
        - "Understanding of regulatory requirements (NERC CIP, ITAR, HSPD-12, FICAM)"
      preferred_skills:
        - "Industrial control system (ICS) security as related to building systems"
        - "Physical security red teaming (badge cloning, tailgating, lock bypass combined with cyber exploitation)"
        - "Machine learning and AI for video analytics and anomaly detection"
        - "Cloud architecture for physical security (hybrid deployments)"
        - "Zero-trust architecture principles applied to physical access control"
      mentorship_requirements: "Mentors Mid and Junior engineers on architecture, convergence, and cybersecurity assessment. Expected to guide team members in developing convergence expertise. Contributes to organizational training on physical-cyber security risks. May mentor across teams (physical security, IT, cybersecurity)."
      impact_scope: "Enterprise-wide impact on physical security engineering standards and cybersecurity posture. Architectural decisions affect all facilities and set precedent for future deployments. Directly influences the organization's converged security strategy. Recognized authority on physical security system cybersecurity."
      autonomy_decision_authority: "Works independently with strategic guidance. Makes architectural decisions for physical security systems. Authority to define technical standards and approve designs. Escalates decisions with significant budget impact or organizational policy implications."
      communication_stakeholder: "Communicates with Director/VP-level stakeholders on physical security strategy and risk. Presents to CISO and security leadership on convergence initiatives. Coordinates with external vendors, integrators, and industry groups. Translates between physical security, facilities, and cybersecurity audiences."
      degree_equivalent: "Bachelor's or Master's degree in Electrical Engineering, Computer Science, Cybersecurity, or related field, OR 7-10 years of progressive physical security engineering experience with demonstrated convergence expertise and technical leadership."
      certifications:
        - "ASIS Certified Protection Professional (CPP)"
        - "CISSP"
        - "ASIS Physical Security Professional (PSP)"
        - "GICSP (Global Industrial Cyber Security Professional)"
        - "Certified TEMPEST Professional (CTP) - for government roles"
      salary:
        us_government: "$110,000 - $150,000 (GS-14 to GS-15)"
        us_startup: "$120,000 - $160,000"
        us_corporate: "$130,000 - $175,000"
        us_bigtech: "$300,000 - $500,000"

    - id: "eng5"
      title: "Eng 5 / Staff"
      general_description: "Staff-level physical security engineer with cross-organizational influence on converged physical-cyber security practices. Defines the technical strategy for physical security infrastructure as a component of the overall cybersecurity program. Builds frameworks for assessing and managing cyber risk across physical security systems at enterprise scale. Drives convergence initiatives that break down silos between physical security, IT, and cybersecurity organizations. Recognized internally and beginning to be known externally as a domain expert in physical-cyber convergence."
      primary_responsibilities:
        - "Define the enterprise technical strategy for converged physical-cyber security engineering"
        - "Build frameworks for cyber risk assessment and management of physical security infrastructure"
        - "Drive cross-functional convergence initiatives between physical security, IT, and cybersecurity teams"
        - "Establish engineering standards for physical security device lifecycle management and cybersecurity hygiene"
        - "Design reference architectures for converged physical-cyber security across facility types"
        - "Lead technical due diligence on physical security technology acquisitions and vendor relationships"
        - "Develop and deliver training programs on physical security system cybersecurity"
        - "Contribute to incident response playbooks for converged physical-cyber attack scenarios"
        - "Advise security leadership on emerging physical-cyber convergence threats and technologies"
        - "Represent the organization at industry conferences and working groups on physical security cybersecurity"
      required_skills:
        - "Enterprise physical security architecture across diverse facility types (offices, data centers, manufacturing)"
        - "Cyber risk quantification for physical security infrastructure"
        - "Advanced integration architecture (physical security to SIEM, SOAR, identity governance)"
        - "Threat modeling for converged physical-cyber attack scenarios"
        - "Vendor and technology evaluation at enterprise scale"
        - "Cross-functional leadership and influence without direct authority"
        - "Technical writing for standards, frameworks, and reference architectures"
        - "Understanding of global physical security regulations and standards (GDPR privacy for CCTV, country-specific access control requirements)"
      preferred_skills:
        - "Published research or presentations on physical security cybersecurity"
        - "Experience with government classified facility requirements (ICD 705, SCIF construction)"
        - "IoT security research and vulnerability disclosure"
        - "Supply chain security for physical security devices"
        - "Digital forensics for physical security systems"
      mentorship_requirements: "Mentors Senior engineers toward Staff-level technical leadership. Develops convergence expertise across teams. Expected to create mentorship opportunities that span physical security and cybersecurity disciplines. Guides career development for engineers working in the convergence space."
      impact_scope: "Organization-wide influence on physical security engineering practices and convergence strategy. Frameworks and standards adopted across all facilities. Technical decisions set the direction for multi-year physical security programs. Beginning to influence industry practices through external engagement."
      autonomy_decision_authority: "Operates with high autonomy on technical strategy. Makes decisions that affect enterprise physical security architecture. Authority to define standards and approve technology selections. Escalates decisions with significant organizational or budgetary scope."
      communication_stakeholder: "Regular communication with CISO, VP of Security, and facilities leadership. Presents to executive leadership on convergence strategy and risk. Engages with industry bodies (ASIS International, SIA). Communicates complex convergence concepts to diverse technical and non-technical audiences."
      degree_equivalent: "Master's degree in Engineering, Cybersecurity, or related field, OR 10-15 years of progressive physical security engineering and cybersecurity experience with demonstrated cross-organizational impact and thought leadership."
      certifications:
        - "CISSP"
        - "ASIS Certified Protection Professional (CPP)"
        - "GICSP (Global Industrial Cyber Security Professional)"
        - "CISM (Certified Information Security Manager)"
        - "Board certifications from SIA (Security Industry Association)"
      salary:
        us_government: "$130,000 - $170,000 (GS-14 to GS-15)"
        us_startup: "$140,000 - $185,000"
        us_corporate: "$160,000 - $220,000"
        us_bigtech: "$380,000 - $580,000"

    - id: "eng6"
      title: "Eng 6 / Senior Staff"
      general_description: "Senior Staff physical security engineer serving as the organization-wide authority on converged physical-cyber security engineering. Sets the multi-year technical vision for how physical security infrastructure integrates into the broader cybersecurity program. Drives transformational initiatives such as zero-trust physical access, AI-driven surveillance analytics, and fully converged security operations centers. Influences organizational structure and investment priorities at the intersection of physical and cyber security."
      primary_responsibilities:
        - "Set the multi-year technical vision for converged physical-cyber security engineering"
        - "Drive transformational convergence initiatives (zero-trust physical access, AI-driven analytics, converged SOC)"
        - "Define organizational investment priorities for physical security technology modernization"
        - "Lead enterprise-wide programs for physical security infrastructure cyber resilience"
        - "Architect next-generation converged security platforms integrating physical and cyber telemetry"
        - "Advise executive leadership on converged security risks, investment, and organizational design"
        - "Establish partnerships with physical security technology vendors for co-development and early access"
        - "Represent the organization as a thought leader at major industry conferences"
        - "Drive policy development for converged physical-cyber security governance"
        - "Evaluate and respond to nation-state threats targeting physical security infrastructure"
      required_skills:
        - "Visionary technical leadership in converged physical-cyber security"
        - "Enterprise security architecture spanning physical, cyber, and operational technology domains"
        - "Executive communication and strategic influence"
        - "Technology roadmap development for physical security modernization"
        - "Deep understanding of emerging threats to physical security infrastructure (supply chain, firmware, AI)"
        - "Cross-domain expertise spanning access control, video analytics, intrusion detection, and cybersecurity"
        - "Organizational design for converged security operations"
        - "Financial modeling and business case development for security technology investments"
      preferred_skills:
        - "Patent or published innovation in physical security technology"
        - "Experience with classified or high-security facility programs (DOE, DoD, intelligence community)"
        - "Advisory relationships with physical security industry vendors and standards bodies"
        - "Knowledge of international physical security standards (ISO 27001 Annex A physical controls, EN 50600)"
        - "Experience with autonomous security systems and robotics"
      mentorship_requirements: "Mentors Staff and Senior engineers on technical vision and strategic thinking. Creates development paths for convergence specialization across the engineering organization. Expected to attract and retain talent in the physical-cyber convergence space. Serves as a career role model for the discipline."
      impact_scope: "Defines the technical trajectory for physical-cyber convergence across the entire organization. Decisions shape multi-year investment and staffing plans. Influences vendor product roadmaps through strategic partnerships. Recognized as an industry authority in the convergence domain."
      autonomy_decision_authority: "Operates with near-full autonomy on technical vision. Makes decisions shaping the future of converged security engineering for the organization. Authority to define architecture, standards, and technology direction. Partners with executive leadership on strategic investment."
      communication_stakeholder: "Direct engagement with C-suite (CISO, CTO, COO) on converged security strategy. Represents the organization to board of directors on physical security risk. Keynotes at industry conferences. Engages with government agencies and standards bodies at leadership level."
      degree_equivalent: "Master's degree or PhD in Engineering, Cybersecurity, or related field, OR 15-20 years of progressive experience in physical security engineering and cybersecurity with demonstrated industry-level thought leadership and organizational transformation."
      certifications:
        - "CISSP"
        - "ASIS Certified Protection Professional (CPP)"
        - "CISM"
        - "Board-level certifications or industry recognition"
        - "Published author or frequent keynote speaker in physical security cybersecurity"
      salary:
        us_government: "$150,000 - $185,000 (GS-15 to SES)"
        us_startup: "$170,000 - $230,000"
        us_corporate: "$200,000 - $280,000"
        us_bigtech: "$500,000 - $700,000"

    - id: "eng7"
      title: "Eng 7 / Principal"
      general_description: "Principal physical security engineer operating at the apex of converged physical-cyber security engineering. Defines industry direction for how physical security infrastructure is secured, monitored, and integrated into cybersecurity programs. Shapes standards, frameworks, and technologies adopted across the field. Recognized globally as a defining voice in physical-cyber convergence, influencing vendor product development, government policy, and industry best practices. May hold distinguished engineer or fellow-equivalent titles."
      primary_responsibilities:
        - "Define industry direction for converged physical-cyber security engineering"
        - "Shape standards and frameworks adopted across the physical security and cybersecurity industries"
        - "Drive breakthrough innovations in converged security technology and architecture"
        - "Advise C-suite and board on physical-cyber convergence as a strategic imperative"
        - "Influence government policy and regulation on physical security cybersecurity"
        - "Publish research and thought leadership advancing the state of the art in convergence"
        - "Establish the organization as the industry leader in physical-cyber security convergence"
        - "Architect reference designs adopted by the broader industry"
        - "Guide the global physical security engineering community through standards bodies, publications, and conferences"
        - "Identify and respond to paradigm-shifting threats and technologies in the physical security domain"
      required_skills:
        - "World-class expertise in converged physical-cyber security systems"
        - "Ability to shape industry standards and influence vendor product roadmaps"
        - "Deep technical mastery across physical access control, surveillance, intrusion detection, and cybersecurity"
        - "Published body of work advancing the field of physical-cyber convergence"
        - "Executive presence and ability to influence at the highest organizational and industry levels"
        - "Understanding of geopolitical and nation-state dimensions of physical security threats"
        - "Innovation track record in security technology"
        - "Ability to attract, develop, and retain top talent in a niche discipline"
      preferred_skills:
        - "Advisory board membership with major physical security vendors"
        - "Government advisory roles on critical infrastructure physical security"
        - "Patent portfolio in physical security or convergence technology"
        - "Academic affiliations or adjunct positions in security engineering"
        - "Track record of building physical-cyber convergence programs from zero to industry-leading"
      mentorship_requirements: "Mentors at all levels across the organization and industry. Creates the intellectual framework that shapes how the next generation of convergence professionals develop. Expected to contribute to academic and professional education in the field. Attracts top talent to the discipline through reputation and vision."
      impact_scope: "Industry-defining impact on physical-cyber security convergence. Standards and architectures influence organizations globally. Technical vision shapes vendor product development and government policy. Recognized as one of the foremost authorities in the field worldwide."
      autonomy_decision_authority: "Full technical autonomy. Operates as the ultimate technical authority on physical-cyber convergence. Decisions influence industry direction. Partners with executive leadership as a co-equal on technical strategy within the convergence domain."
      communication_stakeholder: "Engages with CEO, board of directors, and industry leadership. Keynotes at major conferences (ASIS, ISC West, RSA, Black Hat). Advises government agencies and policymakers. Publishes for both industry and academic audiences. Communicates with media as a recognized industry authority."
      degree_equivalent: "Advanced degree (Master's or PhD) in Engineering, Computer Science, or related field, OR 20+ years of exceptional experience in physical security engineering and cybersecurity with globally recognized contributions to the field. Demonstrated industry-shaping impact."
      certifications:
        - "CISSP"
        - "ASIS Certified Protection Professional (CPP)"
        - "Industry fellow or distinguished engineer designations"
        - "Recognized through awards, publications, or standards committee leadership"
      salary:
        us_government: "$165,000 - $191,900 (GS-15 step 10 to SES)"
        us_startup: "$200,000 - $280,000"
        us_corporate: "$250,000 - $350,000"
        us_bigtech: "$600,000 - $900,000"

physical_security_architect:
  name: "Physical Security Architect"
  description: "Strategic technical leaders who design converged physical-cyber security architectures for facilities, campuses, and enterprise environments. Focus on physical security information management (PSIM), security operations center design (converged SOC), physical access control architecture, and integrating physical security data into the cybersecurity monitoring stack. Define how organizations approach the convergence of physical and logical security at the architectural level."
  nice_mapping:
    work_roles:
      - id: "SP-ARC-002"
        name: "Security Architect"
    strength: "tenuous"
    notes: "NICE's architecture role is purely cyber-focused. Converged physical-cyber security architecture is not addressed in the framework."
  levels:
    - id: "arch1"
      title: "Architect 1 / Entry"
      general_description: "Entry-level physical security architect learning the fundamentals of physical security system design and convergence architecture. Assists with documenting existing physical security architectures, creating system diagrams, and understanding how physical security systems integrate with IT and cybersecurity infrastructure. Develops foundational knowledge of access control architectures, video surveillance system design, and the principles of physical-cyber convergence."
      primary_responsibilities:
        - "Document existing physical security system architectures and network topologies"
        - "Create system diagrams for access control, video surveillance, and intrusion detection deployments"
        - "Assist with requirements gathering for physical security system design projects"
        - "Learn physical security design standards and reference architectures"
        - "Support senior architects with site surveys and facility assessments"
        - "Maintain architecture documentation repositories and standards libraries"
        - "Study integration patterns between physical security and IT/cybersecurity systems"
        - "Assist with vendor evaluation documentation and technology comparison matrices"
      required_skills:
        - "Understanding of physical security system components (access control, video, intrusion detection)"
        - "Basic network architecture concepts (VLANs, subnets, firewalls, DMZ)"
        - "Familiarity with architecture diagramming tools (Visio, draw.io, Lucidchart)"
        - "Basic understanding of physical access control system architecture (controllers, panels, readers)"
        - "Knowledge of IP-based video surveillance architecture (cameras, NVRs, VMS)"
        - "Understanding of cybersecurity fundamentals as applied to physical security"
        - "Documentation and technical writing skills"
      preferred_skills:
        - "Exposure to enterprise access control platforms (Lenel/LenelS2, Genetec, AMAG)"
        - "Familiarity with PSIM concepts"
        - "Basic understanding of building information modeling (BIM)"
        - "Knowledge of physical security design standards (ASIS, CPTED)"
        - "Exposure to cloud architecture concepts"
      mentorship_requirements: "Receives direct mentorship from Senior physical security architects. Shadows on design reviews and architectural assessments. Expected to develop proficiency in architecture documentation and diagramming within first 6 months. Learns the principles of converged security architecture."
      impact_scope: "Individual contributor on documentation and design support tasks. Impact limited to supporting architectural activities under direct guidance. Work is reviewed by senior architects before incorporation into designs. Supports overall architecture documentation quality."
      autonomy_decision_authority: "Works under close supervision. Follows established documentation standards and templates. Limited authority to make design decisions independently. Escalates all architectural questions to senior architects."
      communication_stakeholder: "Primarily internal communication with architecture and engineering teams. May assist with preparing presentation materials for design reviews. Limited direct interaction with stakeholders outside the physical security team."
      degree_equivalent: "Bachelor's degree in Computer Science, Electrical Engineering, Architecture, or related field, OR 1-2 years of experience in physical security design, IT architecture, or systems engineering, OR completion of relevant vendor architecture certification programs."
      certifications:
        - "CompTIA Security+"
