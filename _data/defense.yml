# Defensive Security Professional Titles
# Data file for Jekyll-based security titles standardization

soc_analyst:
  name: "SOC Analyst"
  description: "Security Operations Center professionals who monitor, detect, and respond to security threats and incidents. Serve as the front line of defense, triaging alerts, investigating suspicious activity, and coordinating incident response efforts."
  nice_mapping:
    work_roles:
      - id: "PR-CDA-001"
        name: "Cyber Defense Analyst"
    strength: "direct"
    notes: ""
  levels:
    - id: "analyst1"
      title: "Analyst 1 / Entry"
      general_description: "Entry-level SOC analyst learning security monitoring fundamentals and alert triage processes. Follows established playbooks to investigate and escalate security events. Develops foundational knowledge of security tools, attack patterns, and incident response procedures."
      primary_responsibilities:
        - "Monitor security alerts from SIEM, EDR, and other detection tools"
        - "Triage and categorize alerts following established playbooks"
        - "Escalate potential incidents to senior analysts"
        - "Document alert investigations and outcomes"
        - "Perform initial data gathering for incident investigations"
        - "Maintain awareness of current threat landscape"
        - "Update and maintain ticketing systems and case notes"
      required_skills:
        - "Basic understanding of TCP/IP networking and common protocols"
        - "Familiarity with Windows and Linux operating systems"
        - "Knowledge of common attack types and indicators of compromise"
        - "Basic SIEM query and navigation skills"
        - "Understanding of security fundamentals (CIA triad, defense in depth)"
        - "Attention to detail and documentation skills"
        - "Ability to follow procedures and playbooks accurately"
      preferred_skills:
        - "Home lab experience with security tools"
        - "CTF or TryHackMe/HackTheBox participation"
        - "Basic scripting ability (Python, PowerShell)"
        - "Familiarity with ticketing systems"
        - "Knowledge of common malware behaviors"
      mentorship_requirements: "Receives direct mentorship from Senior SOC analysts. Participates in shift handoffs and team briefings. Expected to complete SOC onboarding and tool training within first 3 months. Shadows senior analysts on incident investigations."
      impact_scope: "Individual contributor on alert triage and initial investigation. Impact limited to assigned alerts and tickets. Work is reviewed before escalation or closure. Contributes to overall SOC coverage and response time metrics."
      autonomy_decision_authority: "Works under close supervision following playbooks. Follows established escalation procedures. Limited authority to close alerts independently. Escalates all potential incidents to senior team members."
      communication_stakeholder: "Primarily internal communication with SOC team and shift lead. Documents findings in ticketing system. May participate in shift handoffs. Limited interaction outside immediate team."
      degree_equivalent: "Bachelor's degree in Computer Science, Cybersecurity, IT, or related field, OR 1-2 years of IT support or helpdesk experience, OR completion of SOC analyst training program with demonstrated practical skills."
      certifications:
        - "CompTIA Security+"
        - "CompTIA CySA+"
        - "Splunk Core Certified User"
        - "Microsoft SC-200"
      salary:
        us_government: "$50,000 - $70,000 (GS-7 to GS-9)"
        us_startup: "$55,000 - $75,000"
        us_corporate: "$50,000 - $70,000"
        us_bigtech: "$110,000 - $170,000"

    - id: "analyst2"
      title: "Analyst 2 / Junior"
      general_description: "Junior SOC analyst capable of conducting independent alert investigations and participating in incident response activities. Demonstrates proficiency with security monitoring tools and can identify true positive security events. Beginning to develop specialization in specific threat types or tools."
      primary_responsibilities:
        - "Independently investigate and disposition security alerts"
        - "Participate in incident response and containment activities"
        - "Perform log analysis and correlation across data sources"
        - "Create and refine detection rules and alerts"
        - "Document incidents and investigation findings thoroughly"
        - "Identify patterns and trends in security events"
        - "Contribute to playbook development and refinement"
        - "Assist with threat intelligence integration"
      required_skills:
        - "Proficiency with SIEM platforms (Splunk, Sentinel, QRadar)"
        - "EDR tool operation and investigation (CrowdStrike, Defender, Carbon Black)"
        - "Log analysis across multiple data sources"
        - "Understanding of attack frameworks (MITRE ATT&CK, Kill Chain)"
        - "Network traffic analysis basics"
        - "Incident documentation and reporting"
        - "Intermediate scripting for automation"
      preferred_skills:
        - "Threat hunting fundamentals"
        - "Malware analysis basics"
        - "Cloud security monitoring (AWS, Azure)"
        - "Email security and phishing analysis"
        - "Forensic artifact collection"
      mentorship_requirements: "Receives guidance from Senior analysts on complex investigations. Expected to begin mentoring Entry-level analysts informally. Participates in knowledge sharing and team training sessions. Should be developing expertise in 1-2 specific areas."
      impact_scope: "Directly contributes to incident detection and response. Responsible for accurate alert triage and investigation. Detection improvements impact organizational security posture. Beginning to influence SOC processes."
      autonomy_decision_authority: "Works with moderate supervision. Can make triage decisions on standard alerts. Authority to close false positives independently. Escalates complex or high-severity incidents."
      communication_stakeholder: "Regular interaction with SOC team and incident responders. May communicate with IT teams during incidents. Participates in incident bridges. Documents findings for broader team consumption."
      degree_equivalent: "Bachelor's degree in Computer Science, Cybersecurity, or related field, OR 2-3 years of SOC or security monitoring experience. Demonstrated investigation skills and tool proficiency."
      certifications:
        - "CompTIA CySA+"
        - "Splunk Core Certified Power User"
        - "GIAC Security Essentials (GSEC)"
        - "Microsoft SC-200"
        - "BTL1 (Blue Team Level 1)"
      salary:
        us_government: "$65,000 - $85,000 (GS-9 to GS-11)"
        us_startup: "$70,000 - $95,000"
        us_corporate: "$65,000 - $90,000"
        us_bigtech: "$150,000 - $240,000"

    - id: "analyst3"
      title: "Analyst 3 / Mid"
      general_description: "Experienced SOC analyst who leads incident investigations and drives detection improvements. Demonstrates expertise in threat analysis, incident response, and security tool optimization. Serves as subject matter expert for specific threat types or platforms and mentors junior analysts."
      primary_responsibilities:
        - "Lead complex incident investigations from detection through resolution"
        - "Develop and optimize detection rules and use cases"
        - "Perform proactive threat hunting across the environment"
        - "Conduct root cause analysis and recommend remediation"
        - "Mentor junior analysts and review their work"
        - "Create and maintain SOC playbooks and procedures"
        - "Integrate threat intelligence into detection capabilities"
        - "Produce incident reports and executive summaries"
        - "Collaborate with other security teams on improvements"
      required_skills:
        - "Expert-level SIEM administration and query development"
        - "Advanced incident response and forensic techniques"
        - "Threat hunting methodology and execution"
        - "Detection engineering and rule development"
        - "Malware analysis and reverse engineering basics"
        - "Strong analytical and problem-solving skills"
        - "Technical writing and presentation skills"
        - "Cross-team collaboration and communication"
      preferred_skills:
        - "Digital forensics (memory, disk, network)"
        - "Cloud security monitoring and response"
        - "Automation and orchestration (SOAR)"
        - "Programming for security tooling"
        - "Threat intelligence analysis"
      mentorship_requirements: "Primary mentor for Junior and Entry analysts. Leads training sessions on specialty areas. Expected to develop and maintain SOC training materials. Establishes reputation as go-to expert in specific domains."
      impact_scope: "Shapes SOC detection capabilities and processes. Leads major incident responses impacting organization. Detection improvements measurably reduce risk. Influences tool selection and investment decisions."
      autonomy_decision_authority: "Works independently with strategic guidance. Makes significant investigation and response decisions. Authority over detection rule development. Consulted on SOC process and tooling decisions."
      communication_stakeholder: "Regular communication with security leadership. Presents findings to technical and management audiences. Primary analyst contact for major incidents. Coordinates with IT, legal, and business stakeholders during incidents."
      degree_equivalent: "Bachelor's degree in Computer Science, Cybersecurity, or related field, OR 4-6 years of SOC or incident response experience. Demonstrated leadership in major incident investigations. May have Master's degree with less experience."
      certifications:
        - "GIAC Certified Incident Handler (GCIH)"
        - "GIAC Certified Enterprise Defender (GCED)"
        - "Splunk Enterprise Certified Admin"
        - "CrowdStrike Certified Falcon Responder"
        - "BTL2 (Blue Team Level 2)"
      salary:
        us_government: "$85,000 - $115,000 (GS-12 to GS-13)"
        us_startup: "$95,000 - $130,000"
        us_corporate: "$90,000 - $120,000"
        us_bigtech: "$220,000 - $350,000"

    - id: "analyst4"
      title: "Analyst 4 / Senior"
      general_description: "Senior SOC analyst who serves as the escalation point for the most complex investigations and critical incidents. Deep technical expertise across detection, response, and threat hunting. Mentors junior and mid-level analysts. Drives detection improvements and process refinements within the SOC team."
      primary_responsibilities:
        - "Lead and coordinate response to critical security incidents"
        - "Develop advanced detection capabilities and threat hunting programs"
        - "Serve as escalation point for complex or ambiguous investigations"
        - "Mentor mid-level and junior analysts and review their work"
        - "Drive continuous improvement in SOC processes and playbooks"
        - "Evaluate and recommend security monitoring technologies"
        - "Interface with security leadership during major incidents"
        - "Produce incident reports and technical briefings for leadership"
        - "Collaborate with IR, CTI, and engineering teams on cross-team issues"
      required_skills:
        - "Mastery of security monitoring, incident response, and forensic triage"
        - "Advanced threat hunting and detection engineering"
        - "Deep expertise in SIEM platform architecture and advanced query development"
        - "Malware analysis and reverse engineering fundamentals"
        - "Technical mentorship and knowledge transfer"
        - "Clear technical writing and executive communication"
        - "Vendor and tool evaluation"
        - "Cross-team collaboration and influence"
      preferred_skills:
        - "SOAR platform implementation and workflow design"
        - "Cloud security monitoring and response (multi-cloud)"
        - "Threat intelligence analysis and integration"
        - "Programming for custom detection tooling"
        - "Conference speaking or blog writing"
      mentorship_requirements: "Primary mentor for Mid and Junior analysts. Leads training sessions on specialty areas. Reviews complex investigations and provides technical guidance. Expected to identify and develop high-potential analysts."
      impact_scope: "Shapes SOC detection capabilities and team processes. Critical incident outcomes depend on technical leadership. Detection improvements measurably reduce organizational risk. Influences SOC tool selection and process decisions."
      autonomy_decision_authority: "High autonomy on technical decisions. Makes significant investigation and response decisions independently. Authority over detection rule strategy and playbook standards. Consulted on SOC process and tooling decisions."
      communication_stakeholder: "Regular communication with security leadership during incidents. Presents findings to technical and management audiences. Coordinates with IT, legal, and business stakeholders during major incidents. Primary technical contact for cross-team security issues."
      degree_equivalent: "Bachelor's or Master's degree in relevant field, OR 6-10 years of SOC or incident response experience. Demonstrated leadership in major incident investigations."
      certifications:
        - "GIAC Certified Incident Handler (GCIH)"
        - "GIAC Security Operations Certified (GSOC)"
        - "CISSP"
        - "CrowdStrike Certified Falcon Responder"
        - "BTL2 (Blue Team Level 2)"
      salary:
        us_government: "$110,000 - $145,000 (GS-14 to GS-15)"
        us_startup: "$130,000 - $170,000 + equity"
        us_corporate: "$120,000 - $160,000"
        us_bigtech: "$300,000 - $480,000"

    - id: "analyst5"
      title: "Analyst 5 / Staff"
      general_description: "Staff SOC analyst whose work products and technical decisions extend beyond the SOC team. Builds the systems, pipelines, and methodologies that other analysts use. Owns cross-team technical problems — log ingestion architecture, detection-as-code frameworks, data quality standards — that no single team can solve alone. Recognized as a technical authority within the organization."
      primary_responsibilities:
        - "Design and build the detection-as-code pipeline — CI/CD, testing framework, and validation tooling"
        - "Define the SOC's log ingestion architecture and telemetry schema standards"
        - "Create reusable detection methodology libraries and behavioral detection patterns"
        - "Own SOC data architecture decisions — SIEM platform strategy, data enrichment pipelines, retention policies"
        - "Drive cross-team detection coverage initiatives with engineering, IT, and cloud platform teams"
        - "Negotiate telemetry requirements with application and infrastructure teams"
        - "Define SOC metrics and measurement frameworks"
        - "Evaluate and pilot emerging detection technologies"
        - "Represent the SOC in cross-functional security architecture discussions"
      required_skills:
        - "Detection engineering at scale — CI/CD for detection content, automated testing, deployment pipelines"
        - "Security data architecture — SIEM internals, data lake design, log parsing and normalization"
        - "Advanced programming for security tooling (Python, Go)"
        - "Cross-team technical leadership and influence without authority"
        - "Deep understanding of telemetry sources across cloud, endpoint, network, and identity"
        - "Metrics design and detection efficacy measurement"
        - "Strategic technical communication to security leadership"
      preferred_skills:
        - "Data engineering fundamentals (Kafka, Spark, data pipelines)"
        - "Machine learning for anomaly detection"
        - "Open-source detection framework contributions (Sigma, YARA-L)"
        - "Security data lake architecture (Snowflake, Databricks)"
        - "Conference speaking on detection methodology"
      mentorship_requirements: "Mentors Senior analysts on technical depth and cross-team influence. Guides analysts developing detection engineering specializations. Creates technical standards and patterns that implicitly mentor through documentation. Beginning to build external reputation."
      impact_scope: "Cross-team impact — technical decisions affect how multiple teams produce and consume security telemetry. Detection infrastructure serves the entire security organization. Methodology and pipeline improvements scale analyst effectiveness across the SOC."
      autonomy_decision_authority: "Near-complete autonomy on technical decisions within detection and monitoring domain. Makes SOC platform and architecture decisions. Consulted on security-wide data and tooling strategy. Trusted to represent SOC technical interests in cross-org forums."
      communication_stakeholder: "Regular engagement with security leadership on SOC strategy. Negotiates technical requirements with engineering and IT leadership. Presents data architecture and detection strategy to cross-functional stakeholders. Beginning to represent organization externally."
      degree_equivalent: "Bachelor's or Master's degree in relevant field, OR 8-12 years of SOC, detection engineering, or security operations experience. Demonstrated cross-team technical influence and force-multiplying impact."
      certifications:
        - "GIAC Security Operations Certified (GSOC)"
        - "GIAC Cloud Threat Detection (GCTD)"
        - "CISSP"
        - "Certifications matter less than demonstrated technical impact at this level"
      salary:
        us_government: "$130,000 - $157,000 (GS-14)"
        us_startup: "$155,000 - $190,000 + equity"
        us_corporate: "$150,000 - $185,000"
        us_bigtech: "$330,000 - $500,000"

    - id: "analyst6"
      title: "Analyst 6 / Senior Staff"
      general_description: "Senior Staff SOC analyst who shapes how the security monitoring function operates across the entire organization. Defines the detection coverage model mapped to business risk, architects multi-year SOC platform evolution, and sets the measurement framework reported to executive leadership. Technical decisions at this level directly affect company-level security posture and strategy."
      primary_responsibilities:
        - "Define the organization's detection coverage model mapped to business risk — what the company can and cannot detect, as an explicit funded decision"
        - "Architect the SOC's multi-year data platform evolution (e.g., SIEM migration, security data lake strategy)"
        - "Set the detection efficacy measurement framework reported to the CISO"
        - "Drive SOC platform build-vs-buy decisions with multi-million-dollar implications"
        - "Define standards for security telemetry across all engineering and infrastructure teams"
        - "Shape the SOC operating model — how detection, triage, hunt, and response interoperate at scale"
        - "Lead evaluation and adoption of transformational detection technologies"
        - "Represent the organization's detection capabilities to auditors, regulators, and cyber insurance assessors"
      required_skills:
        - "Organizational-scale security monitoring architecture and strategy"
        - "Detection coverage modeling and risk-based prioritization"
        - "Security data platform architecture at enterprise scale"
        - "Executive communication — translating detection capabilities into business risk terms"
        - "Build-vs-buy analysis and vendor strategy for monitoring platforms"
        - "Deep expertise across cloud, endpoint, network, and identity telemetry at scale"
        - "Cross-organizational influence and technical authority"
      preferred_skills:
        - "Published detection research or methodologies"
        - "Security data engineering at petabyte scale"
        - "Regulatory and compliance aspects of monitoring (PCI DSS, SOX)"
        - "Industry working group participation"
        - "Conference keynotes or invited talks"
      mentorship_requirements: "Mentors Staff analysts toward broader organizational influence. Shapes SOC career paths and technical development standards organization-wide. Industry mentorship through published work and community engagement."
      impact_scope: "Organization-wide — shapes how the entire company approaches detection and monitoring. Platform decisions carry multi-year, multi-million-dollar consequences. Detection coverage model directly influences organizational risk posture."
      autonomy_decision_authority: "Full autonomy over SOC technical strategy. Makes platform and architecture decisions with significant budget implications. Accountable to CISO for detection capability outcomes. Trusted advisor to security leadership on monitoring strategy."
      communication_stakeholder: "Regular CISO-level engagement on detection strategy and coverage. Presents SOC platform strategy to executive leadership. Represents organization's monitoring capabilities to external assessors. Industry conference presentations and published research."
      degree_equivalent: "Bachelor's or Master's degree in relevant field, OR 10-15 years of SOC, detection engineering, or security operations experience. Demonstrated organization-wide technical authority and impact."
      certifications:
        - "Industry recognition supersedes certifications at this level"
        - "Published research or open-source contributions"
        - "CISSP, GIAC certs from earlier career still valued"
      salary:
        us_government: "$147,000 - $176,000 (GS-15)"
        us_startup: "$175,000 - $215,000 + equity"
        us_corporate: "$170,000 - $210,000"
        us_bigtech: "$420,000 - $580,000"

    - id: "analyst7"
      title: "Analyst 7 / Principal"
      general_description: "Principal SOC analyst at the apex of the detection and monitoring discipline. Creates detection methodologies, data models, or frameworks adopted industry-wide. Work changes how SOCs everywhere approach classes of threats. Publishes research that shapes vendor roadmaps and industry standards. Extremely rare — one or two per large enterprise."
      primary_responsibilities:
        - "Create detection methodologies or data models adopted across the industry"
        - "Publish research that changes how SOCs approach emerging threat classes"
        - "Define industry standards for detection coverage, measurement, and efficacy"
        - "Shape vendor product roadmaps through problem identification and articulation"
        - "Lead transformational SOC capability initiatives that redefine organizational detection posture"
        - "Serve as the organization's ultimate technical authority on detection and monitoring"
        - "Represent the organization at premier industry venues and standards bodies"
        - "Advise executive leadership on strategic detection investments and capability gaps"
      required_skills:
        - "Industry-recognized expertise in detection engineering, threat hunting, or security monitoring"
        - "Ability to create novel methodologies and frameworks adopted beyond the organization"
        - "Transformational technical vision — anticipating how the detection landscape will evolve"
        - "Executive and board-level communication on detection strategy"
        - "Deep technical expertise across the full spectrum of security telemetry"
        - "Industry relationship building and standards body engagement"
      preferred_skills:
        - "Authored detection frameworks or standards adopted industry-wide"
        - "Major open-source detection tooling contributions"
        - "Invited keynotes at premier security conferences"
        - "Advisory board roles at security vendors or startups"
        - "Academic affiliations or published papers"
      mentorship_requirements: "Develops the next generation of SOC technical leaders. Industry-level mentorship through published work, open-source contributions, and community engagement. Legacy-building through lasting contributions to the detection discipline."
      impact_scope: "Industry-wide impact. Defines how security monitoring is practiced beyond the organization. Creates lasting contributions to detection methodology. Work influences vendor products and industry standards."
      autonomy_decision_authority: "Complete autonomy over technical domain. Shapes organizational security strategy. May have significant influence over industry direction. Executive-level decision authority on detection and monitoring matters."
      communication_stakeholder: "Industry-wide presence through publications and speaking. Board-level engagement on detection posture. Standards body and industry forum leadership. Media and analyst engagement."
      degree_equivalent: "Advanced degree often present but industry recognition is the primary qualification. 12-15+ years of elite SOC, detection engineering, or threat hunting experience with demonstrated industry impact."
      certifications:
        - "Certifications are irrelevant at this level"
        - "Known by reputation, research, and body of work"
        - "May have detection methodologies or tools widely adopted"
      salary:
        us_government: "$155,000 - $191,000 (GS-15 step 5-10)"
        us_startup: "$200,000 - $250,000 + significant equity"
        us_corporate: "$195,000 - $245,000"
        us_bigtech: "$500,000 - $680,000"

incident_responder:
  name: "Incident Responder"
  description: "Professionals who lead the investigation, containment, eradication, and recovery phases of security incidents. Distinct from SOC analysts (who focus on monitoring and detection) and forensic analysts (who focus on deep evidence examination), incident responders own the end-to-end response lifecycle — coordinating across technical, legal, and business stakeholders to minimize damage and restore operations. Often serve on-call rotations and must perform under sustained pressure during active breaches."
  nice_mapping:
    work_roles:
      - id: "PR-CIR-001"
        name: "Cyber Defense Incident Responder"
    strength: "direct"
    notes: ""
  levels:
    - id: "responder1"
      title: "Responder 1 / Entry"
      general_description: "Entry-level incident responder learning the incident response lifecycle and evidence handling fundamentals. Executes established playbooks under direct supervision during incidents. Assists with evidence collection, triage, and documentation. Develops foundational knowledge of forensic artifacts, containment techniques, and incident case management."
      primary_responsibilities:
        - "Execute IR playbooks for common incident types under supervision"
        - "Collect and preserve evidence (disk images, memory dumps, log bundles) maintaining chain of custody"
        - "Perform initial incident triage — severity classification, affected-system scoping, and basic IOC sweeps"
        - "Document incident timelines in case management systems"
        - "Assist senior responders with containment actions (network isolation, account disablement)"
        - "Gather data for post-incident reviews and after-action reports"
        - "Monitor and update incident status tickets throughout response"
      required_skills:
        - "Understanding of NIST SP 800-61 incident response lifecycle"
        - "Familiarity with SANS PICERL model (Preparation, Identification, Containment, Eradication, Recovery, Lessons Learned)"
        - "Windows event log analysis (Security, Sysmon, PowerShell logging)"
        - "Basic Linux triage (auth logs, process listings, crontabs)"
        - "Evidence acquisition with FTK Imager, KAPE, or Velociraptor"
        - "Basic Wireshark/tcpdump for pcap review"
        - "Clear written communication under time pressure"
      preferred_skills:
        - "Familiarity with a SIEM platform (Splunk, Sentinel)"
        - "Basic MITRE ATT&CK navigator usage for mapping observed activity"
        - "Home lab or CTF experience with forensic challenges"
        - "Familiarity with EDR tools (CrowdStrike, Defender for Endpoint)"
        - "Basic scripting to run provided Python or PowerShell collection scripts"
      mentorship_requirements: "Receives direct mentorship from mid and senior incident responders on every case. Shadows experienced responders during active incidents before handling tasks independently. Expected to complete IR tool training and evidence handling certification within first 6 months."
      impact_scope: "Individual contributor executing assigned response tasks. Impact limited to specific evidence collection and documentation steps. All containment decisions reviewed by senior team members before execution."
      autonomy_decision_authority: "Works under close supervision. Executes defined playbook actions only. No authority to make containment decisions independently. Escalates all findings and severity assessments to senior responders."
      communication_stakeholder: "Primarily internal communication with IR team. Documents findings in case management system. May participate in incident bridge calls as a listener. Limited interaction outside the IR team."
      degree_equivalent: "Bachelor's degree in Computer Science, Cybersecurity, IT, or related field, OR 1-2 years of SOC, helpdesk, or IT operations experience, OR completion of an incident response training program with demonstrated practical skills."
      certifications:
        - "CompTIA Security+"
        - "CompTIA CySA+"
        - "GIAC Certified Incident Handler (GCIH)"
        - "BTL1 (Blue Team Level 1)"
      salary:
        us_government: "$60,000 - $90,000 (GS-9 to GS-11)"
        us_startup: "$75,000 - $100,000"
        us_corporate: "$70,000 - $95,000"
        us_bigtech: "$140,000 - $210,000"

    - id: "responder2"
      title: "Responder 2 / Mid"
      general_description: "Mid-level incident responder capable of running incidents semi-independently through containment, eradication, and recovery. Develops and refines IR playbooks. Performs malware triage and IOC extraction. Coordinates containment actions with IT operations and begins participating in on-call rotation."
      primary_responsibilities:
        - "Lead routine incidents through containment, eradication, and recovery"
        - "Develop and refine IR playbooks and runbooks for recurring incident types"
        - "Perform malware triage — behavioral analysis in sandboxes, YARA rule writing, IOC extraction"
        - "Coordinate containment actions with IT operations (network isolation, credential resets, firewall blocks)"
        - "Lead evidence collection on complex multi-system cases"
        - "Participate in tabletop exercises as a facilitator or player"
        - "Participate in on-call/retainer rotation"
        - "Build detection content from incident findings to prevent recurrence"
        - "Contribute to post-incident review reports"
      required_skills:
        - "Strong Windows forensic artifact knowledge (registry, prefetch, amcache, shimcache, NTFS artifacts)"
        - "Linux incident response beyond basics (memory analysis with Volatility, timeline analysis)"
        - "MITRE ATT&CK mapping as a routine analytical practice"
        - "Python or PowerShell scripting to automate collection, parse logs, or enrich IOCs"
        - "Network forensics — session reconstruction, C2 pattern identification, DNS exfiltration analysis"
        - "Proficiency with NIST CSF and SP 800-61 for mapping organizational IR plans"
        - "Ability to brief technical managers clearly during active incidents"
        - "EDR investigation and response (CrowdStrike, Defender, SentinelOne)"
      preferred_skills:
        - "Cloud IR fundamentals — pulling CloudTrail, Azure AD sign-in logs, or GCP audit logs"
        - "Basic SOAR experience (Cortex XSOAR, Splunk SOAR)"
        - "Familiarity with threat intelligence platforms (MISP, OpenCTI) for IOC enrichment"
        - "Understanding of breach notification timelines (GDPR 72-hour window, state-level requirements)"
        - "Exposure to ransomware negotiation processes and recovery workflows"
      mentorship_requirements: "Mentors entry-level responders on evidence handling and playbook execution. Receives mentorship from senior responders focused on strategic decision-making and stakeholder management during complex incidents. Should be developing expertise in a specialization (cloud IR, ransomware, insider threat)."
      impact_scope: "Directly shapes containment strategy on individual incidents. Detection content from incidents improves organizational security posture. Playbook improvements benefit the entire IR team. Response decisions affect business operations during active incidents."
      autonomy_decision_authority: "Works with moderate supervision. Makes containment decisions on routine incidents independently. Escalates novel, high-severity, or business-impacting incidents to senior responders. Authority to coordinate IT actions within approved containment scope."
      communication_stakeholder: "Regular interaction with IT operations and department heads of affected business units during incidents. Participates actively in incident bridge calls. Communicates technical status to non-technical stakeholders. Coordinates with SOC analysts on detection and handoff."
      degree_equivalent: "Bachelor's degree in Computer Science, Cybersecurity, or related field, OR 3-5 years of IR, SOC, or DFIR experience. Demonstrated ability to lead incidents through resolution."
      certifications:
        - "GIAC Certified Incident Handler (GCIH)"
        - "GIAC Certified Forensic Analyst (GCFA)"
        - "GIAC Network Forensic Analyst (GNFA)"
        - "EC-Council Certified Incident Handler (ECIH)"
      salary:
        us_government: "$90,000 - $120,000 (GS-12 to GS-13)"
        us_startup: "$105,000 - $145,000"
        us_corporate: "$100,000 - $135,000"
        us_bigtech: "$230,000 - $370,000"

    - id: "responder3"
      title: "Responder 3 / Senior"
      general_description: "Senior incident responder who leads complex, high-severity incidents end-to-end including active-adversary engagements such as ransomware and nation-state intrusions. Serves as the escalation point for difficult incidents. Coordinates with legal and executive stakeholders during active breaches. Mentors mid-level and entry responders on technical execution and incident leadership judgment."
      primary_responsibilities:
        - "Lead complex, high-severity incidents end-to-end — including ransomware, business email compromise, and nation-state intrusions"
        - "Serve as escalation point for all high-severity or ambiguous incidents"
        - "Coordinate with legal counsel and executive leadership during active incidents"
        - "Design and run tabletop exercises for technical audiences"
        - "Conduct post-incident reviews and author lessons-learned reports"
        - "Evaluate, select, and implement IR tooling"
        - "Develop automation for IR workflows and response procedures"
        - "Mentor mid-level and entry-level responders on technical execution and judgment"
        - "Refine IR playbooks and escalation procedures based on incident learnings"
      required_skills:
        - "Deep OS internals — identification of living-off-the-land techniques, persistence mechanisms, and anti-forensics across Windows, Linux, and macOS"
