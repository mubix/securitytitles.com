security_administrator:
  name: "Security Administrator"
  description: "Professionals who implement, configure, and maintain security controls and infrastructure. Responsible for the day-to-day operation of security tools, policy enforcement, and ensuring security systems function effectively to protect organizational assets."
  nice_mapping:
    work_roles:
      - id: "PR-INF-001"
        name: "Cyber Defense Infrastructure Support Specialist"
    strength: "strong"
    notes: "NICE is more infrastructure-specific; Security Titles covers broader security control administration."
  levels:
    - id: "admin1"
      title: "Admin 1 / Entry"
      general_description: "Entry-level security administrator learning to operate and maintain security tools and controls. Performs routine administrative tasks following established procedures. Develops foundational knowledge of security technologies, access management, and policy implementation."
      primary_responsibilities:
        - "Perform routine security tool maintenance and updates"
        - "Process access requests following established procedures"
        - "Monitor security system health and availability"
        - "Assist with user provisioning and deprovisioning"
        - "Document security configurations and procedures"
        - "Respond to basic security-related helpdesk tickets"
        - "Participate in security tool deployments"
        - "Maintain security asset inventories"
      required_skills:
        - "Basic Windows and Linux system administration"
        - "Understanding of identity and access management concepts"
        - "Familiarity with common security tools (firewalls, AV, EDR)"
        - "Basic networking knowledge (TCP/IP, DNS, DHCP)"
        - "Documentation and procedure following"
        - "Ticketing system operation"
        - "Basic troubleshooting skills"
      preferred_skills:
        - "Active Directory administration basics"
        - "Cloud platform familiarity (AWS, Azure)"
        - "Scripting basics (PowerShell, Python)"
        - "Virtualization platform experience"
        - "Security tool certifications"
      mentorship_requirements: "Receives direct mentorship from Senior security administrators. Shadows on complex tasks and projects. Expected to complete tool-specific training within first 6 months. Participates in team knowledge sharing sessions."
      impact_scope: "Individual contributor on assigned administrative tasks. Impact limited to routine operations and ticket resolution. Work is reviewed before implementation. Supports overall security operations effectiveness."
      autonomy_decision_authority: "Works under close supervision. Follows established procedures for all tasks. Limited authority to make configuration changes independently. Escalates non-routine requests to senior team members."
      communication_stakeholder: "Primarily internal communication with security team and IT. Responds to tickets from end users. Documents work in ticketing systems. Limited stakeholder interaction outside immediate team."
      degree_equivalent: "Bachelor's degree in IT, Computer Science, Cybersecurity, or related field, OR 1-2 years of IT administration experience, OR completion of relevant technical certification program."
      certifications:
        - "CompTIA Security+"
        - "Microsoft Certified: Security Administrator"
        - "Vendor-specific tool certifications"
        - "CompTIA Network+"
      salary:
        us_government: "$50,000 - $70,000 (GS-7 to GS-9)"
        us_startup: "$55,000 - $80,000"
        us_corporate: "$50,000 - $75,000"
        us_bigtech: "$110,000 - $170,000"

