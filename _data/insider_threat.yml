# Insider Threat Professional Titles
# Data file for Jekyll-based security titles standardization

insider_threat_analyst:
  name: "Insider Threat Analyst"
  description: "Professionals who detect, investigate, and mitigate threats originating from insiders—employees, contractors, and trusted partners. Focus on behavioral analytics, user and entity behavior analytics (UEBA), policy violation detection, investigation of data exfiltration and sabotage, and coordinating with HR, legal, and management on sensitive cases. Distinct from SOC analysts (who focus on external threats) and fraud analysts (who focus on financial fraud). Insider threat work demands extreme discretion, an understanding of legal and privacy constraints, and the ability to conduct investigations that may involve colleagues at every level of the organization."
  nice_mapping:
    work_roles:
      - id: "PR-CDA-001"
        name: "Cyber Defense Analyst"
    strength: "partial"
    notes: "NICE has no dedicated insider threat role. PR-CDA-001 covers general defense analysis but does not address the behavioral analytics, HR coordination, and legal sensitivity specific to insider threat work."
  levels:
    - id: "analyst1"
      title: "Analyst 1 / Entry"
      general_description: "Entry-level insider threat analyst learning the fundamentals of insider risk detection and investigation. Monitors UEBA and DLP alerts, follows established triage procedures, and documents case activity under close supervision. Develops foundational understanding of behavioral indicators, insider threat frameworks, and the legal and privacy boundaries that govern this work."
      primary_responsibilities:
        - "Monitor UEBA and DLP alert queues for potential insider threat indicators"
        - "Triage alerts following established insider threat playbooks"
        - "Document case activity and investigation notes with strict confidentiality"
        - "Escalate anomalous user behavior to senior analysts"
        - "Assist with gathering supporting data for active investigations"
        - "Learn organizational policies around acceptable use and data handling"
        - "Review user activity logs and access records as directed"
        - "Shadow senior analysts on insider threat case reviews"
        - "Complete insider threat awareness and legal sensitivity training"
      required_skills:
        - "Basic understanding of insider threat concepts and motivations (MICE framework)"
        - "Familiarity with UEBA alert types and behavioral indicators"
        - "Understanding of data loss prevention (DLP) fundamentals"
        - "Knowledge of common insider threat scenarios (data exfiltration, sabotage, fraud)"
        - "Basic log analysis skills (email logs, access logs, file activity)"
        - "Strong documentation and writing skills"
        - "Understanding of confidentiality requirements and need-to-know principles"
      preferred_skills:
        - "SOC or security operations background"
        - "Familiarity with UEBA platforms (Securonix, Exabeam)"
        - "Basic understanding of employment law and privacy regulations"
        - "Background in HR, investigations, or law enforcement"
        - "Knowledge of NITTF insider threat program standards"
      mentorship_requirements: "Receives direct mentorship from Senior insider threat analysts. Shadows on case reviews, HR coordination meetings, and management briefings. Expected to complete insider threat program training including legal and privacy frameworks. Learns the boundaries between security monitoring and employee surveillance."
      impact_scope: "Individual contributor on alert triage and case documentation. Impact limited to supporting active investigations. All work is reviewed before any action is taken. Contributes to overall program coverage and detection metrics."
      autonomy_decision_authority: "Works under close supervision. Follows established triage and escalation procedures. No authority to initiate investigations or contact subjects. Escalates all potential insider threat indicators to senior analysts."
      communication_stakeholder: "Primarily internal communication with the insider threat team. Documents findings in case management systems. Limited direct interaction with HR, legal, or management. Participates in team briefings and shift handoffs."
      degree_equivalent: "Bachelor's degree in Cybersecurity, Criminal Justice, Psychology, Intelligence Studies, or related field, OR 1-2 years of SOC, investigations, or security operations experience, OR law enforcement or military counterintelligence background transitioning to private sector."
      certifications:
        - "CompTIA Security+"
        - "CERT Insider Threat Analyst"
        - "CompTIA CySA+"
        - "CISA Insider Threat Awareness Training"
      salary:
        us_government: "$55,000 - $75,000 (GS-7 to GS-9)"
        us_startup: "$60,000 - $85,000"
        us_corporate: "$55,000 - $80,000"
        us_bigtech: "$115,000 - $175,000"

    - id: "analyst2"
      title: "Analyst 2 / Junior"
      general_description: "Junior insider threat analyst capable of independently triaging behavioral alerts and contributing to investigations. Demonstrates proficiency with UEBA and DLP platforms and can distinguish genuine insider risk indicators from benign activity. Understands the sensitivity of insider threat work and maintains appropriate discretion in all communications."
      primary_responsibilities:
        - "Independently triage and disposition UEBA and DLP alerts"
        - "Conduct preliminary analysis of user behavioral anomalies"
        - "Correlate activity across email, endpoint, cloud, and physical access logs"
        - "Document investigation findings and maintain case files"
        - "Identify patterns in policy violations and acceptable use breaches"
        - "Support senior analysts on complex insider threat cases"
        - "Monitor for indicators of data exfiltration (USB, cloud uploads, print activity)"
        - "Assist with preparing insider threat case summaries for management"
        - "Participate in insider threat working group meetings"
        - "Help maintain insider threat detection rules and alert thresholds"
      required_skills:
        - "Proficiency with UEBA platforms (Securonix, Exabeam, or Microsoft Sentinel UEBA)"
        - "DLP platform operation (Microsoft Purview, Symantec DLP, Digital Guardian)"
        - "User activity monitoring and log correlation"
        - "Understanding of behavioral indicators of insider threat (CERT model)"
        - "Knowledge of data exfiltration techniques and channels"
        - "Case documentation and evidence handling"
        - "Discretion and confidentiality in sensitive investigations"
        - "Basic understanding of legal hold and preservation requirements"
      preferred_skills:
        - "Experience with DTEX or Proofpoint Insider Threat Management"
        - "Familiarity with employee privacy laws (ECPA, GDPR implications)"
        - "Background investigation or clearance process knowledge"
        - "Behavioral analysis or psychology coursework"
        - "Scripting for log analysis automation"
      mentorship_requirements: "Receives guidance from Senior analysts on complex cases and legal sensitivities. Expected to begin assisting Entry-level analysts with triage procedures. Developing expertise in specific insider threat vectors (data exfiltration, IP theft, workplace violence indicators). Learns to navigate the tension between thorough investigation and employee privacy."
      impact_scope: "Directly contributes to insider threat detection and case development. Responsible for accurate alert triage that affects whether investigations are opened. Analysis informs management decisions about employee risk. Beginning to influence detection rule tuning."
      autonomy_decision_authority: "Works with moderate supervision. Can make routine triage decisions and close false positive alerts. Authority to gather supporting evidence for active cases. Escalates case opening decisions and any contact with subjects or managers."
      communication_stakeholder: "Regular interaction with the insider threat team and SOC. Provides case updates to senior analysts. Limited direct interaction with HR or legal. Documents analysis for internal case management."
      degree_equivalent: "Bachelor's degree in relevant field, OR 2-4 years of insider threat, SOC, investigations, or counterintelligence experience. Demonstrated ability to handle sensitive investigations with discretion."
      certifications:
        - "CERT Insider Threat Analyst"
        - "GIAC Security Essentials (GSEC)"
        - "Certified Insider Threat Professional (CITP)"
        - "CompTIA CySA+"
      salary:
        us_government: "$70,000 - $95,000 (GS-9 to GS-11)"
        us_startup: "$80,000 - $105,000"
        us_corporate: "$75,000 - $105,000"
        us_bigtech: "$165,000 - $260,000"

    - id: "analyst3"
      title: "Analyst 3 / Mid"
      general_description: "Experienced insider threat analyst who independently leads investigations from detection through resolution. Expert at correlating behavioral signals across multiple data sources to build comprehensive insider risk profiles. Serves as the primary interface between the insider threat program and HR, legal, and management stakeholders on active cases. Understands the full lifecycle of insider threat cases including legal constraints, evidence standards, and the human factors that drive insider risk."
      primary_responsibilities:
        - "Lead insider threat investigations from initial detection to case closure"
        - "Conduct deep behavioral analysis across UEBA, DLP, and physical security data"
        - "Build comprehensive user risk profiles using technical and behavioral indicators"
        - "Coordinate directly with HR and legal counsel on active investigations"
        - "Brief management on insider threat cases and recommended actions"
        - "Develop and refine insider threat detection use cases and behavioral rules"
        - "Mentor junior insider threat analysts"
        - "Conduct threat assessments for departing employees and high-risk transitions"
        - "Analyze data exfiltration incidents and quantify impact"
        - "Contribute to insider threat program metrics and reporting"
        - "Participate in cross-functional insider risk review boards"
      required_skills:
        - "End-to-end insider threat investigation methodology"
        - "Advanced UEBA analytics and behavioral baseline analysis"
        - "Multi-source data correlation (email, endpoint, cloud, badge, HR systems)"
        - "Understanding of legal frameworks (ECPA, state monitoring laws, union considerations)"
        - "HR coordination and management briefing skills"
        - "Evidence handling and chain of custody practices"
        - "Departing employee risk assessment methodology"
        - "Report writing for executive and legal audiences"
        - "Knowledge of intellectual property protection requirements"
      preferred_skills:
        - "Certified Fraud Examiner (CFE) concepts"
        - "Digital forensics fundamentals for evidence collection"
        - "Knowledge of counterintelligence tradecraft"
        - "Experience with insider threat case management platforms"
        - "Understanding of workplace violence threat assessment"
        - "Foreign language proficiency for multinational investigations"
      mentorship_requirements: "Mentors Junior and Entry-level analysts on investigation techniques and case handling. Expected to develop expertise in the organization's unique insider threat landscape. Provides guidance on legal sensitivities and stakeholder management. Should be building relationships with HR, legal, and business unit leaders."
      impact_scope: "Leads investigations that directly affect personnel decisions and organizational risk posture. Analysis influences policy development and insider threat program direction. Recommendations may result in termination, legal action, or law enforcement referral. Responsible for accurate risk assessment on high-impact cases."
      autonomy_decision_authority: "Works independently on most investigations. Authority to open cases and direct investigation activities. Makes triage and prioritization decisions for the alert queue. Escalates cases involving executives, legal complexity, or potential criminal referral."
      communication_stakeholder: "Regular direct interaction with HR business partners and legal counsel. Briefs middle and senior management on case findings. Presents at insider risk review boards. Coordinates with SOC and IT on technical data collection. May interact with law enforcement on referred cases."
      degree_equivalent: "Bachelor's degree in relevant field plus 4-6 years of insider threat, investigations, counterintelligence, or security operations experience, OR equivalent combination of education and demonstrated investigation expertise."
      certifications:
        - "CERT Insider Threat Analyst"
        - "Certified Insider Threat Professional (CITP)"
        - "GIAC Cyber Threat Intelligence (GCTI)"
        - "Certified Protection Professional (CPP)"
        - "SANS FOR508 (Advanced Incident Response)"
      salary:
        us_government: "$85,000 - $120,000 (GS-12 to GS-13)"
        us_startup: "$100,000 - $135,000"
        us_corporate: "$95,000 - $130,000"
        us_bigtech: "$230,000 - $360,000"

    - id: "analyst4"
      title: "Analyst 4 / Senior"
      general_description: "Senior insider threat analyst with deep expertise in complex and high-stakes investigations involving executives, nation-state recruitment, intellectual property theft, and potential espionage. Serves as the escalation point for the most sensitive cases and provides expert guidance on legal, regulatory, and ethical dimensions of insider threat work. Leads the development of detection strategies and ensures the program balances security effectiveness with employee privacy and organizational culture."
      primary_responsibilities:
        - "Lead the most complex and sensitive insider threat investigations"
        - "Serve as escalation point for cases involving executives, legal risk, or espionage indicators"
        - "Develop advanced behavioral analytics models and detection strategies"
        - "Advise HR and legal on insider threat case disposition and evidence sufficiency"
        - "Design and implement insider threat risk scoring frameworks"
        - "Lead departing employee programs for critical roles and key personnel"
        - "Conduct insider threat damage assessments and impact quantification"
        - "Develop and deliver insider threat awareness training for the organization"
        - "Represent the insider threat program in cross-functional security reviews"
        - "Evaluate and recommend insider threat detection technologies"
        - "Build and maintain relationships with law enforcement and intelligence contacts"
      required_skills:
        - "Expert-level investigation methodology for high-sensitivity cases"
        - "Advanced behavioral analytics and risk scoring model development"
        - "Deep knowledge of employment law, privacy regulations, and monitoring authorities"
        - "Executive communication and sensitive case briefing"
        - "Damage assessment and impact quantification methodology"
        - "Insider threat program maturity assessment"
        - "Cross-functional leadership in HR, legal, and security collaboration"
        - "Knowledge of espionage indicators and nation-state recruitment tradecraft"
        - "Advanced proficiency with Securonix, Exabeam, or equivalent UEBA platforms"
        - "Understanding of trade secret law and economic espionage statutes"
      preferred_skills:
        - "Government counterintelligence or law enforcement investigation background"
        - "Polygraph or statement analysis training"
        - "Experience with NITTF standards and DoD insider threat requirements"
        - "Published research or presentations on insider threat topics"
        - "CFCE or EnCE digital forensics certification"
        - "Understanding of foreign intelligence service targeting methodologies"
      mentorship_requirements: "Mentors Mid and Junior analysts on complex case management and stakeholder navigation. Provides expert guidance on legal and ethical boundaries. Expected to develop next-generation analysts through structured case review and feedback. Establishes standards for investigation quality and documentation."
      impact_scope: "Investigations directly influence executive decisions, legal proceedings, and organizational risk posture. Detection strategies shape the program's ability to identify insider threats across the enterprise. Recommendations may involve C-suite personnel or result in criminal prosecution referrals. Sets quality standards for the insider threat function."
      autonomy_decision_authority: "Works independently on all investigation types. Authority to direct investigation strategy and resource allocation. Makes risk-based decisions on case prioritization and scope. Escalates only cases with board-level or regulatory implications. Trusted to manage highly sensitive information with minimal oversight."
      communication_stakeholder: "Direct communication with C-suite and senior leadership on high-profile cases. Regular coordination with General Counsel and CHRO. Briefs audit committees and risk oversight bodies. Maintains relationships with FBI, CISA, and relevant law enforcement agencies. Represents the insider threat program externally at industry forums."
      degree_equivalent: "Bachelor's or Master's degree in relevant field plus 6-9 years of insider threat, counterintelligence, or complex investigations experience, OR equivalent demonstrated expertise in leading sensitive investigations and insider threat program operations."
      certifications:
        - "Certified Insider Threat Professional (CITP)"
        - "CERT Insider Threat Analyst"
        - "Certified Fraud Examiner (CFE)"
        - "Certified Protection Professional (CPP)"
        - "CISSP"
        - "GIAC Security Expert (GSE)"
      salary:
        us_government: "$115,000 - $155,000 (GS-13 to GS-14)"
        us_startup: "$130,000 - $170,000"
        us_corporate: "$130,000 - $175,000"
        us_bigtech: "$320,000 - $500,000"

    - id: "analyst5"
      title: "Analyst 5 / Staff"
      general_description: "Staff-level insider threat analyst with cross-organizational influence who shapes how insider threat detection and investigation are conducted across the enterprise. Develops detection methodologies, investigation frameworks, and risk assessment models that other analysts use. Drives integration between insider threat, counterintelligence, HR, legal, and physical security functions. Recognized as a subject matter authority within the organization and increasingly in the broader insider threat community."
      primary_responsibilities:
        - "Develop insider threat detection methodologies and investigation frameworks used org-wide"
        - "Design behavioral analytics strategies that integrate UEBA, DLP, and HR data sources"
        - "Lead cross-functional insider threat working groups spanning security, HR, legal, and compliance"
        - "Architect the organization's insider risk scoring and prioritization models"
        - "Establish insider threat case quality standards and investigation best practices"
        - "Drive integration between insider threat, counterintelligence, and physical security programs"
        - "Advise executive leadership on insider threat program strategy and investment"
        - "Lead insider threat program assessments and maturity evaluations"
        - "Develop metrics and KPIs that demonstrate insider threat program effectiveness"
        - "Represent the organization in industry insider threat forums and working groups"
        - "Evaluate emerging insider threat technologies and analytical techniques"
      required_skills:
        - "Insider threat program design and maturity frameworks"
        - "Advanced behavioral analytics model development and validation"
        - "Cross-functional program leadership spanning technical and non-technical domains"
        - "Insider threat metrics development and program effectiveness measurement"
        - "Executive advisory and board-level communication"
        - "Deep expertise in privacy law, monitoring authorities, and regulatory compliance across jurisdictions"
        - "Vendor evaluation and technology strategy for insider threat platforms"
        - "Risk quantification and business impact analysis for insider threats"
        - "Knowledge of insider threat research (CERT, PERSEREC, CDSE)"
      preferred_skills:
        - "Experience building insider threat programs from inception"
        - "Published research or thought leadership on insider threat"
        - "Intelligence community or DoD insider threat program experience"
        - "Data science or machine learning knowledge for behavioral analytics"
        - "Experience with insider threat in regulated industries (ITAR, financial services)"
        - "International insider threat program experience across multiple jurisdictions"
      mentorship_requirements: "Mentors Senior and Mid-level analysts on career development and complex case strategy. Develops training programs and investigation playbooks for the insider threat function. Expected to grow talent and build institutional knowledge. Mentors cross-functionally, helping HR and legal partners understand insider threat tradecraft."
      impact_scope: "Enterprise-wide influence on insider threat detection and investigation capabilities. Methodologies and frameworks are adopted across business units. Program strategy recommendations influence multi-year security investment. Work shapes organizational culture around insider risk awareness and reporting."
      autonomy_decision_authority: "Sets direction for insider threat detection strategy and investigation methodology. Authority to define program standards and resource priorities. Makes independent decisions on program architecture and tool selection. Partners with executive leadership on strategic decisions."
      communication_stakeholder: "Regular engagement with CISO, General Counsel, and CHRO. Presents to board risk committees and audit bodies. Represents the organization at industry events and government coordination forums (NITTF, FBI InfraGard). Leads cross-functional working groups."
      degree_equivalent: "Master's degree or equivalent plus 9-12 years of progressive insider threat, counterintelligence, or security investigations experience, OR equivalent demonstrated expertise in building and leading insider threat programs."
      certifications:
        - "Certified Insider Threat Professional (CITP)"
        - "CISSP"
        - "Certified Protection Professional (CPP)"
        - "CERT Insider Threat Program Manager"
        - "GIAC Security Expert (GSE)"
      salary:
        us_government: "$130,000 - $175,000 (GS-14 to GS-15)"
        us_startup: "$155,000 - $200,000"
        us_corporate: "$155,000 - $210,000"
        us_bigtech: "$350,000 - $550,000"

    - id: "analyst6"
      title: "Analyst 6 / Senior Staff"
      general_description: "Senior Staff insider threat analyst with organization-wide authority who defines how the insider threat function operates and integrates with broader enterprise risk management. Shapes policy, establishes governance structures, and drives the convergence of insider threat with counterintelligence, corporate security, and compliance functions. Influences industry standards and government frameworks for insider threat programs."
      primary_responsibilities:
        - "Define the operational model and governance structure for the insider threat function"
        - "Establish enterprise insider threat policy and program charter"
        - "Drive convergence of insider threat, counterintelligence, fraud, and corporate security"
        - "Advise the CISO and executive committee on insider risk posture and strategy"
        - "Shape organizational policy on employee monitoring, privacy, and acceptable use"
        - "Lead enterprise-wide insider threat risk assessments and scenario planning"
        - "Develop insider threat intelligence sharing frameworks with government and industry"
        - "Establish program governance including case review boards and oversight mechanisms"
        - "Drive insider threat considerations into M&A due diligence and integration"
        - "Influence industry standards through participation in NITTF, ODNI, and professional bodies"
        - "Architect multi-year insider threat program roadmaps aligned with business strategy"
      required_skills:
        - "Insider threat program governance and organizational design"
        - "Enterprise risk management integration and convergence strategy"
        - "Policy development for employee monitoring and privacy across global jurisdictions"
        - "Executive influence and board-level advisory"
        - "Insider threat program performance measurement and ROI demonstration"
        - "Government insider threat standards and compliance requirements (EO 13587, NISPOM)"
        - "M&A insider threat risk assessment"
        - "Multi-national insider threat program management"
        - "Industry standards development and regulatory engagement"
        - "Strategic intelligence analysis and threat forecasting"
      preferred_skills:
        - "Experience as an insider threat program director or equivalent"
        - "Government senior executive or intelligence community leadership background"
        - "Published author on insider threat methodology or policy"
        - "Experience testifying or providing expert analysis in legal proceedings"
        - "Board-level communication and advisory experience"
        - "International regulatory expertise (EU, APAC monitoring and privacy laws)"
      mentorship_requirements: "Mentors Staff and Senior analysts on program leadership and strategic thinking. Develops future insider threat program leaders. Expected to build the organization's insider threat bench strength and succession plan. Mentors cross-functionally at the executive level on insider risk culture."
      impact_scope: "Defines how the organization approaches insider threat at the strategic level. Policies and governance frameworks shape enterprise culture around insider risk. Decisions influence multi-year investment and organizational structure. Industry contributions shape how peer organizations build insider threat capabilities."
      autonomy_decision_authority: "Sets strategic direction for the insider threat function. Authority to establish policy, governance, and organizational structure. Makes independent decisions on program architecture and resource allocation. Partners with the CISO and executive committee on board-level matters."
      communication_stakeholder: "Regular engagement with CEO, board of directors, and executive committee. Coordinates with government agencies at the senior leadership level. Represents the organization in national-level insider threat forums. Leads executive education on insider risk."
      degree_equivalent: "Master's degree or equivalent plus 12-16 years of progressive insider threat, counterintelligence, or senior security leadership experience, OR equivalent demonstrated impact in shaping insider threat programs at the enterprise or national level."
      certifications:
        - "CISSP"
        - "Certified Protection Professional (CPP)"
        - "Certified Insider Threat Professional (CITP)"
        - "CERT Insider Threat Program Manager"
        - "CISM"
      salary:
        us_government: "$140,000 - $191,000 (GS-15 to SES)"
        us_startup: "$180,000 - $240,000"
        us_corporate: "$190,000 - $260,000"
        us_bigtech: "$400,000 - $650,000"

    - id: "analyst7"
      title: "Analyst 7 / Principal"
      general_description: "Principal insider threat analyst with industry-defining expertise who creates methodologies, frameworks, and standards adopted beyond their organization. Recognized nationally or internationally as a leading authority on insider threat detection, investigation, and program development. Shapes government policy, academic research, and industry best practices. Operates at the intersection of cybersecurity, counterintelligence, behavioral science, and organizational risk."
      primary_responsibilities:
        - "Create insider threat methodologies and frameworks adopted across the industry"
        - "Shape national and international insider threat policy and standards"
        - "Advise government agencies and regulatory bodies on insider threat program requirements"
        - "Drive foundational research into insider threat detection, behavioral indicators, and risk models"
        - "Establish cross-industry insider threat intelligence sharing mechanisms"
        - "Keynote at major security conferences on insider threat strategy and evolution"
        - "Advise boards of directors and executive teams at peer organizations"
        - "Develop novel approaches to emerging insider threat vectors (AI-enabled exfiltration, hybrid workforce)"
        - "Bridge cybersecurity, behavioral science, and counterintelligence disciplines"
        - "Shape the next generation of insider threat professionals through published work and mentorship"
        - "Influence organizational culture change around insider risk at a national scale"
      required_skills:
        - "Industry-recognized expertise in insider threat program development and methodology"
        - "Deep knowledge of government insider threat requirements across multiple frameworks"
        - "Research methodology and the ability to advance the state of insider threat practice"
        - "National-level stakeholder engagement (ODNI, NITTF, CISA, FBI)"
        - "Published body of work on insider threat topics"
        - "Cross-disciplinary expertise spanning technology, behavioral science, and law"
        - "Board advisory and C-suite strategic counsel"
        - "Ability to translate complex insider threat concepts for policy and legislative audiences"
        - "Vision for the evolution of insider threat in response to emerging technologies and work patterns"
      preferred_skills:
        - "Academic appointments or research affiliations (CERT/SEI, PERSEREC)"
        - "Government senior executive service or equivalent leadership background"
        - "Experience shaping legislation or executive orders related to insider threat"
        - "International insider threat program advisory experience"
        - "Expert witness or legal testimony experience"
        - "Behavioral science or organizational psychology advanced study"
      mentorship_requirements: "Mentors across the industry, not just within their organization. Develops insider threat leaders through published frameworks, conference presentations, and direct advisory. Expected to elevate the entire insider threat discipline. Shapes academic curricula and professional certification standards."
      impact_scope: "Industry-wide influence on how insider threat programs are built, measured, and operated. Frameworks and methodologies are adopted by peer organizations and government agencies. Shapes national policy and international standards. Defines best practices for the insider threat profession."
      autonomy_decision_authority: "Operates with full autonomy on insider threat strategy and methodology development. Authority is based on expertise and reputation rather than organizational hierarchy. Trusted to represent the organization and influence industry direction. Engages directly with government and regulatory leadership."
      communication_stakeholder: "Engages with national security leadership, regulatory bodies, and legislative staff. Keynotes industry conferences and publishes in professional journals. Advises peer-organization CISOs and boards. Represents the profession in media and public discourse on insider threat."
      degree_equivalent: "Master's or doctoral degree plus 15+ years of insider threat, counterintelligence, or senior security leadership experience, OR nationally recognized expertise demonstrated through published work, government advisory roles, and industry leadership."
      certifications:
        - "CISSP"
        - "Certified Insider Threat Professional (CITP)"
        - "Certified Protection Professional (CPP)"
        - "CISM"
        - "Fellow or board member of relevant professional organizations"
      salary:
        us_government: "$160,000 - $210,000 (SES / SL)"
        us_startup: "$200,000 - $275,000"
        us_corporate: "$220,000 - $300,000"
        us_bigtech: "$500,000 - $750,000"

insider_threat_engineer:
  name: "Insider Threat Engineer"
  description: "Technical professionals who build, deploy, and maintain the platforms, tooling, and data pipelines that enable insider threat detection at scale. Focus on UEBA and DLP platform engineering, behavioral analytics model development, data integration across HR/IT/security systems, and creating the monitoring infrastructure that insider threat analysts rely on. Bridge the gap between security engineering and the specialized requirements of insider threat programs, including privacy-preserving architectures and legal compliance in monitoring systems."
  nice_mapping:
    work_roles:
      - id: "PR-INF-001"
        name: "Cyber Defense Infrastructure Support Specialist"
    strength: "tenuous"
    notes: "NICE has no insider threat engineering role. PR-INF-001 covers general security infrastructure but not UEBA/DLP platform engineering."
  levels:
    - id: "eng1"
      title: "Eng 1 / Entry"
      general_description: "Entry-level insider threat engineer learning the technical foundations of insider threat detection platforms. Assists with deploying and maintaining UEBA and DLP tools, configuring data connectors, and supporting the infrastructure that enables behavioral analytics. Develops foundational understanding of how technical systems support insider threat programs while respecting privacy and legal constraints."
      primary_responsibilities:
        - "Assist with deployment and configuration of UEBA and DLP platforms"
        - "Configure data source connectors for log ingestion (Active Directory, email, endpoint)"
        - "Monitor platform health and troubleshoot data ingestion issues"
        - "Support maintenance of insider threat detection infrastructure"
        - "Document system configurations and data flow architectures"
        - "Assist with user activity data collection and normalization"
        - "Learn privacy-preserving data handling and access controls for monitoring systems"
        - "Help maintain development and test environments for insider threat tooling"
        - "Shadow senior engineers on platform architecture decisions"
      required_skills:
        - "Basic system administration (Linux, Windows Server)"
        - "Understanding of log management and SIEM fundamentals"
        - "Familiarity with database concepts (SQL, data normalization)"
        - "Basic networking knowledge (protocols, traffic flow, proxy architectures)"
        - "Understanding of directory services (Active Directory, Azure AD)"
        - "Scripting basics (Python, PowerShell)"
        - "Documentation and diagramming skills"
      preferred_skills:
        - "Familiarity with UEBA platforms (Securonix, Exabeam)"
        - "Exposure to DLP tools (Microsoft Purview, Symantec DLP)"
        - "Basic cloud platform knowledge (AWS, Azure)"
        - "Understanding of API integration concepts"
        - "Familiarity with ETL processes and data pipelines"
      mentorship_requirements: "Receives direct mentorship from Senior insider threat engineers. Shadows on platform deployments and architecture discussions. Expected to complete training on deployed UEBA/DLP platforms. Learns the unique data handling requirements for insider threat monitoring including privacy controls and legal authority boundaries."
      impact_scope: "Individual contributor on platform maintenance and configuration tasks. Impact limited to supporting infrastructure reliability. Work is reviewed before deployment. Contributes to overall platform uptime and data quality."
      autonomy_decision_authority: "Works under close supervision. Follows established deployment and configuration procedures. Limited authority to make changes to production systems. Escalates platform issues and configuration requests to senior engineers."
      communication_stakeholder: "Primarily internal communication with the insider threat engineering team. Documents configurations and issues in ticketing systems. Limited interaction with analysts or program leadership. May participate in team stand-ups and planning sessions."
      degree_equivalent: "Bachelor's degree in Computer Science, Information Technology, Cybersecurity, or related field, OR 1-2 years of IT infrastructure, security operations, or systems engineering experience."
      certifications:
        - "CompTIA Security+"
        - "CompTIA Linux+ or equivalent"
        - "Splunk Core Certified User"
        - "Microsoft SC-200 or AZ-900"
      salary:
        us_government: "$55,000 - $75,000 (GS-7 to GS-9)"
        us_startup: "$65,000 - $90,000"
        us_corporate: "$60,000 - $85,000"
        us_bigtech: "$120,000 - $180,000"

    - id: "eng2"
      title: "Eng 2 / Junior"
