# Security Consulting Professional Titles
# Data file for Jekyll-based security titles standardization
# Covers Big 4 / consulting firm career ladder, vCISO, and Fractional CISO

security_consultant:
  name: "Security Consultant"
  description: "Security consulting professionals who deliver advisory, assessment, and implementation services across multiple clients and industries. This track follows the Big 4 consulting career ladder (Deloitte, EY, KPMG, PwC) and applies broadly to mid-tier consulting firms, MSSPs, and boutique security consultancies. Consultants are generalists by design — engagements may span offensive testing, GRC, architecture review, incident response, and program development depending on client needs."
  levels:
    - id: "analyst"
      title: "Analyst / Associate"
      general_description: "Entry-level security consultant learning consulting methodologies, client engagement, and foundational security skills. Supports senior consultants on engagements, performs research and analysis, and develops deliverables under close supervision. Builds foundational knowledge across security domains rather than specializing early."
      primary_responsibilities:
        - "Support senior consultants on client engagements"
        - "Perform security assessments and gap analyses under guidance"
        - "Research regulatory requirements and industry frameworks"
        - "Draft sections of client deliverables and reports"
        - "Assist with vulnerability scanning and basic testing"
        - "Document findings and maintain engagement workpapers"
        - "Participate in client workshops and interviews"
        - "Complete internal training and certification programs"
      required_skills:
        - "Understanding of major security frameworks (NIST CSF, ISO 27001, CIS)"
        - "Basic knowledge of networking, systems, and cloud fundamentals"
        - "Strong written and verbal communication"
        - "Analytical thinking and attention to detail"
        - "Proficiency with Microsoft Office / Google Workspace"
        - "Basic understanding of risk assessment methodologies"
        - "Time management across multiple concurrent engagements"
      preferred_skills:
        - "Familiarity with GRC tools (ServiceNow, RSA Archer)"
        - "Basic scripting ability (Python, PowerShell)"
        - "Exposure to penetration testing concepts"
        - "Understanding of cloud platforms (AWS, Azure, GCP)"
        - "Consulting internship or co-op experience"
      mentorship_requirements: "Receives direct mentorship from Managers and Senior Consultants. Participates in structured onboarding and training program. Expected to complete foundational certifications within first year. Shadows on 5-10 engagements before taking ownership of workstreams."
      impact_scope: "Individual contributor on specific engagement workstreams. Impact limited to assigned deliverable components. Work is reviewed before client delivery. Contributes to overall engagement quality."
      autonomy_decision_authority: "Works under close supervision. Follows established methodologies and templates. Escalates all client questions and findings to engagement leads. Limited authority to make independent recommendations."
      communication_stakeholder: "Primarily internal communication with engagement team. May participate in client meetings as observer or note-taker. Presents specific findings to technical audiences under supervision."
      degree_equivalent: "Bachelor's degree in Computer Science, Cybersecurity, Information Systems, or related field, OR 1-2 years of IT/security experience."
      certifications:
        - "CompTIA Security+"
        - "CompTIA CySA+"
        - "ISC2 CC (Certified in Cybersecurity)"
        - "AWS Cloud Practitioner or Azure Fundamentals"
      salary:
        us_government: "$55,000 - $75,000 (GS-7 to GS-9)"
        us_startup: "$65,000 - $85,000"
        us_corporate: "$70,000 - $95,000"
        us_bigtech: "$120,000 - $190,000"

    - id: "senior_consultant"
      title: "Senior Consultant / Senior Associate"
      general_description: "Experienced consultant who leads workstreams within engagements and works with moderate independence. Demonstrates proficiency across multiple security domains and can manage day-to-day client relationships for their assigned work. Beginning to develop a consulting specialization while maintaining broad advisory capability."
      primary_responsibilities:
        - "Lead workstreams within larger security engagements"
        - "Conduct security assessments independently (gap analysis, risk assessments)"
        - "Draft and finalize client-facing deliverables and reports"
        - "Facilitate client workshops and stakeholder interviews"
        - "Perform technical testing (vulnerability assessments, configuration reviews)"
        - "Develop recommendations and remediation roadmaps"
        - "Mentor Analysts and review their deliverables"
        - "Contribute to proposals and statements of work"
      required_skills:
        - "Proficiency in 2-3 security frameworks with deep knowledge"
        - "Risk assessment and management methodologies"
        - "Security architecture review and gap analysis"
        - "Client presentation and facilitation skills"
        - "Technical writing and report development"
        - "Project management fundamentals"
        - "Understanding of regulatory compliance (SOX, HIPAA, PCI DSS, GDPR)"
        - "Ability to translate technical findings to business impact"
      preferred_skills:
        - "Penetration testing or red team experience"
        - "Cloud security assessment capabilities"
        - "Incident response experience"
        - "Industry-specific security knowledge (financial services, healthcare)"
        - "Familiarity with security automation and DevSecOps"
      mentorship_requirements: "Receives mentorship from Managers on engagement management and client skills. Expected to actively mentor Analysts. Developing a reputation for subject matter expertise in 1-2 domains. May begin informal coaching relationships with peers."
      impact_scope: "Owns quality and delivery of assigned workstreams. Findings and recommendations directly influence client security posture. Beginning to influence engagement approach and methodology. Reputation with specific clients developing."
      autonomy_decision_authority: "Works with moderate supervision. Can make tactical decisions within defined engagement scope. Escalates scope changes and significant client concerns. Independence on routine assessments and deliverables."
      communication_stakeholder: "Regular client interaction at the working level. Presents findings and recommendations to technical and management audiences. Facilitates workshops independently. Participates in project status calls."
      degree_equivalent: "Bachelor's degree with 2-4 years of consulting or security experience, OR Master's degree with 1-2 years. Demonstrated engagement delivery track record."
      certifications:
        - "CISSP or CISM"
        - "CISA (for GRC-focused consultants)"
        - "OSCP or GPEN (for technical consultants)"
        - "Cloud security certifications (CCSP, AWS Security Specialty)"
      salary:
        us_government: "$75,000 - $100,000 (GS-11 to GS-12)"
        us_startup: "$85,000 - $120,000"
        us_corporate: "$90,000 - $130,000"
        us_bigtech: "$170,000 - $280,000"

    - id: "manager"
      title: "Manager"
      general_description: "First management-level role responsible for end-to-end engagement delivery, team leadership, and client relationship management. Manages multiple concurrent engagements and a team of consultants. Balances delivery excellence with business development and people development. This is the level where consulting career divergence accelerates — some managers specialize deeply, others broaden."
      primary_responsibilities:
        - "Manage end-to-end delivery of security consulting engagements"
        - "Lead teams of 3-8 consultants across multiple projects"
        - "Own client relationships at the director/VP level"
        - "Develop proposals, scope engagements, and estimate effort"
        - "Review and approve all client deliverables"
        - "Conduct performance reviews and career development for team"
        - "Drive methodology improvements and quality standards"
        - "Support business development with subject matter expertise"
        - "Manage engagement budgets, timelines, and resource allocation"
        - "Handle client escalations and scope management"
      required_skills:
        - "Deep expertise in 2-3 security domains"
        - "Engagement management and delivery excellence"
        - "People leadership and talent development"
        - "Business development support and proposal writing"
        - "Budget management and utilization tracking"
        - "Executive communication and presentation"
        - "Risk management and escalation judgment"
        - "Cross-functional collaboration with other practice areas"
      preferred_skills:
        - "Industry vertical specialization"
        - "Program management or transformation experience"
        - "M&A security due diligence"
        - "Regulatory examination support experience"
        - "Published thought leadership or conference speaking"
      mentorship_requirements: "Mentors Senior Consultants and Analysts on engagement delivery, client management, and career development. Expected to develop future consulting leaders. May participate in firm-wide mentorship programs. Sponsors team members for promotions and development opportunities."
      impact_scope: "Responsible for engagement quality and client satisfaction across multiple projects. Influences practice methodology and quality standards. Directly impacts team utilization, revenue, and client retention. Beginning to shape practice direction."
      autonomy_decision_authority: "Full ownership of engagement delivery decisions. Authority over team assignments and resource allocation. Manages client expectations and scope independently. Escalates only significant financial or reputational risks."
      communication_stakeholder: "Direct relationship with client directors and VPs. Presents to senior leadership on engagement outcomes. Participates in firm leadership meetings. Represents the practice in cross-functional discussions."
      degree_equivalent: "Bachelor's degree with 5-8 years of consulting experience, OR Master's/MBA with 4-6 years. Demonstrated track record of successful engagement delivery and team leadership."
      certifications:
        - "CISSP required"
        - "CISM or CISA strongly preferred"
        - "PMP or relevant project management"
        - "Industry-specific certifications based on specialization"
      salary:
        us_government: "$110,000 - $145,000 (GS-13 to GS-14)"
        us_startup: "$130,000 - $175,000"
        us_corporate: "$130,000 - $175,000"
        us_bigtech: "$250,000 - $400,000"

    - id: "senior_manager"
      title: "Senior Manager"
      general_description: "Senior engagement leader responsible for large-scale security programs, multiple client relationships, and significant practice revenue. Manages managers and leads complex, multi-workstream engagements. Plays a significant role in business development, thought leadership, and practice strategy. Often the day-to-day senior point of contact for the firm's most important client relationships."
      primary_responsibilities:
        - "Lead large, complex security consulting engagements and programs"
        - "Manage and develop a team of managers and senior consultants"
        - "Own senior client relationships at the VP/CISO level"
        - "Drive significant business development and sales pipeline"
        - "Develop and deliver thought leadership (publications, speaking)"
        - "Shape practice methodology and service offerings"
        - "Manage multi-million dollar engagement portfolios"
        - "Support partner-level client relationships"
        - "Drive cross-practice collaboration and integrated offerings"
        - "Represent the firm at industry events and conferences"
      required_skills:
        - "Deep expertise in multiple security domains"
        - "Large program and portfolio management"
        - "Business development and sales execution"
        - "Executive relationship management at VP/CISO level"
        - "Thought leadership and industry presence"
        - "Financial management and P&L awareness"
        - "Talent strategy and organizational development"
        - "Complex stakeholder management"
      preferred_skills:
        - "Prior director or senior manager experience at a top firm"
        - "Board or audit committee advisory experience"
        - "International engagement experience"
        - "M&A integration leadership"
        - "Published author or frequent conference speaker"
      mentorship_requirements: "Develops future managers and leaders. Sponsors high-potential consultants for key opportunities. May lead firm-wide development programs. Shapes career framework and promotion criteria for the practice."
      impact_scope: "Practice revenue and growth. Client retention and expansion for major accounts. Team capability and organizational health. Market positioning and brand in specific security domains."
      autonomy_decision_authority: "Full authority over engagement portfolio and client strategy. Significant influence over practice direction and investment. Partners with firm leadership on strategic decisions. Authority over hiring and organizational changes within span."
      communication_stakeholder: "Regular engagement with client VPs and CISOs. Presentations to boards and audit committees on behalf of clients. Firm leadership engagement on practice performance. Industry event speaking and thought leadership."
      degree_equivalent: "Bachelor's degree with 8-12 years of consulting experience, OR Master's/MBA with 7-10 years. Track record of significant business development and large program delivery. Recognized industry expertise developing."
      certifications:
        - "CISSP, CISM required"
        - "Industry certifications based on specialization"
        - "Executive education programs valued"
        - "Certifications become less important than track record"
      salary:
        us_government: "$145,000 - $190,000 (GS-14 to GS-15)"
        us_startup: "$175,000 - $240,000"
        us_corporate: "$170,000 - $230,000"
        us_bigtech: "$350,000 - $550,000"

    - id: "director"
      title: "Director / Principal"
      general_description: "Practice leader responsible for a security consulting service line, major client portfolio, or regional practice. Drives strategy, revenue growth, and market positioning. Operates as a trusted advisor to CISOs and executive leadership. Heavy emphasis on business development, firm leadership, and industry influence. At some firms, this is the terminal level below Partner; at others, Director is a distinct track from the Partner path."
      primary_responsibilities:
        - "Lead a security consulting service line or practice area"
        - "Own and grow a significant client portfolio ($5M-$20M+ revenue)"
        - "Drive practice strategy and investment decisions"
        - "Serve as trusted advisor to client CISOs and executives"
        - "Lead large-scale security transformation programs"
        - "Drive thought leadership and market positioning"
        - "Recruit, develop, and retain top consulting talent"
        - "Represent the firm in strategic industry partnerships"
        - "Contribute to firm-wide strategy and leadership"
        - "Manage practice P&L and profitability"
      required_skills:
        - "Practice leadership and strategy"
        - "Large portfolio business development and sales"
        - "Executive advisory at the C-suite level"
        - "Financial management and P&L ownership"
        - "Organizational leadership and culture building"
        - "Industry thought leadership and market influence"
        - "Complex negotiation and deal structuring"
        - "Cross-practice and alliance management"
      preferred_skills:
        - "Prior practice leadership or partner-track experience"
        - "Board advisory and governance experience"
        - "Regulatory examination leadership"
        - "International practice management"
        - "Significant publications and industry recognition"
      mentorship_requirements: "Develops senior managers and future practice leaders. Sponsors firm-wide talent initiatives. May serve as executive sponsor for key accounts. Shapes firm culture and values within the practice."
      impact_scope: "Practice revenue, profitability, and growth. Market positioning and competitive differentiation. Organizational capability and talent pipeline. Client outcomes across the portfolio."
      autonomy_decision_authority: "Full authority over practice strategy and investment. Significant firm-level influence on security practice direction. Authority over hiring, structure, and market positioning. Partners with firm leadership on major decisions."
      communication_stakeholder: "Direct relationships with CISOs and C-suite executives. Board and audit committee advisory. Firm leadership team engagement. Industry analyst and media relationships."
      degree_equivalent: "Bachelor's degree with 12-16 years of consulting experience, OR Master's/MBA with 10-14 years. Demonstrated practice leadership, significant revenue generation, and industry recognition."
      certifications:
        - "CISSP, CISM typically held"
        - "Executive education (Wharton, Harvard, INSEAD)"
        - "Industry recognition supersedes certifications at this level"
        - "Board governance certifications (NACD) valuable"
      salary:
        us_government: "$175,000 - $220,000 (GS-15 / SES)"
        us_startup: "$230,000 - $320,000 + equity"
        us_corporate: "$220,000 - $300,000"
        us_bigtech: "$500,000 - $800,000"

    - id: "managing_director"
      title: "Managing Director / Executive Director"
      general_description: "Senior practice executive responsible for major market segments, global service lines, or the overall security consulting practice at a firm. Drives firm-level strategy, major alliance relationships, and market-defining initiatives. Operates at the intersection of business leadership and technical authority. At Big 4 firms, this is typically the level immediately below Partner."
      primary_responsibilities:
        - "Lead major market segment or global security practice"
        - "Own and grow $20M-$50M+ client portfolio"
        - "Drive firm-level security strategy and investment"
        - "Manage strategic alliance and technology partner relationships"
        - "Lead firm-wide security consulting transformation initiatives"
        - "Represent the firm at the highest levels with major clients"
        - "Drive innovation and new service development"
        - "Manage large leadership team of directors and senior managers"
        - "Influence firm governance and strategic direction"
        - "Shape market perception through industry leadership"
      required_skills:
        - "Enterprise business leadership"
        - "Large-scale revenue management ($20M+)"
        - "Strategic client advisory at board level"
        - "Organizational transformation leadership"
        - "Industry-defining thought leadership"
        - "Global or multi-market management"
        - "Alliance and ecosystem strategy"
        - "Innovation and service development"
      preferred_skills:
        - "Prior managing director or executive experience"
        - "Global practice management"
        - "Government advisory or regulatory leadership"
        - "Significant media presence and industry influence"
        - "Board membership or advisory experience"
      mentorship_requirements: "Develops directors and future managing directors. Serves as executive sponsor for firm-wide talent and diversity initiatives. Shapes the profession through advisory board service and industry governance."
      impact_scope: "Market-level security consulting strategy and positioning. Firm-wide revenue and growth in security. Industry direction and standards development. Next-generation leadership talent."
      autonomy_decision_authority: "Firm-level strategic authority within security practice. Significant influence on firm-wide decisions. Full authority over practice portfolio, investment, and structure. Direct engagement with firm's executive committee."
      communication_stakeholder: "Board-level client relationships. Firm executive committee engagement. Regulatory and government senior relationships. Industry analyst and media leadership."
      degree_equivalent: "Bachelor's degree with 16-20 years of consulting experience, OR Master's/MBA with 14-18 years. Recognized industry leader with demonstrated market impact and revenue generation."
      certifications:
        - "Certifications secondary to track record and industry recognition"
        - "Executive programs from top business schools"
        - "Board-level governance credentials"
        - "Industry advisory board memberships"
      salary:
        us_government: "$195,000 - $250,000 (SES)"
        us_startup: "$320,000 - $480,000 + significant equity"
        us_corporate: "$300,000 - $450,000 + bonus"
        us_bigtech: "$700,000 - $1,200,000"

    - id: "partner"
      title: "Partner"
      general_description: "Equity partner and firm owner responsible for the security consulting practice at the highest level. Sets firm-wide strategy, owns the most significant client relationships, and drives the profession forward. Partners are the public face of the firm's security practice and carry ultimate responsibility for practice performance, reputation, and direction. Compensation includes profit-sharing and equity, making total compensation highly variable."
      primary_responsibilities:
        - "Own and drive firm-wide security consulting strategy"
        - "Manage the firm's most strategic client relationships"
        - "Drive $50M-$100M+ in annual practice revenue"
        - "Serve on firm governance and leadership committees"
        - "Set vision for the security consulting market"
        - "Lead firm-defining thought leadership and publications"
        - "Represent the firm with regulators, government, and media"
        - "Make significant investment decisions for the practice"
        - "Build and sustain strategic alliances and partnerships"
        - "Shape the next generation of firm leadership"
        - "Contribute to firm-wide P&L and strategic direction"
      required_skills:
        - "Firm-level strategic leadership"
        - "Major account management ($50M+ relationships)"
        - "Public company board-level advisory"
        - "Regulatory and government relations at senior levels"
        - "Market-shaping thought leadership"
        - "Firm governance and fiduciary responsibility"
        - "Global business acumen"
        - "Media and analyst relations"
      preferred_skills:
        - "Recognized as a top industry voice"
        - "Government advisory committee membership"
        - "Published books or major industry publications"
        - "Board directorships"
        - "International business leadership"
      mentorship_requirements: "Serves as the ultimate career sponsor and advocate for future partners. Shapes firm culture, values, and professional standards. Contributes to industry mentorship through advisory boards, academic partnerships, and professional associations."
      impact_scope: "Firm-wide security practice performance and reputation. Industry direction and standards. Next-generation leadership development. Market-level competitive positioning and innovation."
      autonomy_decision_authority: "Equity ownership with commensurate authority. Firm-level decision-making on security practice. Significant influence on firm-wide strategy. Fiduciary responsibility to the partnership."
      communication_stakeholder: "Client board relationships. Government and regulatory senior leadership. Firm partnership and governance. Industry analyst, media, and standards body leadership."
      degree_equivalent: "Bachelor's degree with 18+ years of consulting experience, OR Master's/MBA with 16+ years. Recognized as a preeminent leader in security consulting with demonstrated market impact, significant revenue generation, and industry influence."
      certifications:
        - "Track record and industry recognition are the credentials"
        - "Board governance certifications"
        - "Often holds honorary or advisory positions"
        - "Published author and industry authority"
      salary:
        us_government: "N/A"
        us_startup: "$500,000 - $1,000,000+ + founder equity"
        us_corporate: "$500,000 - $1,000,000+ + bonus + profit sharing"
        us_bigtech: "$1,000,000 - $2,500,000+"

virtual_ciso:
  name: "Virtual CISO (vCISO)"
  description: "A Virtual CISO is a security executive employed by a consulting firm, MSSP, or vCISO services company who provides part-time CISO-level advisory and program leadership to multiple client organizations simultaneously. vCISOs are typically assigned to 5-15 clients and deliver security strategy, risk management, compliance guidance, and program oversight through the firm's methodology and support structure. This is not an entry-level or mid-career role — firms typically require 10-15+ years of security experience including prior management or director-level responsibility. The vCISO title is a service delivery role, not a career level. Career progression happens within the consulting firm's ladder (Senior Consultant through Director), with vCISO being the engagement type assigned at the appropriate seniority."
  levels:
    - id: "vciso"
      title: "vCISO"
      general_description: "Serves as the designated CISO for multiple client organizations through an MSSP or consulting firm. Provides strategic security leadership, risk oversight, compliance management, and program development. Balances breadth across many clients with sufficient depth to drive meaningful security improvement at each. Leverages the firm's methodology, templates, and support team to scale across engagements. Typically manages 5-10 client relationships concurrently."
      primary_responsibilities:
        - "Serve as outsourced CISO for multiple client organizations"
        - "Develop and maintain security strategies and roadmaps per client"
        - "Conduct and oversee risk assessments and security maturity evaluations"
        - "Advise client executive leadership and boards on security posture"
        - "Ensure regulatory compliance (SOC 2, HIPAA, PCI DSS, CMMC)"
        - "Manage security vendor relationships and technology decisions for clients"
        - "Oversee incident response planning and coordination"
        - "Build and develop client security teams and capabilities"
        - "Present security metrics and status to client leadership"
        - "Drive security awareness and culture initiatives at client organizations"
        - "Coordinate with firm's technical teams for assessments and implementations"
      required_skills:
        - "Broad security program management across all domains"
        - "Risk management and governance frameworks"
        - "Regulatory compliance across multiple frameworks simultaneously"
        - "Executive communication and board-level presentation"
        - "Security architecture and technology strategy"
        - "Vendor management and security tool evaluation"
        - "Incident response planning and crisis management"
        - "Team building and talent development"
        - "Budget management and resource optimization"
        - "Multi-client time management and prioritization"
      preferred_skills:
        - "Prior full-time CISO or Security Director experience"
        - "Industry-specific expertise (healthcare, financial services, manufacturing)"
        - "M&A security due diligence experience"
        - "Cyber insurance assessment and advisory"
        - "Cloud security program management"
        - "Third-party risk management program development"
      mentorship_requirements: "Mentors junior consultants and analysts at the firm. Develops client-side security team members. Shares engagement patterns and lessons learned across the vCISO practice. May contribute to firm methodology and training programs."
      impact_scope: "Security posture and program maturity across 5-10+ client organizations. Client regulatory compliance and audit outcomes. Client security team capability development. Firm revenue through client retention and expansion."
      autonomy_decision_authority: "High autonomy in client advisory and recommendations. Strategic decision-making for each client's security program within their budget. Coordinates with firm leadership on engagement scope and staffing. Client-facing authority as the designated security executive."
      communication_stakeholder: "Client C-suite and board engagement as the security executive. Firm leadership reporting on engagement status and client health. Client IT leadership for operational coordination. Regulatory and auditor communication on behalf of clients."
      degree_equivalent: "Bachelor's degree with 10-15 years of security experience including management/director-level roles, OR Master's with 8-12 years. Prior experience as a full-time CISO, Security Director, or equivalent strongly preferred."
      certifications:
        - "CISSP required"
        - "CISM strongly preferred"
        - "CISA for compliance-heavy practices"
        - "Industry-specific (HITRUST, PCI QSA) depending on client base"
        - "Cloud certifications (CCSP, AWS/Azure Security) increasingly expected"
      salary:
        us_government: "$130,000 - $180,000 (GS-14 to GS-15)"
        us_startup: "$150,000 - $220,000"
        us_corporate: "$150,000 - $220,000"
        us_bigtech: "N/A (role does not typically exist at Big Tech)"

fractional_ciso:
  name: "Fractional CISO"
  description: "A Fractional CISO is an independent security executive who works part-time for 2-5 organizations simultaneously, providing strategic security leadership as a contracted executive rather than a full-time employee. Unlike a vCISO employed by a firm, a Fractional CISO operates independently (or through a small boutique), contracts directly with clients, and typically provides deeper engagement with fewer organizations. This model mirrors the Fractional CFO and Fractional COO patterns common in the SMB market. Most Fractional CISOs are former full-time CISOs or senior security directors with 15-25+ years of experience who prefer portfolio-based work over a single employer. Like the vCISO, this is not a leveled career track — it is a practice model. Career progression is measured by client portfolio quality, industry reputation, and practice growth rather than title advancement."
  levels:
    - id: "fractional_ciso"
      title: "Fractional CISO"
      general_description: "Independent security executive providing part-time CISO services directly to 2-5 organizations. Operates as a true C-suite member at each client — attending leadership meetings, sitting on risk committees, and presenting to boards — but on a fractional time basis (typically 10-40 hours per month per client). Provides deeper strategic engagement than a firm-based vCISO, often building long-term multi-year relationships with clients. Handles own business development, client acquisition, and practice management in addition to delivery."
      primary_responsibilities:
        - "Serve as the fractional Chief Information Security Officer for 2-5 organizations"
        - "Develop and execute security strategy and multi-year roadmaps per client"
        - "Present security posture and risk to client boards and executive teams"
        - "Build and lead client security programs from strategy through execution"
        - "Hire, develop, and manage client security teams"
        - "Lead security vendor evaluation, selection, and management"
        - "Own incident response leadership and crisis management for clients"
        - "Drive regulatory compliance and audit readiness"
        - "Manage security budgets and investment prioritization"
        - "Develop and maintain business relationships for practice growth"
        - "Manage own business operations (contracts, billing, insurance)"
      required_skills:
        - "Full-scope security program leadership and strategy"
        - "Board-level communication and executive advisory"
        - "Risk management, governance, and regulatory compliance"
        - "Security architecture and technology strategy"
        - "Team building, hiring, and organizational development"
        - "Incident response and crisis management leadership"
        - "Vendor management and technology evaluation"
        - "Business development and client relationship management"
        - "Financial management and budget optimization"
        - "Multi-organization time and priority management"
      preferred_skills:
        - "Prior full-time CISO experience (strongly preferred)"
        - "Cyber insurance assessment and risk quantification (FAIR)"
        - "M&A security due diligence and integration"
        - "Industry-specific deep expertise"
        - "Published thought leadership and speaking experience"
        - "Strong professional network for referral-based growth"
      mentorship_requirements: "Mentors client security team leaders and emerging CISOs. May participate in industry mentorship programs (ISSA, ISACA chapters). Contributes to the profession through knowledge sharing, speaking, and advisory roles. Often serves as an informal advisor to peers transitioning to fractional work."
      impact_scope: "Enterprise-wide security posture for 2-5 organizations. Client board-level risk management and governance. Client security team development and organizational maturity. Industry contribution through thought leadership and community engagement."
      autonomy_decision_authority: "Full executive authority within each client's security domain (within their organizational constraints). Independent practice management with no firm overhead or methodology constraints. Strategic decision-making as a C-suite executive. Full ownership of client relationships and engagement terms."
      communication_stakeholder: "Client boards of directors and C-suite executives. Client IT leadership and business unit heads. Regulatory bodies and auditors on behalf of clients. Industry peers and professional community."
      degree_equivalent: "Bachelor's degree with 15-25+ years of security experience including senior leadership roles, OR Master's/MBA with 12-20+ years. Track record as a full-time CISO, VP of Security, or equivalent. Industry recognition and strong professional network."
      certifications:
        - "CISSP typically held"
        - "CISM, CISA common"
        - "Industry recognition and track record supersede certifications"
        - "Board governance credentials (NACD) valuable"
        - "FAIR or CRISC for risk quantification credibility"
      salary:
        us_government: "N/A"
        us_startup: "$200,000 - $400,000 (retainer-based, 3-5 clients)"
        us_corporate: "$250,000 - $500,000 (retainer-based, 3-5 clients)"
        us_bigtech: "N/A (role does not typically exist at Big Tech)"
