# Cyber Fraud Professional Titles
# Data file for Jekyll-based security titles standardization

fraud_analyst:
  name: "Fraud Analyst"
  description: "Professionals who detect, investigate, and prevent cyber-enabled fraud including account takeover, payment fraud, business email compromise, identity theft, and transaction manipulation. Focus on fraud pattern detection, investigation, loss prevention, and working with law enforcement on criminal referrals. Operate at the intersection of cybersecurity, financial crime, and customer protection — balancing friction reduction with loss mitigation. Corporate fraud teams range from small bank operations units to massive trust-and-safety organizations at fintechs and payment processors."
  nice_mapping:
    work_roles:
      - id: "IN-FOR-001"
        name: "Cyber Crime Investigator"
    strength: "partial"
    notes: "NICE's Cyber Crime Investigator is law-enforcement-flavored. Commercial fraud roles focus on detection, prevention, and loss reduction rather than criminal prosecution."
  levels:
    - id: "analyst1"
      title: "Analyst 1 / Entry"
      general_description: "Entry-level fraud analyst learning fraud detection fundamentals, alert triage, and case management procedures. Reviews flagged transactions and accounts using established fraud rules and decision trees. Develops foundational understanding of common fraud typologies, payment systems, and Know Your Customer (KYC) concepts. Works under close supervision and focuses on queue-based alert review."
      primary_responsibilities:
        - "Review and disposition fraud alerts from rules engines and scoring systems"
        - "Verify flagged transactions against customer history and behavioral patterns"
        - "Escalate suspicious cases to senior analysts for further investigation"
        - "Document case findings in fraud case management systems"
        - "Process chargeback and dispute claims following standard procedures"
        - "Assist with account verification and identity validation checks"
        - "Learn payment system fundamentals (ACH, wire, card networks)"
        - "Maintain queue SLAs and throughput targets"
        - "Flag emerging patterns observed during alert review"
      required_skills:
        - "Understanding of common fraud types (account takeover, card fraud, identity theft)"
        - "Basic knowledge of payment systems and transaction flows"
        - "Familiarity with fraud case management platforms (Actimize, Verafin, or similar)"
        - "Attention to detail and pattern recognition ability"
        - "Basic understanding of KYC and identity verification concepts"
        - "Documentation and report writing skills"
        - "Ability to follow decision trees and standard operating procedures"
      preferred_skills:
        - "Exposure to Bank Secrecy Act (BSA) and anti-money laundering basics"
        - "Familiarity with chargeback reason codes and dispute processes"
        - "Basic spreadsheet and data analysis skills"
        - "Understanding of social engineering tactics"
        - "Customer service or banking operations experience"
      mentorship_requirements: "Receives direct mentorship from Senior fraud analysts. Shadows on complex investigations and SAR filings. Expected to complete fraud operations onboarding and learn primary case management tooling within first 3 months. Develops understanding of fraud typologies through guided case review."
      impact_scope: "Individual contributor on alert queue. Impact limited to correctly dispositioning assigned alerts and escalating true positives. All complex findings reviewed before action. Contributes to team throughput and detection rate metrics."
      autonomy_decision_authority: "Works under close supervision following established decision trees. Authority to approve or decline low-value transactions per policy thresholds. Escalates all high-value, unusual, or ambiguous cases. No authority to file regulatory reports or contact law enforcement."
      communication_stakeholder: "Primarily internal communication with fraud operations team. Documents findings in case management system. Limited interaction with customers for verification callbacks. May participate in shift handoffs."
      degree_equivalent: "Bachelor's degree in Criminal Justice, Finance, Business, or related field, OR 1-2 years of banking, customer service, or financial operations experience, OR completion of fraud analyst training program."
      certifications:
        - "Association of Certified Fraud Examiners (ACFE) - Fraud Fundamentals"
        - "Certified Anti-Money Laundering Specialist (CAMS) - Associate level"
        - "CompTIA Security+ (if coming from IT path)"
        - "Financial Crime Compliance (FCC) certifications"
      salary:
        us_government: "$50,000 - $70,000 (GS-7 to GS-9)"
        us_startup: "$50,000 - $70,000"
        us_corporate: "$50,000 - $75,000"
        us_bigtech: "$110,000 - $165,000"

    - id: "analyst2"
      title: "Analyst 2 / Junior"
      general_description: "Junior fraud analyst capable of independently investigating routine fraud cases and identifying common attack patterns. Demonstrates proficiency with fraud detection tools and can differentiate true fraud from false positives with reasonable accuracy. Begins conducting end-to-end investigations for standard case types and contributing to rule tuning through feedback on alert quality."
      primary_responsibilities:
        - "Independently investigate routine fraud cases end-to-end"
        - "Analyze account takeover attempts and credential abuse patterns"
        - "Conduct link analysis to identify fraud rings and connected accounts"
        - "Provide feedback on rule performance and false positive rates"
        - "Prepare Suspicious Activity Report (SAR) narratives for review"
        - "Investigate chargeback and dispute claims requiring deeper analysis"
        - "Perform device fingerprint and session analysis for ATO detection"
        - "Monitor fraud queues and prioritize cases by risk and loss exposure"
        - "Assist with periodic fraud trend reporting"
        - "Support customer-facing teams with fraud-related escalations"
      required_skills:
        - "Proficiency in fraud case management and investigation workflows"
        - "Understanding of account takeover (ATO) attack methods and indicators"
        - "Ability to conduct link analysis across accounts, devices, and transactions"
        - "Knowledge of payment fraud schemes (card testing, BIN attacks, refund abuse)"
        - "Familiarity with SAR filing requirements and BSA obligations"
        - "Basic data querying skills (SQL) for transaction analysis"
        - "Understanding of device fingerprinting and behavioral analytics concepts"
        - "Fraud loss calculation and impact assessment"
      preferred_skills:
        - "Experience with identity verification platforms (Socure, Jumio, Onfido)"
        - "Familiarity with chargeback representment processes"
        - "Understanding of business email compromise (BEC) investigation"
        - "Exposure to dark web monitoring for compromised credentials"
        - "Basic knowledge of graph analysis for fraud networks"
      mentorship_requirements: "Receives guidance from Senior analysts on complex or high-value cases. Expected to begin assisting Entry-level analysts with case review. Contributes to SOPs and decision tree refinements. Should be developing expertise in specific fraud typologies."
      impact_scope: "Directly contributes to fraud loss prevention through case investigation. Responsible for accurate case disposition and timely escalation of emerging patterns. SAR narratives support regulatory compliance. Beginning to influence alert rule quality through feedback."
      autonomy_decision_authority: "Works with moderate supervision. Authority to investigate and close standard fraud cases independently. Can approve or decline transactions within defined value thresholds. Escalates high-value cases, novel patterns, and regulatory reporting decisions."
      communication_stakeholder: "Regular interaction with fraud operations and risk teams. Presents case findings to team leads. Coordinates with customer support on account actions. May interact with bank partners on chargeback disputes."
      degree_equivalent: "Bachelor's degree in relevant field, OR 2-4 years of fraud operations, banking, or financial crime experience. Demonstrated ability to investigate fraud cases and produce quality documentation."
      certifications:
        - "Certified Fraud Examiner (CFE)"
        - "Certified Anti-Money Laundering Specialist (CAMS)"
        - "ACFE Certified Financial Crimes Investigator (CFCI)"
        - "GIAC Financial Forensics and Fraud Investigation (GFFI)"
      salary:
        us_government: "$65,000 - $90,000 (GS-9 to GS-11)"
        us_startup: "$65,000 - $90,000"
        us_corporate: "$70,000 - $100,000"
        us_bigtech: "$150,000 - $240,000"

    - id: "analyst3"
      title: "Analyst 3 / Mid"
      general_description: "Experienced fraud analyst who independently handles complex, high-value, and multi-vector fraud investigations. Leads investigations into organized fraud rings, sophisticated BEC schemes, and cross-channel attacks. Produces regulatory filings and works directly with law enforcement on criminal referrals. Identifies systemic fraud trends and recommends detection improvements. Mentors junior team members on investigation methodology."
      primary_responsibilities:
        - "Lead complex fraud investigations involving organized fraud rings"
        - "Investigate sophisticated BEC, payroll diversion, and vendor fraud schemes"
        - "Author and file Suspicious Activity Reports independently"
        - "Conduct deep-dive analysis of emerging fraud trends and attack vectors"
        - "Develop and refine fraud detection rules and scoring thresholds"
        - "Coordinate with law enforcement on criminal referrals and evidence packages"
        - "Mentor junior analysts on investigation techniques and case quality"
        - "Perform root cause analysis on fraud losses to identify control gaps"
        - "Present fraud trend analysis and loss metrics to management"
        - "Collaborate with product and engineering on fraud control requirements"
        - "Support regulatory examinations and audit inquiries related to fraud"
      required_skills:
        - "Expert knowledge of multiple fraud typologies and attack vectors"
        - "Advanced link analysis and fraud network mapping techniques"
        - "Proficiency in SQL and data analysis for fraud pattern identification"
        - "SAR filing expertise and BSA/AML regulatory knowledge"
        - "Understanding of synthetic identity fraud detection"
        - "Knowledge of mobile and digital channel fraud schemes"
        - "Ability to prepare law enforcement referral packages"
        - "Experience with fraud analytics platforms (SAS, Actimize, Feedzai)"
        - "Cross-channel fraud investigation (card, ACH, wire, P2P)"
      preferred_skills:
        - "OSINT techniques for fraud investigation"
        - "Understanding of machine learning model outputs and score interpretation"
        - "Experience with cryptocurrency-related fraud"
        - "Knowledge of merchant fraud and acquiring-side risk"
        - "Data visualization for fraud trend reporting"
      mentorship_requirements: "Mentors Analyst 1 and 2 on investigation methodology and case quality. Provides feedback on SAR narratives and case documentation. May lead case review sessions. Receives guidance from Staff-level analysts on strategic fraud initiatives and novel attack vectors."
      impact_scope: "Leads high-impact investigations that directly reduce fraud losses. Rule tuning recommendations affect detection rates across the organization. Law enforcement referrals can result in criminal prosecution of fraud actors. Trend analysis shapes fraud prevention strategy."
      autonomy_decision_authority: "Works independently on most investigations. Authority to file SARs and make account-level fraud decisions within policy. Can recommend rule changes and threshold adjustments. Escalates novel fraud vectors, high-profile cases, and policy exceptions to leadership."
      communication_stakeholder: "Regular interaction with risk leadership, compliance, and product teams. Presents fraud trend reports to management. Direct communication with law enforcement agencies. Coordinates with bank partners and payment networks on fraud cases."
      degree_equivalent: "Bachelor's degree plus 4-6 years of fraud investigation experience, OR 6-8 years of progressive fraud operations experience with demonstrated expertise in complex investigations."
      certifications:
        - "Certified Fraud Examiner (CFE)"
        - "Certified Anti-Money Laundering Specialist (CAMS)"
        - "GIAC Financial Forensics and Fraud Investigation (GFFI)"
        - "Certified Financial Crime Specialist (CFCS)"
      salary:
        us_government: "$85,000 - $115,000 (GS-12 to GS-13)"
        us_startup: "$90,000 - $120,000"
        us_corporate: "$95,000 - $130,000"
        us_bigtech: "$220,000 - $350,000"

    - id: "analyst4"
      title: "Analyst 4 / Senior"
      general_description: "Senior fraud analyst and subject matter expert who leads the most complex and sensitive fraud investigations. Serves as the primary escalation point for novel fraud schemes, high-loss events, and cross-functional fraud issues. Deep expertise in multiple fraud domains with the ability to connect disparate signals across channels and products. Drives fraud strategy improvements and partners with engineering on detection system enhancements. May lead a small team or functional area within fraud operations."
      primary_responsibilities:
        - "Lead investigation of novel, high-loss, and executive-visibility fraud events"
        - "Serve as escalation point for complex cases across the fraud team"
        - "Drive fraud detection strategy for assigned product areas or channels"
        - "Partner with fraud engineering on model feature development and rule design"
        - "Develop investigation playbooks and standard operating procedures"
        - "Lead fraud loss forecasting and trend analysis for leadership"
        - "Manage law enforcement relationships and coordinate multi-agency cases"
        - "Conduct fraud risk assessments for new products and features"
        - "Represent fraud operations in cross-functional risk discussions"
        - "Lead regulatory exam preparation and response for fraud programs"
        - "Coach and develop mid-level analysts toward advanced investigation skills"
      required_skills:
        - "Deep expertise across multiple fraud domains (payments, identity, ATO, BEC)"
        - "Advanced analytical skills including statistical analysis of fraud patterns"
        - "Expert knowledge of BSA/AML regulations and regulatory expectations"
        - "Ability to assess fraud risk in new products and business initiatives"
        - "Strong understanding of fraud detection model concepts and scoring systems"
        - "Experience managing law enforcement relationships and case referrals"
        - "Investigation leadership and case management for complex, multi-party fraud"
        - "Fraud loss forecasting and metrics development"
        - "Proficiency with fraud analytics platforms and BI tools"
      preferred_skills:
        - "Experience with fraud risk assessments for fintech or payment products"
        - "Understanding of machine learning model lifecycle for fraud detection"
        - "Knowledge of international fraud typologies and cross-border schemes"
        - "Experience with regulatory examination processes (OCC, FDIC, FinCEN)"
        - "Project management skills for fraud prevention initiatives"
      mentorship_requirements: "Actively mentors mid-level analysts and develops their expertise. Conducts case reviews and provides strategic guidance on complex investigations. May serve as functional lead for a fraud domain. Receives guidance from Staff-level on organizational strategy and cross-team initiatives."
      impact_scope: "Directly responsible for fraud prevention strategy in assigned areas. Investigation outcomes affect organizational loss rates and regulatory standing. Product fraud assessments influence go-to-market decisions. Playbooks and SOPs define how the broader team operates."
      autonomy_decision_authority: "Works with high autonomy on investigations and fraud strategy. Authority to make high-value case decisions within policy. Can approve rule deployments and threshold changes. Escalates policy changes, resource requests, and enterprise-risk-level issues to leadership."
      communication_stakeholder: "Regular communication with fraud leadership, compliance, product, and engineering. Presents to senior management on fraud trends and program effectiveness. Interacts with regulators during examinations. Represents fraud operations in enterprise risk forums."
      degree_equivalent: "Bachelor's degree plus 6-8 years of fraud investigation experience, OR 8-10 years of progressive fraud experience with demonstrated leadership in complex investigations and strategy development."
      certifications:
        - "Certified Fraud Examiner (CFE)"
        - "Certified Anti-Money Laundering Specialist (CAMS)"
        - "Certified Financial Crime Specialist (CFCS)"
        - "GIAC Financial Forensics and Fraud Investigation (GFFI)"
        - "Certified Information Systems Security Professional (CISSP) - for cyber-fraud focus"
      salary:
        us_government: "$110,000 - $150,000 (GS-14 to GS-15)"
        us_startup: "$120,000 - $160,000"
        us_corporate: "$130,000 - $175,000"
        us_bigtech: "$300,000 - $480,000"

    - id: "analyst5"
      title: "Analyst 5 / Staff"
      general_description: "Staff-level fraud analyst who operates as a force multiplier across the fraud organization. Designs investigation frameworks, defines fraud taxonomies, and builds systems (analytical, procedural, or organizational) that improve detection and response for the entire team. Bridges fraud operations with engineering, data science, and product to ensure fraud intelligence informs technical solutions. Leads cross-functional initiatives and drives measurable improvements in fraud loss rates."
      primary_responsibilities:
        - "Design and implement fraud investigation frameworks used across the organization"
        - "Develop fraud taxonomies and classification systems for consistent reporting"
        - "Lead cross-functional fraud reduction initiatives spanning multiple teams"
        - "Translate fraud patterns and intelligence into engineering requirements"
        - "Define and track fraud KPIs, loss metrics, and operational dashboards"
        - "Build and maintain fraud intelligence sharing relationships with industry peers"
        - "Drive fraud model governance and champion feedback processes"
        - "Lead fraud program assessments and maturity evaluations"
        - "Develop training curricula and career development paths for fraud analysts"
        - "Advise product teams on fraud-resistant design patterns"
        - "Author fraud research and trend reports for executive consumption"
      required_skills:
        - "Comprehensive expertise across fraud operations, strategy, and analytics"
        - "Ability to design investigation methodologies and analytical frameworks"
        - "Strong data analysis skills including Python or R for fraud analytics"
        - "Understanding of fraud detection model development and validation"
        - "Experience building fraud metrics programs and executive reporting"
        - "Knowledge of industry fraud intelligence sharing (FS-ISAC, fraud consortiums)"
        - "Ability to translate operational fraud insights into technical requirements"
        - "Project leadership for complex, multi-team initiatives"
        - "Fraud program assessment and maturity modeling"
      preferred_skills:
        - "Experience with fraud consortium data and collaborative intelligence"
        - "Understanding of graph databases and network analysis for fraud detection"
        - "Knowledge of real-time decisioning architectures"
        - "Experience building fraud analyst training programs"
        - "Published fraud research or conference presentations"
      mentorship_requirements: "Mentors Senior analysts and develops future leaders. Drives professional development strategy for the fraud team. Creates learning resources and investigation guides. Engages with external fraud community to bring in industry best practices."
      impact_scope: "Cross-team influence on fraud detection and prevention. Frameworks and methodologies define how fraud investigations are conducted org-wide. Metrics and dashboards shape leadership decision-making. Industry intelligence sharing contributes to broader fraud ecosystem defense."
      autonomy_decision_authority: "High autonomy in defining fraud strategy and investigation approaches. Authority to set operational standards and approve process changes. Influences technology investment decisions for fraud tooling. Escalates enterprise risk decisions and budget requests to leadership."
      communication_stakeholder: "Regular communication with VP-level leadership and executive stakeholders. Presents fraud program status and strategy to senior management. Represents the organization in industry fraud forums. Coordinates with peer organizations on fraud intelligence."
      degree_equivalent: "Bachelor's or Master's degree plus 8-12 years of fraud experience, OR 10-14 years of progressive fraud and financial crime experience with demonstrated cross-functional leadership and strategic impact."
      certifications:
        - "Certified Fraud Examiner (CFE)"
        - "Certified Anti-Money Laundering Specialist (CAMS)"
        - "Certified Financial Crime Specialist (CFCS)"
        - "Certified Information Systems Security Professional (CISSP)"
        - "ACFE Fellow or recognized fraud thought leader"
      salary:
        us_government: "$130,000 - $175,000 (GS-14 to GS-15)"
        us_startup: "$150,000 - $200,000"
        us_corporate: "$160,000 - $220,000"
        us_bigtech: "$360,000 - $550,000"

    - id: "analyst6"
      title: "Analyst 6 / Senior Staff"
      general_description: "Senior Staff fraud analyst who shapes how the fraud function operates across the organization. Defines fraud risk appetite, establishes operating models, and drives strategic decisions on fraud prevention investment. Operates as a trusted advisor to executive leadership on fraud exposure and mitigation. Leads transformational initiatives — such as standing up new fraud operations for emerging products, redesigning fraud operating models, or leading enterprise-wide fraud technology migrations. Industry-recognized expertise in financial crime."
      primary_responsibilities:
        - "Define organizational fraud risk appetite and tolerance frameworks"
        - "Design fraud operating models for new business lines and products"
        - "Lead enterprise fraud technology strategy and platform selection"
        - "Advise executive leadership on fraud exposure, trends, and investment priorities"
        - "Drive fraud program transformation initiatives"
        - "Establish fraud governance frameworks and escalation structures"
        - "Lead cross-enterprise fraud risk assessments"
        - "Represent the organization to regulators on fraud program effectiveness"
        - "Build strategic partnerships with industry bodies and law enforcement agencies"
        - "Define fraud analytics strategy and champion data-driven detection"
        - "Shape organizational hiring, development, and retention strategy for fraud talent"
      required_skills:
        - "Executive-level understanding of fraud risk across financial products and channels"
        - "Experience designing fraud operating models and organizational structures"
        - "Ability to define fraud technology strategy and evaluate platforms"
        - "Deep regulatory knowledge across BSA/AML, UDAAP, and consumer protection"
        - "Strategic planning and business case development for fraud investments"
        - "Experience representing fraud programs to regulators and board-level audiences"
        - "Ability to lead organizational change and transformation programs"
        - "Advanced understanding of fraud detection architectures and ML model governance"
        - "Industry relationship building and intelligence network development"
      preferred_skills:
        - "Experience building fraud operations from the ground up"
        - "Knowledge of international fraud regulatory frameworks (EU PSD2, UK FCA)"
        - "Board-level presentation and communication skills"
        - "Experience with M&A fraud due diligence and integration"
        - "Published thought leadership on fraud prevention"
      mentorship_requirements: "Mentors Staff-level analysts and shapes leadership development across the fraud function. Sponsors cross-functional development opportunities. Serves as an industry mentor through ACFE or similar organizations. Influences hiring standards and career frameworks."
      impact_scope: "Organization-wide influence on fraud strategy, risk appetite, and operating model. Decisions directly affect fraud loss rates, customer experience, and regulatory standing. Technology strategy shapes multi-year fraud prevention capabilities. Industry engagement contributes to sector-wide fraud resilience."
      autonomy_decision_authority: "Operates with significant strategic autonomy. Authority to set fraud policy and operating standards. Influences enterprise budget allocation for fraud prevention. Escalates board-level risk decisions and regulatory matters to executive leadership."
      communication_stakeholder: "Regular communication with C-suite and board risk committees. Represents fraud program to regulators and law enforcement leadership. Engages with industry bodies at the executive level. Advises product and business leadership on fraud-related strategic decisions."
      degree_equivalent: "Master's degree or equivalent plus 12-16 years of fraud and financial crime experience, OR 14-18 years of progressive experience with demonstrated organizational leadership, strategic impact, and industry recognition."
      certifications:
        - "Certified Fraud Examiner (CFE)"
        - "Certified Anti-Money Laundering Specialist (CAMS)"
        - "Certified Financial Crime Specialist (CFCS)"
        - "CISSP or CISM (for cyber-fraud intersection)"
        - "Industry advisory board memberships"
      salary:
        us_government: "$145,000 - $190,000 (GS-15 to SES)"
        us_startup: "$180,000 - $240,000"
        us_corporate: "$195,000 - $260,000"
        us_bigtech: "$450,000 - $650,000"

    - id: "analyst7"
      title: "Analyst 7 / Principal"
      general_description: "Principal fraud analyst — an industry-defining expert whose work shapes how organizations and the broader financial ecosystem approach fraud prevention. Creates methodologies, frameworks, and strategies adopted well beyond their own organization. Advises regulators, shapes industry standards, and publishes research that advances the field. Drives innovations in fraud detection that set new benchmarks for the industry. Operates at the intersection of fraud, cybersecurity, and financial regulation with unmatched depth of expertise."
      primary_responsibilities:
        - "Create fraud prevention methodologies and frameworks adopted industry-wide"
        - "Advise regulators, law enforcement agencies, and policymakers on fraud trends"
        - "Drive innovation in fraud detection approaches and set industry benchmarks"
        - "Lead industry working groups and standards bodies on financial crime"
        - "Publish original research on emerging fraud vectors and countermeasures"
        - "Define the long-term strategic vision for enterprise fraud prevention"
        - "Serve as the organization's foremost authority on fraud risk"
        - "Evaluate and shape emerging technologies for fraud prevention (AI/ML, identity, biometrics)"
        - "Advise on enterprise risk architecture decisions that affect fraud exposure"
        - "Drive strategic partnerships with payment networks, consortiums, and technology providers"
        - "Represent the organization at major industry conferences and regulatory forums"
      required_skills:
        - "Industry-recognized expertise in fraud prevention and financial crime"
        - "Ability to create novel methodologies and frameworks that advance the discipline"
        - "Deep understanding of global fraud trends, regulatory landscape, and technology evolution"
        - "Executive communication and influence at the board and regulatory level"
        - "Strategic vision for multi-year fraud prevention transformation"
        - "Expertise spanning cyber fraud, financial crime, identity, and payments"
        - "Track record of published research or industry standard contributions"
        - "Ability to evaluate emerging technologies and their fraud implications"
        - "Cross-industry relationship network spanning financial services, technology, and government"
      preferred_skills:
        - "Experience advising government agencies or regulatory bodies on fraud policy"
        - "Background spanning multiple financial services sectors (banking, fintech, payments, insurance)"
        - "Academic contributions or teaching in fraud, financial crime, or cybersecurity"
        - "Experience with international fraud coordination and cross-border investigations"
        - "Patent or innovation portfolio in fraud detection technology"
      mentorship_requirements: "Mentors senior leaders across the industry, not just within the organization. Shapes the profession through conference keynotes, publications, and standards contributions. Sponsors development of next-generation fraud leaders. May serve on ACFE or industry advisory boards."
      impact_scope: "Industry-wide influence on fraud prevention strategy and methodology. Frameworks and research shape how organizations across the sector approach fraud. Regulatory engagement influences policy that affects the entire financial ecosystem. Sets the standard for fraud prevention excellence."
      autonomy_decision_authority: "Operates with full strategic autonomy. Trusted to represent the organization's fraud position to external stakeholders. Authority to commit the organization on fraud-related industry initiatives. Reports to and advises the most senior executive leadership."
      communication_stakeholder: "Engages with board members, C-suite executives, regulators, and law enforcement leadership. Keynotes industry conferences. Advises peer organizations and industry bodies. Direct relationships with payment network and consortium leadership."
      degree_equivalent: "Master's or doctoral degree plus 15+ years of fraud and financial crime experience, OR 18+ years of progressive experience with industry-wide recognition, published contributions, and demonstrated influence on fraud prevention practices beyond a single organization."
      certifications:
        - "Certified Fraud Examiner (CFE) - Fellow"
        - "Certified Anti-Money Laundering Specialist (CAMS)"
        - "Industry advisory board and standards body memberships"
        - "Published author or frequent conference speaker"
        - "Recognized as industry thought leader in financial crime prevention"
      salary:
        us_government: "$160,000 - $200,000 (GS-15 to SES)"
        us_startup: "$200,000 - $280,000"
        us_corporate: "$220,000 - $300,000"
        us_bigtech: "$550,000 - $750,000"

fraud_engineer:
  name: "Fraud Engineer"
  description: "Technical professionals who build and maintain fraud detection platforms, develop machine learning models for anomaly detection, design rules engines, and create real-time scoring systems. Focus on the technical infrastructure that enables fraud detection at scale. Combine software engineering, data engineering, and applied machine learning to build systems that score millions of transactions in real time while balancing precision and recall to minimize both fraud losses and customer friction."
  nice_mapping:
    work_roles: []
    strength: "tenuous"
    notes: "No NICE equivalent. Fraud detection engineering combines data science, software engineering, and security — a discipline NICE does not address."
  levels:
    - id: "eng1"
      title: "Eng 1 / Entry"
      general_description: "Entry-level fraud engineer learning the fundamentals of fraud detection systems, rules engines, and transaction scoring pipelines. Assists with rule implementation, basic feature engineering, and monitoring of fraud detection system health. Develops foundational understanding of real-time streaming architectures, fraud model concepts, and the business logic behind fraud decisioning. Works under close supervision on well-defined tasks."
      primary_responsibilities:
        - "Implement fraud detection rules based on analyst specifications"
        - "Monitor fraud scoring system health and alert on anomalies"
        - "Assist with data pipeline maintenance for fraud feature stores"
        - "Write unit tests for fraud rules and scoring logic"
        - "Support basic feature engineering for fraud models"
        - "Document fraud system configurations and rule logic"
        - "Assist with rule deployment and rollback procedures"
        - "Learn real-time streaming frameworks and event processing"
        - "Support data quality checks on fraud-related data feeds"
      required_skills:
        - "Proficiency in Python or Java for backend development"
        - "Basic SQL skills for querying transaction and event data"
        - "Understanding of software development fundamentals (version control, testing, CI/CD)"
        - "Basic knowledge of streaming concepts (Kafka, event-driven architecture)"
        - "Familiarity with fraud detection concepts (rules, scores, thresholds)"
        - "Understanding of basic statistics and data analysis"
        - "Ability to read and implement technical specifications"
      preferred_skills:
        - "Exposure to machine learning concepts"
        - "Familiarity with cloud platforms (AWS, GCP, Azure)"
        - "Basic knowledge of graph databases or network analysis"
        - "Understanding of REST APIs and microservices"
        - "Exposure to real-time data processing frameworks (Spark Streaming, Flink)"
      mentorship_requirements: "Receives direct mentorship from Senior fraud engineers. Pairs on development tasks and code reviews. Expected to complete onboarding on fraud platform architecture and tools within first 3 months. Develops understanding of fraud domain through collaboration with fraud analysts."
      impact_scope: "Individual contributor on assigned development tasks. Impact limited to implementing and testing specific rules or features. All code reviewed before deployment. Contributes to overall platform stability and rule coverage."
      autonomy_decision_authority: "Works under close supervision on well-scoped tasks. Follows established development practices and deployment procedures. No authority to deploy rules to production independently. Escalates technical decisions and design questions to senior engineers."
      communication_stakeholder: "Primarily internal communication with fraud engineering team. Participates in standups and sprint ceremonies. Limited interaction with fraud analysts initially. Documents work in engineering ticketing systems."
      degree_equivalent: "Bachelor's degree in Computer Science, Software Engineering, Data Science, or related field, OR 1-2 years of software development experience, OR completion of software engineering bootcamp with demonstrated backend and data skills."
      certifications:
        - "AWS Cloud Practitioner or equivalent cloud certification"
        - "Relevant programming certifications or bootcamp completion"
        - "Coursera/Udacity machine learning fundamentals"
        - "CompTIA Security+ (for security context)"
      salary:
        us_government: "$55,000 - $75,000 (GS-7 to GS-9)"
        us_startup: "$70,000 - $100,000"
        us_corporate: "$65,000 - $95,000"
        us_bigtech: "$130,000 - $185,000"

    - id: "eng2"
      title: "Eng 2 / Junior"
      general_description: "Junior fraud engineer who independently develops and deploys fraud detection rules, builds data pipelines for fraud features, and maintains components of the fraud scoring platform. Demonstrates proficiency in at least one area of the fraud tech stack (rules engine, feature store, or model serving) and can implement moderately complex detection logic. Begins contributing to model feature engineering and understands the feedback loop between fraud operations and detection systems."
      primary_responsibilities:
        - "Develop and deploy fraud detection rules and policies independently"
        - "Build and maintain data pipelines for fraud feature computation"
        - "Implement feature engineering for fraud detection models"
